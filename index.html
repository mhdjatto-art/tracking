<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ProdLine OS — نظام مراقبة خط الإنتاج</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg-0: #060912;
  --bg-1: #0b1020;
  --bg-2: #131a2e;
  --bg-3: #1a2340;
  --glass: rgba(255,255,255,0.04);
  --glass-2: rgba(255,255,255,0.07);
  --glass-3: rgba(255,255,255,0.10);
  --border: rgba(255,255,255,0.08);
  --border-2: rgba(255,255,255,0.14);
  --text: #e9eef7;
  --text-2: #a8b3c5;
  --text-3: #6c7689;
  --gold: #f5b942;
  --gold-2: #d4941f;
  --emerald: #10b981;
  --emerald-2: #059669;
  --rose: #f43f5e;
  --sky: #38bdf8;
  --violet: #a78bfa;
  --amber: #f59e0b;
  --teal: #14b8a6;
  --shadow: 0 10px 40px -10px rgba(0,0,0,0.6);
  --r: 12px;
  --r-sm: 8px;
  --r-lg: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Cairo', 'Inter', system-ui, sans-serif;
  background: var(--bg-0);
  color: var(--text);
  font-size: 13px;
  line-height: 1.5;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}
body[data-lang="en"] { font-family: 'Inter', 'Cairo', sans-serif; direction: ltr; }
.mono { font-family: 'JetBrains Mono', monospace; font-feature-settings: 'tnum' 1; letter-spacing: -0.01em; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, select, textarea { font-family: inherit; }
a { color: inherit; text-decoration: none; }

body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 0%, rgba(245,185,66,0.07), transparent 50%),
    radial-gradient(ellipse 60% 50% at 80% 100%, rgba(56,189,248,0.06), transparent 50%),
    radial-gradient(ellipse 70% 50% at 50% 50%, rgba(167,139,250,0.04), transparent 60%);
  pointer-events: none; z-index: 0;
}

#app { position: relative; z-index: 1; height: 100vh; display: flex; flex-direction: column; }

/* ============ TOPBAR ============ */
.topbar {
  height: 58px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 22px;
  background: rgba(7,11,20,0.75);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 50;
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-mark {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--gold), var(--gold-2));
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; color: #1a1208; font-size: 15px;
  box-shadow: 0 4px 14px rgba(245,185,66,0.35);
}
.brand-name { font-weight: 700; font-size: 14px; letter-spacing: -0.01em; }
.brand-sub { font-size: 11px; color: var(--text-3); margin-top: -2px; }
.topbar-actions { display: flex; align-items: center; gap: 8px; }
.icon-btn {
  width: 34px; height: 34px;
  border-radius: 9px;
  background: var(--glass); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  color: var(--text-2); transition: all 0.15s; position: relative;
}
.icon-btn:hover { background: var(--glass-2); color: var(--text); border-color: var(--border-2); }
.icon-btn svg { width: 16px; height: 16px; }
.icon-btn .dot {
  position: absolute; top: 5px; inset-inline-end: 5px;
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--rose); box-shadow: 0 0 0 2px var(--bg-0);
}
.lang-toggle {
  height: 34px; padding: 0 12px;
  border-radius: 9px;
  background: var(--glass); border: 1px solid var(--border);
  font-weight: 700; font-size: 11px; color: var(--text-2);
  transition: all 0.15s;
}
.lang-toggle:hover { background: var(--glass-2); color: var(--text); }
.user-chip {
  display: flex; align-items: center; gap: 9px;
  height: 34px; padding-inline: 4px 12px;
  background: var(--glass); border: 1px solid var(--border);
  border-radius: 9px;
}
.user-avatar {
  width: 26px; height: 26px;
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 11px; color: white;
  flex-shrink: 0;
}
.user-info { font-size: 11.5px; line-height: 1.25; }
.user-info .role { color: var(--text-3); font-size: 10px; }
.logout-btn {
  height: 34px; padding: 0 12px; border-radius: 9px;
  background: rgba(244,63,94,0.1); color: var(--rose);
  border: 1px solid rgba(244,63,94,0.2);
  font-weight: 600; font-size: 11px;
  transition: all 0.15s;
}
.logout-btn:hover { background: rgba(244,63,94,0.18); }

/* ============ LAYOUT ============ */
.main { flex: 1; display: grid; grid-template-columns: 230px 1fr; overflow: hidden; }

.sidebar {
  background: rgba(11,16,32,0.5);
  backdrop-filter: blur(18px);
  border-inline-end: 1px solid var(--border);
  padding: 16px 11px;
  overflow-y: auto;
  display: flex; flex-direction: column;
}
.nav-group { margin-bottom: 16px; }
.nav-group-title {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--text-3); padding: 0 9px; margin-bottom: 6px; font-weight: 700;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: 9px;
  color: var(--text-2); font-weight: 500; font-size: 12.5px;
  transition: all 0.15s; width: 100%; text-align: start; margin-bottom: 2px;
  border: 1px solid transparent;
}
.nav-item:hover { background: var(--glass); color: var(--text); }
.nav-item.active {
  background: linear-gradient(135deg, rgba(245,185,66,0.15), rgba(245,185,66,0.04));
  color: var(--gold);
  border-color: rgba(245,185,66,0.2);
}
.nav-item.disabled { opacity: 0.35; cursor: not-allowed; }
.nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
.nav-item .badge {
  margin-inline-start: auto;
  background: var(--glass-2); font-size: 10px;
  padding: 2px 6px; border-radius: 5px; font-weight: 700;
  font-family: 'JetBrains Mono', monospace; min-width: 20px; text-align: center;
}
.nav-item.active .badge { background: rgba(245,185,66,0.2); color: var(--gold); }
.nav-item .lock {
  margin-inline-start: auto; opacity: 0.4; width: 12px; height: 12px;
}
.sidebar-foot {
  margin-top: auto; padding: 11px;
  font-size: 10.5px; color: var(--text-3);
  border-top: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 3px;
}
.live-pill { display: flex; align-items: center; gap: 6px; }
.live-pill::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: var(--emerald); box-shadow: 0 0 8px var(--emerald);
  animation: pulse 1.6s infinite;
}
@keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1);} 50% { opacity: 0.5; transform: scale(0.85);} }

.content { overflow-y: auto; padding: 20px 24px 40px; }
.page-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 18px; flex-wrap: wrap; gap: 10px;
}
.page-title { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
.page-sub { color: var(--text-3); font-size: 12.5px; margin-top: 3px; }
.page-actions { display: flex; gap: 8px; flex-wrap: wrap; }

/* ============ BUTTONS ============ */
.btn {
  height: 34px; padding: 0 13px;
  border-radius: 9px; font-weight: 600; font-size: 12.5px;
  display: inline-flex; align-items: center; gap: 6px;
  transition: all 0.15s; white-space: nowrap;
}
.btn svg { width: 14px; height: 14px; }
.btn-primary {
  background: linear-gradient(135deg, var(--gold), var(--gold-2));
  color: #1a1208; box-shadow: 0 4px 14px rgba(245,185,66,0.25);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(245,185,66,0.35); }
.btn-secondary { background: var(--glass); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--glass-2); border-color: var(--border-2); }
.btn-danger { background: rgba(244,63,94,0.12); color: var(--rose); border: 1px solid rgba(244,63,94,0.25); }
.btn-danger:hover { background: rgba(244,63,94,0.2); }
.btn-success { background: rgba(16,185,129,0.12); color: var(--emerald); border: 1px solid rgba(16,185,129,0.25); }
.btn-success:hover { background: rgba(16,185,129,0.2); }
.btn-sm { height: 28px; padding: 0 10px; font-size: 11.5px; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ============ CARDS / KPIS ============ */
.card {
  background: var(--glass); backdrop-filter: blur(18px);
  border: 1px solid var(--border); border-radius: var(--r);
  padding: 16px; position: relative;
}
.card-title {
  font-size: 12.5px; font-weight: 600; color: var(--text-2);
  margin-bottom: 12px;
  display: flex; align-items: center; justify-content: space-between;
}

.kpi-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.kpi {
  background: var(--glass); backdrop-filter: blur(18px);
  border: 1px solid var(--border); border-radius: var(--r);
  padding: 14px 16px; position: relative; overflow: hidden;
}
.kpi::before {
  content: ''; position: absolute; inset-block-start: 0; inset-inline-start: 0;
  width: 3px; height: 100%; background: var(--accent, var(--gold));
}
.kpi-label { font-size: 11.5px; color: var(--text-3); font-weight: 500; }
.kpi-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 26px; font-weight: 700; margin-top: 4px;
  letter-spacing: -0.02em; color: var(--text);
}
.kpi-delta {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10.5px; font-weight: 600; margin-top: 4px;
  padding: 2px 7px; border-radius: 5px;
}
.kpi-delta.up { background: rgba(16,185,129,0.12); color: var(--emerald); }
.kpi-delta.down { background: rgba(244,63,94,0.12); color: var(--rose); }
.kpi-delta.neutral { background: var(--glass-2); color: var(--text-2); }
.kpi-icon {
  position: absolute; inset-block-start: 12px; inset-inline-end: 12px;
  width: 28px; height: 28px; border-radius: 7px;
  background: var(--accent-bg, rgba(245,185,66,0.1));
  color: var(--accent, var(--gold));
  display: flex; align-items: center; justify-content: center;
}
.kpi-icon svg { width: 14px; height: 14px; }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.grid-2-1 { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; margin-bottom: 12px; }
@media (max-width: 1100px) { .grid-2, .grid-3, .grid-2-1 { grid-template-columns: 1fr; } }

/* ============ TABLES ============ */
.table-wrap {
  background: var(--glass); backdrop-filter: blur(18px);
  border: 1px solid var(--border); border-radius: var(--r); overflow: hidden;
}
.table-toolbar {
  padding: 11px 13px;
  display: flex; align-items: center; gap: 9px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.search-input, .filter-select {
  height: 30px; padding: 0 11px;
  background: rgba(0,0,0,0.25); border: 1px solid var(--border);
  border-radius: 7px; color: var(--text); font-size: 12px;
}
.search-input { width: 220px; }
.search-input:focus, .filter-select:focus { outline: none; border-color: var(--gold); }

table.data { width: 100%; border-collapse: collapse; font-size: 12.5px; }
table.data thead th {
  text-align: start; padding: 10px 13px;
  font-weight: 600; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.05em;
  color: var(--text-3); background: rgba(0,0,0,0.18);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
table.data tbody td { padding: 10px 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
table.data tbody tr:last-child td { border-bottom: none; }
table.data tbody tr { transition: background 0.1s; }
table.data tbody tr:hover { background: rgba(255,255,255,0.025); }
table.data tbody tr.clickable { cursor: pointer; }
.empty-state { padding: 40px 20px; text-align: center; color: var(--text-3); font-size: 12.5px; }

/* ============ BADGES ============ */
.badge-status {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 8px; border-radius: 5px;
  font-size: 10.5px; font-weight: 700; white-space: nowrap;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.02em;
}
.badge-status::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
.b-active, .b-running { background: rgba(16,185,129,0.12); color: var(--emerald); }
.b-pending { background: rgba(245,158,11,0.12); color: var(--amber); }
.b-progress { background: rgba(56,189,248,0.12); color: var(--sky); }
.b-done, .b-completed { background: rgba(167,139,250,0.12); color: var(--violet); }
.b-rejected { background: rgba(244,63,94,0.12); color: var(--rose); }
.b-closed, .b-idle { background: rgba(255,255,255,0.06); color: var(--text-3); }
.b-maintenance { background: rgba(244,63,94,0.12); color: var(--rose); }

.dept-tag {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 2px 7px; border-radius: 5px;
  font-size: 10.5px; font-weight: 600;
  background: var(--dept-bg, var(--glass-2));
  color: var(--dept-color, var(--text-2));
}
.dept-tag::before {
  content: ''; width: 5px; height: 5px; border-radius: 50%;
  background: currentColor;
}

/* ============ LIVE PIPELINE (Dashboard) ============ */
.pipeline {
  background: var(--glass); backdrop-filter: blur(18px);
  border: 1px solid var(--border); border-radius: var(--r);
  padding: 22px 18px 18px;
  margin-bottom: 14px;
  position: relative; overflow: hidden;
}
.pipeline-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 22px;
}
.pipeline-title {
  font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px;
}
.pipeline-title::before {
  content: ''; width: 8px; height: 8px; border-radius: 50%;
  background: var(--emerald); box-shadow: 0 0 10px var(--emerald);
  animation: pulse 1.6s infinite;
}
.pipeline-stages {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 0; position: relative;
  padding: 6px 0;
}
@media (max-width: 1300px) { .pipeline-stages { grid-template-columns: repeat(4, 1fr); row-gap: 22px; } }
@media (max-width: 700px) { .pipeline-stages { grid-template-columns: repeat(2, 1fr); } }

.stage {
  position: relative; text-align: center;
  padding: 0 6px;
}
.stage:not(:last-child)::after {
  content: ''; position: absolute;
  inset-block-start: 26px;
  inset-inline-start: 50%;
  width: 100%; height: 2px;
  background: linear-gradient(90deg, var(--border-2), var(--border));
  z-index: 0;
}
body[dir="rtl"] .stage:not(:last-child)::after {
  background: linear-gradient(-90deg, var(--border-2), var(--border));
}
.stage.has-flow::after {
  background: linear-gradient(90deg, var(--gold), var(--gold-2));
  background-size: 200% 100%;
  animation: flow 1.8s linear infinite;
}
@keyframes flow {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.stage-node {
  width: 54px; height: 54px;
  margin: 0 auto;
  border-radius: 50%;
  background: var(--bg-2);
  border: 2px solid var(--border-2);
  display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 800; font-size: 13px;
  position: relative; z-index: 1;
  transition: all 0.3s;
}
.stage.active .stage-node {
  background: linear-gradient(135deg, rgba(245,185,66,0.2), rgba(245,185,66,0.05));
  border-color: var(--gold);
  color: var(--gold);
  box-shadow: 0 0 20px rgba(245,185,66,0.25);
}
.stage.completed .stage-node { border-color: var(--emerald); color: var(--emerald); }
.stage.idle .stage-node { opacity: 0.55; }
.stage-count {
  position: absolute;
  inset-block-start: -6px; inset-inline-end: 12px;
  background: var(--gold); color: #1a1208;
  font-size: 10px; font-weight: 800;
  padding: 1px 6px; border-radius: 8px;
  font-family: 'JetBrains Mono', monospace;
  z-index: 2;
  min-width: 18px; text-align: center;
}
.stage-name { font-size: 10.5px; color: var(--text-2); margin-top: 8px; font-weight: 600; line-height: 1.3; }
.stage-user {
  font-size: 9.5px; color: var(--text-3);
  margin-top: 2px; font-weight: 500;
}
.stage-user .ouser { color: var(--gold); font-weight: 700; }
.stage-flow-anim {
  position: absolute; inset: 0;
  pointer-events: none; overflow: hidden;
  border-radius: var(--r);
}
.flow-particle {
  position: absolute;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 10px var(--gold);
  opacity: 0;
}

/* ============ STATIONS ============ */
.station-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 12px;
}
.station {
  background: var(--glass); backdrop-filter: blur(18px);
  border: 1px solid var(--border); border-radius: var(--r);
  padding: 14px; position: relative; overflow: hidden;
  cursor: pointer; transition: all 0.15s;
}
.station:hover { border-color: var(--border-2); transform: translateY(-2px); }
.station.running { border-color: rgba(16,185,129,0.4); }
.station.running::before {
  content: ''; position: absolute; inset-block-start: 0; inset-inline: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--emerald), transparent);
  background-size: 200% 100%;
  animation: scan 2s infinite linear;
}
@keyframes scan { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.station.idle { opacity: 0.7; }
.station.maintenance { border-color: rgba(244,63,94,0.4); }
.station-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.station-code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px; font-weight: 800; color: var(--gold); letter-spacing: -0.02em;
}
.station-pulse {
  width: 9px; height: 9px; border-radius: 50%; background: var(--text-3);
}
.station.running .station-pulse {
  background: var(--emerald); box-shadow: 0 0 10px var(--emerald);
  animation: pulse 1.6s infinite;
}
.station.maintenance .station-pulse { background: var(--rose); box-shadow: 0 0 10px var(--rose); }
.station-name { font-size: 11.5px; color: var(--text-2); margin-bottom: 10px; min-height: 28px; line-height: 1.35; }
.station-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.station-stat-label { font-size: 9.5px; color: var(--text-3); text-transform: uppercase; }
.station-stat-value { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 15px; }
.station-progress {
  height: 4px; background: rgba(255,255,255,0.05);
  border-radius: 2px; margin-top: 11px; overflow: hidden;
}
.station-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold-2));
  border-radius: 2px; transition: width 0.4s;
}
.station-operator {
  margin-top: 10px; padding-top: 10px;
  border-top: 1px solid var(--border);
  font-size: 10.5px; color: var(--text-3);
  display: flex; align-items: center; gap: 6px;
}
.station-operator .opname { color: var(--text-2); font-weight: 600; }

/* ============ FORMS ============ */
.form-grid { display: grid; gap: 12px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }
@media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 11.5px; font-weight: 600; color: var(--text-2); }
.field label .req { color: var(--rose); }
.field input, .field select, .field textarea {
  height: 36px; padding: 0 11px;
  background: rgba(0,0,0,0.28); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 12.5px; width: 100%;
}
.field textarea { height: auto; padding: 9px 11px; min-height: 64px; resize: vertical; }
.field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--gold); }
.field-hint { font-size: 10.5px; color: var(--text-3); }

/* ============ MODAL ============ */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
  z-index: 100; display: none;

@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ============ LOGIN SPLASH ============ */
.splash {
  position: fixed; inset: 0;

}
.splash::before {

.splash-sub { text-align: center; color: var(--text-3); font-size: 12px; margin-bottom: 22px; }

.user-card-list {

  padding: 2px;
}
.user-card {
  display: flex; align-items: center; gap: 11px;
  padding: 10px 12px;
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 10px;

  text-align: start;
}

.user-card-name { font-size: 13px; font-weight: 600; }

/* ============ DYNAMIC VISUALIZATIONS (Phase 1.4a-viz) ============ */

/* Animated counter — pulses on change */
.counter-pulse {
  animation: counterPulse 0.6s ease;
}
@keyframes counterPulse {
  0% { transform: scale(1); color: var(--text); }
  40% { transform: scale(1.08); color: var(--gold); text-shadow: 0 0 20px rgba(245,185,66,0.5); }
  100% { transform: scale(1); color: var(--text); }
}

/* WO tokens that ride the pipeline */
.pipeline-track {
  position: relative;
  height: 130px;
  margin: 8px -8px 12px -8px;
  background: linear-gradient(180deg, transparent, rgba(255,255,255,0.02));
  border-radius: var(--r);
  overflow: hidden;
}
.pipeline-track::before {
  content: '';
  position: absolute;
  top: 65px; left: 24px; right: 24px;
  height: 3px;
  background: linear-gradient(90deg,
    rgba(245,185,66,0.15) 0%,
    rgba(245,185,66,0.4) 50%,
    rgba(245,185,66,0.15) 100%);
  background-size: 200% 100%;
  animation: trackFlow 3s linear infinite;
  border-radius: 2px;
  z-index: 0;
}
@keyframes trackFlow {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.stage-marker {

  background: linear-gradient(180deg, transparent, var(--border-2), transparent);

}
.stage-marker-label {
  position: absolute;

  font-size: 9.5px;

}
.stage-marker.has-wo .stage-marker-label {

  background: rgba(245,185,66,0.1);
  border: 1px solid rgba(245,185,66,0.3);
}
.wo-token {
  position: absolute;
  top: 56px;
  width: 64px;
  margin-left: -32px;
  background: linear-gradient(135deg, var(--bg-2), var(--bg-3));
  border: 1.5px solid var(--gold);
  border-radius: 9px;
  padding: 5px 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  font-weight: 700;
  color: var(--gold);

  cursor: pointer;
}
.wo-token::before {
  content: '';

  top: -4px; left: 50%;
  transform: translateX(-50%);
  border: 4px solid transparent;
  border-bottom-color: var(--gold);
}
.wo-token.priority-high {

  color: var(--rose);
  box-shadow: 0 4px 14px rgba(244,63,94,0.3), 0 0 0 1px rgba(244,63,94,0.15);
}
.wo-token.priority-high::before { border-bottom-color: var(--rose); }
.wo-token.just-moved { animation: tokenLand 0.9s ease; }
@keyframes tokenLand {

  40% { transform: scale(1.15); }

  100% { transform: scale(1); }

.wo-token-id { font-size: 9px; line-height: 1.1; }

.wo-token-empty {

/* Dashboard grid for charts */

}

}

/* Donut */
.donut-segment {

}

/* Gauge */
.gauge-wrap {

}

}

/* Radial bars (station performance) */
.radial-row {
  display: grid;
  grid-template-columns: 32px 1fr 60px;
  gap: 10px;
  align-items: center;
  margin-bottom: 9px;
}

  font-family: 'JetBrains Mono', monospace;

  border-radius: 4px;

  position: relative;
}
.radial-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold-2));
  border-radius: 4px;
  transition: width 0.9s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
}
.radial-fill.full { background: linear-gradient(90deg, var(--emerald), var(--emerald-2)); }
.radial-fill.warn { background: linear-gradient(90deg, var(--amber), #d97706); }
.radial-fill.idle { background: rgba(255,255,255,0.1); }
.radial-fill::after {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 6px; height: 100%;
  background: rgba(255,255,255,0.4);
  filter: blur(3px);
}
.radial-stat {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-2);
  text-align: end;
}

/* Card shimmer on data refresh */
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }

.refreshed {

const STORAGE_KEY = 'prodline_os_v2';

const State = {
  data: null, route: 'dashboard', user: null, lang: 'ar', liveTimer: null,
  load() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { try { this.data = JSON.parse(raw); } catch(e) { this.data = Seed.generate(); } }
    else { this.data = Seed.generate(); }
    this.migrate();
    this.save();
  },
  // Forward-compatible migration so older saves get new fields
  migrate() {
    if (!this.data.departments) {
      // Deep copy DEPTS into mutable storage
      this.data.departments = JSON.parse(JSON.stringify(DEPTS));
    }
    if (!this.data.stageOverrides) this.data.stageOverrides = {};
    if (!this.data.meta) this.data.meta = { version: '1.0', initialized: now() };
  },
  save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(this.data)); },
  reset() { localStorage.removeItem(STORAGE_KEY); this.data = Seed.generate(); this.migrate(); this.save(); }
};

const t = (k) => I18N[State.lang][k] || k;
const uid = (p='ID') => p + '-' + Date.now().toString(36).toUpperCase().slice(-4) + Math.random().toString(36).toUpperCase().slice(2,5);
const now = () => new Date().toISOString();

const fmt = {
  num(n) { return new Intl.NumberFormat('en-US').format(Math.round(n||0)); },
  pct(n,d=1) { return ((n||0)).toFixed(d) + '%'; },
  date(iso) { if (!iso) return '—'; const d = new Date(iso); return d.toLocaleDateString('en-GB') + ' ' + d.toTimeString().slice(0,5); },
  ago(iso) {
    if (!iso) return '—';
    const m = (Date.now() - new Date(iso).getTime()) / 60000;
    if (m < 1) return State.lang === 'ar' ? 'الآن' : 'now';
    if (m < 60) return Math.round(m) + (State.lang === 'ar' ? ' د' : 'm');
    if (m < 1440) return Math.round(m/60) + (State.lang === 'ar' ? ' س' : 'h');
    return Math.round(m/1440) + (State.lang === 'ar' ? ' ي' : 'd');
  }
};

function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  const i = {success:'✓', error:'✕', warn:'⚠', info:'ℹ'};
  el.innerHTML = `<span style="font-weight:700;font-size:14px">${i[type]||'•'}</span><span>${msg}</span>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=> el.style.opacity='0', 2800);
  setTimeout(()=> el.remove(), 3200);
}

const escapeHTML = (s) => String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

const STAGE_ORDER = ['CREATED','MAT_REQUEST','MAT_ISSUED','AT_K1','AT_K2','AT_K3','AT_K4','AT_MOC','AT_PMF','AT_GDN','DELIVERED'];
const stageById = (id) => {
  const base = STAGES.find(s => s.id === id);
  if (!base) return null;
  const ov = State.data?.stageOverrides?.[id];
  if (!ov) return base;
  return Object.assign({}, base, ov);
};
const nextStage = (id) => { const i = STAGE_ORDER.indexOf(id); return i >= 0 && i < STAGE_ORDER.length - 1 ? STAGE_ORDER[i+1] : null; };

const Perm = {
  isManager: () => State.user?.dept === 'MGMT',
  // Can the current user act on this dept?
  canAct(dept) {
    if (!State.user) return false;
    if (State.user.dept === 'MGMT') return true;
    return State.user.dept === dept;
  },
  // Can perform action at current WO stage?
  canActOnWO(wo) {
    const st = stageById(wo.currentStage);
    if (!st) return false;
    return this.canAct(st.dept);
  },
  // Can the user view this module?
  canView(module) {
    const u = State.user; if (!u) return false;
    if (u.dept === 'MGMT') return true;
    const map = {
      dashboard: true,
      mytasks: true,
      floor: ['PROD','QC','MGMT'],
      workorders: true,
      warehouses: ['RAW','IFA','PMF','GDN','MGMT'],
      quality: ['QC','MGMT'],
      maintenance: ['MAINT','PROD','MGMT'],
      trace: true,
      audit: ['MGMT'],
      admin: ['MGMT'],
    };
    const allowed = map[module];
    if (allowed === true) return true;
    return Array.isArray(allowed) && allowed.includes(u.dept);
  }
};

/* ============ HELPERS ============ */
const Q = {
  user(id) { return State.data.users.find(u => u.id === id); },
  station(id) { return State.data.stations.find(s => s.id === id); },
  wh(id) { return State.data.warehouses.find(w => w.id === id); },
  whByDept(dept) { return State.data.warehouses.find(w => w.dept === dept); },
  wo(id) { return State.data.workOrders.find(w => w.id === id); },
  usersOf(dept) { return State.data.users.filter(u => u.dept === dept); },
  dept(id) { return (State.data.departments && State.data.departments[id]) || DEPTS[id] || { id, name: id, nameEn: id, color: '#888', bg: 'rgba(136,136,136,0.12)' }; },
  ownerOfStage(stage) {
    // Returns the responsible user for a given stage
    if (stage === 'CREATED' || stage === 'MAT_REQUEST') return Q.usersOf('PROD').find(u => u.role.includes('مشرف') || u.roleEn.includes('Supervisor'))?.id;
    if (stage === 'MAT_ISSUED') return Q.usersOf('RAW')[0]?.id;
    if (stage === 'AT_K1') return Q.station('K1').operatorId;
    if (stage === 'AT_K2') return Q.station('K2').operatorId;
    if (stage === 'AT_K3') return Q.station('K3').operatorId;
    if (stage === 'AT_K4') return Q.station('K4').operatorId;
    if (stage === 'AT_MOC') return Q.station('MOC').operatorId;
    if (stage === 'AT_PMF') return Q.whByDept('PMF').managerId;
    if (stage === 'AT_GDN') return Q.whByDept('GDN').managerId;
    return null;
  },
  woCountByStage() {
    const map = {};
    STAGE_ORDER.forEach(s => map[s] = 0);
    State.data.workOrders.forEach(wo => {
      if (wo.currentStage !== 'DELIVERED') {
        if (map[wo.currentStage] !== undefined) map[wo.currentStage]++;
      }
    });
    return map;
  },
  // Tasks pending for current user
  myTasks() {
    if (!State.user) return [];
    const tasks = [];
    State.data.workOrders.forEach(wo => {
      if (wo.currentStage === 'DELIVERED' || wo.currentStage === 'REJECTED') return;
      if (wo.currentOwner === State.user.id || (Perm.isManager() && wo.currentStage !== 'DELIVERED')) {
        tasks.push({ wo, stage: stageById(wo.currentStage) });
      }
    });
    return tasks;
  }
};

/* ============ WORKFLOW ENGINE ============ */
const WF = {
  // Move WO to next stage with full audit
  advance(woId, opts = {}) {
    const wo = Q.wo(woId);
    if (!wo) return false;
    const next = nextStage(wo.currentStage);
    if (!next) { toast(State.lang === 'ar' ? 'لا توجد مرحلة تالية' : 'No next stage', 'warn'); return false; }
    if (!Perm.canActOnWO(wo)) { toast(t('no_perm'), 'error'); return false; }

    const fromUser = State.user.id;
    const toUser = Q.ownerOfStage(next);
    const qty = opts.qty != null ? opts.qty : wo.produced || wo.qty;
    const scrap = opts.scrap || 0;

    wo.history.push({
      stage: next,
      action: opts.action || 'handover',
      fromUser, toUser,
      qty, scrap,
      ts: now(),
      notes: opts.notes || ''
    });
    wo.currentStage = next;
    wo.currentOwner = toUser;
    if (opts.scrap) wo.scrap = (wo.scrap || 0) + scrap;
    if (opts.qty != null) wo.produced = opts.qty;

    Audit.log('advance_wo', 'WorkOrder', woId, { from: stageById(wo.history[wo.history.length-2]?.stage)?.id, to: next, qty, scrap });
    Movements.add('ok', `${woId} → ${stageById(next).name} (${fmt.num(qty)} قطعة)`, { woId, stage: next });
    State.save();
    return true;
  },

  reject(woId, qtyAccepted, qtyRejected, notes) {
    const wo = Q.wo(woId);
    if (!wo) return false;
    if (wo.currentStage !== 'AT_MOC') { toast(State.lang==='ar'?'لا يمكن الرفض من هذه المرحلة':'Cannot reject from this stage', 'error'); return false; }
    if (!Perm.canActOnWO(wo)) { toast(t('no_perm'), 'error'); return false; }

    wo.history.push({
      stage: 'REJECTED', action: 'reject',
      fromUser: State.user.id, toUser: null,
      qty: qtyRejected, scrap: qtyRejected,
      ts: now(),
      notes: notes || `قبول ${qtyAccepted} ورفض ${qtyRejected}`,
    });
    wo.currentStage = 'REJECTED';
    wo.currentOwner = null;
    wo.scrap = (wo.scrap || 0) + qtyRejected;
    Audit.log('reject_wo', 'WorkOrder', woId, { accepted: qtyAccepted, rejected: qtyRejected, notes });
    Movements.add('err', `${woId} مرفوض من MOC — ${qtyRejected} قطعة scrap`, { woId });
    State.save();
    return true;
  },

  acceptMOC(woId, qty, scrap, notes) {
    const wo = Q.wo(woId);
    if (!wo || wo.currentStage !== 'AT_MOC') return false;
    if (!Perm.canActOnWO(wo)) { toast(t('no_perm'), 'error'); return false; }
    const toUser = Q.ownerOfStage('AT_PMF');
    wo.history.push({
      stage: 'AT_PMF', action: 'accept',
      fromUser: State.user.id, toUser,
      qty, scrap: scrap || 0, ts: now(),
      notes: notes || 'قبول MOC، نقل PMF',
    });
    wo.currentStage = 'AT_PMF';
    wo.currentOwner = toUser;
    if (scrap) wo.scrap = (wo.scrap || 0) + scrap;
    wo.produced = qty;
    Audit.log('moc_accept', 'WorkOrder', woId, { qty, scrap });
    Movements.add('ok', `${woId} قبول MOC ✓ — ${fmt.num(qty)} قطعة → PMF`, { woId });
    State.save();
    return true;
  }
};

/* ============ DYNAMIC VISUALIZATION HELPERS (Phase 1.4a-viz) ============ */

// Counter animation: smoothly tween a numeric DOM element from old to new value
const Animate = {
  counter(el, fromVal, toVal, opts = {}) {
    if (!el || fromVal === toVal) return;
    const duration = opts.duration || 700;
    const formatter = opts.formatter || (v => fmt.num(v));
    const start = performance.now();
    const diff = toVal - fromVal;
    const ease = (t) => 1 - Math.pow(1 - t, 3); // ease-out cubic
    function step(now) {
      const t = Math.min(1, (now - start) / duration);
      const v = fromVal + diff * ease(t);
      el.textContent = formatter(v);
      if (t < 1) requestAnimationFrame(step);
      else {
        el.textContent = formatter(toVal);
        el.classList.add('counter-pulse');
        setTimeout(() => el.classList.remove('counter-pulse'), 700);
      }
    }
    requestAnimationFrame(step);
  },
  pct(el, fromVal, toVal, opts = {}) {
    this.counter(el, fromVal, toVal, { ...opts, formatter: v => v.toFixed(opts.decimals||1) + '%' });
  }
};

// Track historical snapshots for time-series charts
const History = {
  push() {
    if (!State.data.history) State.data.history = { hourly: [], daily: [] };
    const wos = State.data.workOrders;
    const now = Date.now();
    const totalProduced = wos.reduce((s,w) => s + (w.produced||0), 0);
    const totalScrap = wos.reduce((s,w) => s + (w.scrap||0), 0);
    const snap = {
      ts: now,
      produced: totalProduced,
      scrap: totalScrap,
      activeWO: wos.filter(w => !['DELIVERED','REJECTED'].includes(w.currentStage)).length,
      stationsRunning: State.data.stations.filter(s => s.status === 'running').length,
    };
    // Keep last 24 hourly snapshots (one per hour)
    const lastHour = State.data.history.hourly.slice(-1)[0];
    if (!lastHour || (now - lastHour.ts) > 3600000) {
      State.data.history.hourly.push(snap);
      if (State.data.history.hourly.length > 24) State.data.history.hourly.shift();
    } else {
      // Update last entry if within same hour
      State.data.history.hourly[State.data.history.hourly.length - 1] = snap;
    }
  },
  // Synthesize 24h of hourly data on first run so charts have something to show
  seed() {
    if (!State.data.history) State.data.history = { hourly: [], daily: [] };
    if (State.data.history.hourly.length >= 6) return;
    const now = Date.now();
    const baseProduced = 11200;
    for (let i = 23; i >= 0; i--) {
      const ts = now - i * 3600000;
      // Realistic production curve with night dip
      const hour = new Date(ts).getHours();
      const intensity = (hour >= 22 || hour < 6) ? 0.2 + Math.random()*0.1
                      : (hour >= 8 && hour < 17) ? 0.85 + Math.random()*0.15
                      : 0.5 + Math.random()*0.2;
      State.data.history.hourly.push({
        ts,
        produced: Math.round(baseProduced + (24-i) * 180 * intensity + Math.random()*60),
        scrap: Math.round(40 + i * 0.8 + Math.random()*8),
        activeWO: 2 + Math.floor(Math.random() * 3),
        stationsRunning: hour >= 8 && hour < 17 ? 4 : 2,
      });
    }
  }
};

/* ============ CHART BUILDERS (vanilla SVG) ============ */
const Chart = {

  // Line chart with area fill — for throughput/scrap trend
  line(data, opts = {}) {
    if (!data || data.length === 0) return '<div class="empty-state" style="padding:30px">لا توجد بيانات</div>';
    const w = opts.width || 400, h = opts.height || 130;
    const pad = { top: 10, right: 10, bottom: 22, left: 32 };
    const innerW = w - pad.left - pad.right;
    const innerH = h - pad.top - pad.bottom;
    const xs = data.map((_,i) => i);
    const ys = data.map(d => d.value);
    const minY = 0;
    const maxY = Math.max(...ys, 1) * 1.1;
    const xScale = (i) => pad.left + (i / Math.max(1, data.length-1)) * innerW;
    const yScale = (v) => pad.top + innerH - ((v - minY) / (maxY - minY)) * innerH;

    const points = data.map((d,i) => `${xScale(i)},${yScale(d.value)}`).join(' ');
    const areaPath = `M ${xScale(0)},${yScale(0)} L ${data.map((d,i) => `${xScale(i)},${yScale(d.value)}`).join(' L ')} L ${xScale(data.length-1)},${yScale(0)} Z`;
    const linePath = `M ${data.map((d,i) => `${xScale(i)},${yScale(d.value)}`).join(' L ')}`;

    // Gridlines (3 horizontal)
    const gridLines = [0.25, 0.5, 0.75].map(p => {
      const y = pad.top + innerH * p;
      return `<line class="chart-grid-line" x1="${pad.left}" x2="${pad.left+innerW}" y1="${y}" y2="${y}"/>`;
    }).join('');

    // Y axis labels
    const yLabels = [0, 0.5, 1].map(p => {
      const v = minY + (maxY - minY) * (1 - p);
      const y = pad.top + innerH * p;
      return `<text class="chart-label" x="${pad.left-5}" y="${y+3}" text-anchor="end">${fmt.num(v)}</text>`;
    }).join('');

    // X axis labels (first, mid, last)
    const xLabelsIdx = [0, Math.floor(data.length/2), data.length-1];
    const xLabels = xLabelsIdx.map(i => {
      if (!data[i]) return '';
      return `<text class="chart-label" x="${xScale(i)}" y="${h-5}" text-anchor="middle">${escapeHTML(data[i].label||'')}</text>`;
    }).join('');

    // Last value marker
    const lastIdx = data.length-1;
    const marker = `<circle cx="${xScale(lastIdx)}" cy="${yScale(data[lastIdx].value)}" r="4" fill="var(--gold)" stroke="var(--bg-1)" stroke-width="2"/>`;

    return `<svg class="chart-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
      <defs>
        <linearGradient id="goldArea" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="var(--gold)" stop-opacity="0.4"/>
          <stop offset="100%" stop-color="var(--gold)" stop-opacity="0"/>
        </linearGradient>
      </defs>
      ${gridLines}
      ${yLabels}
      <path class="chart-area" d="${areaPath}"/>
      <path class="chart-line" d="${linePath}"/>
      ${marker}
      ${xLabels}
    </svg>`;
  },

  // Donut chart for stage distribution
  donut(segments, opts = {}) {
    const total = segments.reduce((s,seg) => s + seg.value, 0);
    if (total === 0) {
      return `<svg class="chart-svg" viewBox="0 0 200 130">
        <circle cx="100" cy="65" r="42" fill="none" stroke="var(--border)" stroke-width="12"/>
        <text class="donut-center-value" x="100" y="68" text-anchor="middle">0</text>
        <text class="donut-center-label" x="100" y="84" text-anchor="middle">${opts.centerLabel||'لا توجد'}</text>
      </svg><div class="donut-legend"></div>`;
    }
    const cx = 100, cy = 65, r = 42, strokeW = 12;
    const circumference = 2 * Math.PI * r;
    let cumPct = 0;
    const arcs = segments.map((seg, i) => {
      const pct = seg.value / total;
      const dasharray = `${pct * circumference} ${circumference}`;
      const offset = -cumPct * circumference;
      cumPct += pct;
      return `<circle class="donut-segment" cx="${cx}" cy="${cy}" r="${r}" fill="none"
        stroke="${seg.color||'var(--gold)'}" stroke-width="${strokeW}"
        stroke-dasharray="${dasharray}" stroke-dashoffset="${offset}"
        transform="rotate(-90 ${cx} ${cy})"/>`;
    }).join('');

    const centerVal = opts.centerValue != null ? opts.centerValue : total;
    const legend = segments.filter(s => s.value > 0).map(s => `<span class="donut-legend-item" style="--legend-color:${s.color}">${escapeHTML(s.label)} <b style="color:var(--text)">${s.value}</b></span>`).join('');

    return `<svg class="chart-svg" viewBox="0 0 200 130">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="${strokeW}"/>
      ${arcs}
      <text class="donut-center-value" x="${cx}" y="${cy+5}" text-anchor="middle">${fmt.num(centerVal)}</text>
      <text class="donut-center-label" x="${cx}" y="${cy+22}" text-anchor="middle">${escapeHTML(opts.centerLabel||'')}</text>
    </svg>
    <div class="donut-legend">${legend}</div>`;
  },

  // Gauge chart for OEE / health score
  gauge(value, opts = {}) {
    const max = opts.max || 100;
    const v = Math.max(0, Math.min(max, value));
    const pct = v / max;
    const cx = 100, cy = 80, r = 50;
    // Half circle from 180° to 360°
    const arcLen = Math.PI * r; // semicircle circumference
    const dashArray = `${arcLen * pct} ${arcLen}`;
    const cls = pct >= 0.85 ? 'good' : pct >= 0.6 ? '' : pct >= 0.4 ? 'warn' : 'bad';
    return `<svg class="chart-svg" viewBox="0 0 200 110" style="height:110px">
      <path class="gauge-arc-bg" d="M ${cx-r},${cy} A ${r},${r} 0 0 1 ${cx+r},${cy}"/>
      <path class="gauge-arc ${cls}" d="M ${cx-r},${cy} A ${r},${r} 0 0 1 ${cx+r},${cy}" stroke-dasharray="${dashArray}"/>
      <text x="${cx}" y="${cy-8}" text-anchor="middle" style="font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;fill:var(--text)">${v.toFixed(0)}<tspan style="font-size:14px;fill:var(--text-3)">${opts.unit||'%'}</tspan></text>
      <text x="${cx}" y="${cy+8}" text-anchor="middle" style="font-size:10px;fill:var(--text-3)">${escapeHTML(opts.label||'')}</text>
    </svg>`;
  },

  // Radial bars for station performance comparison
  radialBars(rows, opts = {}) {
    return rows.map(row => {
      const pct = Math.min(100, row.pct);
      const cls = row.status === 'maintenance' ? 'warn' : row.status === 'idle' ? 'idle' : pct >= 95 ? 'full' : '';
      return `<div class="radial-row">
        <div class="radial-code">${escapeHTML(row.code)}</div>
        <div class="radial-track"><div class="radial-fill ${cls}" style="width:${pct}%"></div></div>
        <div class="radial-stat">${row.stat}</div>
      </div>`;
    }).join('');
  },

  // Sparkline (mini line chart for KPI cards)
  sparkline(values, opts = {}) {
    if (!values || values.length === 0) return '';
    const w = 80, h = 24;
    const min = Math.min(...values), max = Math.max(...values);
    const range = max - min || 1;
    const xs = (i) => (i / (values.length-1)) * w;
    const ys = (v) => h - ((v - min) / range) * h;
    const path = values.map((v,i) => `${xs(i)},${ys(v)}`).join(' ');
    const color = opts.color || 'var(--gold)';
    return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><polyline points="${path}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  }
};

/* ============ APP / ROUTER ============ */
const App = {
  async init() {
    State.load();
    // If Supabase isn't configured, fall back to legacy demo mode
    if (!sb) {
      this.showLoginError('⚠️ لم يتم ضبط Supabase. حرّر القيم في الكود (SUPABASE_CONFIG) لتفعيل الدخول.');
      return;
    }
    // Try to restore existing session
    try {
      const { data: { session } } = await sb.auth.getSession();
      if (session?.user) {
        await this.afterAuth(session.user);
        return;
      }
    } catch (e) { console.warn('Session check failed:', e); }
    // Otherwise show login form
    this.focusLogin();
    // Listen for auth state changes (in case of token refresh, logout in another tab)
    sb.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_OUT' && State.user) {
        State.user = null;
        this.stopLive();
        document.getElementById('app').classList.add('hidden');
        document.getElementById('splash').classList.remove('hidden');
        this.focusLogin();
      }
    });
  },

  focusLogin() {
    setTimeout(() => {
      const el = document.getElementById('loginEmail');
      if (el) el.focus();
    }, 50);
  },

  showLoginError(msg) {
    const el = document.getElementById('loginError');
    if (!el) return;
    el.textContent = msg;
    el.style.display = 'block';
  },
  clearLoginError() {
    const el = document.getElementById('loginError');
    if (el) el.style.display = 'none';
  },

  async doLogin() {
    if (!sb) { this.showLoginError('Supabase غير مهيّأ'); return; }
    this.clearLoginError();
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.textContent = '...جاري الدخول';
    try {
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if (error) {
        this.showLoginError(error.message === 'Invalid login credentials' ? 'إيميل أو كلمة سر خاطئة' : error.message);
        return;
      }
      await this.afterAuth(data.user);
    } catch (e) {
      this.showLoginError('خطأ في الاتصال بـ Supabase: ' + e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = 'دخول النظام';
    }
  },

  // After successful auth, fetch user profile from public.users and bootstrap UI
  async afterAuth(authUser) {
    try {
      const { data: profile, error } = await sb.from('users')
        .select('*')
        .eq('auth_user_id', authUser.id)
        .single();
      if (error || !profile) {
        this.showLoginError('الإيميل صحيح لكن لا يوجد ملف مستخدم مرتبط في public.users. تواصل مع المدير.');
        await sb.auth.signOut();
        return;
      }
      // Map Supabase profile shape (snake_case) to internal user object
      const u = this._mapProfile(profile);
      // Inject into State.data.users (so all existing code that uses Q.user(id) works)
      const existing = State.data.users.findIndex(x => x.id === u.id);
      if (existing >= 0) State.data.users[existing] = u; else State.data.users.unshift(u);
      State.user = u;
      State.save();

      document.getElementById('splash').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      document.getElementById('userAvatar').textContent = u.avatar;
      document.getElementById('userAvatar').style.background = u.color;
      document.getElementById('userName').textContent = State.lang==='ar' ? u.name : u.nameEn;
      document.getElementById('userRole').textContent = State.lang==='ar' ? u.role : u.roleEn;
      Audit.log('login', 'User', u.id, { method: 'supabase' });
      this.renderSidebar();
      this.startLive();
      this.goto('dashboard');
    } catch (e) {
      this.showLoginError('خطأ في تحميل ملف المستخدم: ' + e.message);
    }
  },

  // Convert Supabase row (snake_case) to internal shape (camelCase)
  _mapProfile(row) {
    return {
      id: row.id,
      auth_user_id: row.auth_user_id,
      name: row.name_ar,
      nameEn: row.name_en,
      dept: row.dept_id,
      role: row.role_ar,
      roleEn: row.role_en,
      color: row.color || '#888',
      avatar: row.avatar || (row.name_ar ? row.name_ar.charAt(0) : '?'),
      active: row.active !== false,

  cleanDemoData() {
    const ar = State.lang === 'ar';
    const counts = {
      wo: State.data.workOrders.length,
      mv: State.data.movements.length,
      ad: State.data.audit.length,
      mr: State.data.maintenance.length,
    };

    // Wipe operational data
    State.data.workOrders = [];
    State.data.movements = [];
    State.data.audit = [];
    State.data.maintenance = [];
    State.data.history = { hourly: [], daily: [] };

    // Reset stations to idle (keep operators and names)
    State.data.stations.forEach(s => {
      s.status = 'idle';
      s.currentWO = null;
      s.target = 0;
      s.produced = 0;
      s.scrap = 0;
      s.startedAt = null;
    });

    // Reset warehouse allocations to zero (keep stock quantities)
    State.data.warehouses.forEach(wh => {
      wh.items.forEach(it => { it.allocated = 0; });
    });

    // Log this admin action as the FIRST entry in the new audit log
    Audit.log('clean_demo_data', 'System', 'all', counts);
    Movements.add('warn', ar?'تم تنظيف البيانات التشغيلية — النظام جاهز للإنتاج':'Operational data cleaned — system ready for production', counts);

    State.save();
    this.closeModal();
    toast(ar?`تم الحذف: ${counts.wo} WO، ${counts.mv} حركة، ${counts.ad} سجل`:`Deleted ${counts.wo} WOs, ${counts.mv} movements, ${counts.ad} logs`, 'success');
    this.renderSidebar();
    this.goto('dashboard');
  },

  // ============ LIVE SIMULATION ============
  startLive() {
    this.stopLive();
    this.liveTimer = setInterval(() => {
      // Simulate slight production progress on running stations
      const k1 = Q.station('K1');
      const k2 = Q.station('K2');
      if (k1.status === 'running' && k1.produced < k1.target) {
        const inc = Math.floor(Math.random() * 12) + 4;
        k1.produced = Math.min(k1.target, k1.produced + inc);
      }
      if (k2.status === 'running' && k2.produced < k1.produced - 50) {
        const inc = Math.floor(Math.random() * 10) + 3;
        k2.produced = Math.min(k1.produced - 50, k2.produced + inc);
      }
      // Advance dashboard if it's the active page
      if (State.route === 'dashboard') View.refreshDashboard();
      if (State.route === 'floor') View.refreshFloor();
    }, 3000);
  },
  stopLive() { if (this.liveTimer) clearInterval(this.liveTimer); this.liveTimer = null; },
};

  // Compute all dashboard metrics in one shot
  _metrics() {
    const wos = State.data.workOrders;
    const active = wos.filter(w => w.currentStage !== 'DELIVERED' && w.currentStage !== 'REJECTED');
    const delivered = wos.filter(w => w.currentStage === 'DELIVERED');
    const totalProduced = wos.reduce((s,w) => s + (w.produced||0), 0);
    const totalScrap = wos.reduce((s,w) => s + (w.scrap||0), 0);
    const scrapRate = totalProduced > 0 ? (totalScrap / (totalProduced + totalScrap)) * 100 : 0;
    const inMOC = wos.filter(w => w.currentStage === 'AT_MOC').length;
    const stationsRunning = State.data.stations.filter(s => s.status === 'running').length;
    const hist = State.data.history?.hourly || [];
    const last1h = hist.length >= 2 ? Math.max(0, hist[hist.length-1].produced - hist[hist.length-2].produced) : 0;
    return { active, delivered: delivered.length, totalProduced, totalScrap, scrapRate, inMOC, stationsRunning, last1h };
  },

  kpiHTML(m) {
    const ar = State.lang === 'ar';
    const k = (id, label, val, accent, bg, sub) => `
      <div class="kpi" style="--accent:${accent};--accent-bg:${bg}">
        <div class="kpi-label">${label}</div>
        <div class="kpi-value" id="${id}">${val}</div>

    return [
      k('kpiActive', ar?'WO نشط':'Active WO', m.active.length, 'var(--gold)', 'rgba(245,185,66,0.1)', ar?'في الإنتاج الآن':'in production'),
      k('kpiProduced', ar?'إجمالي المنتج':'Total Produced', fmt.num(m.totalProduced), 'var(--emerald)', 'rgba(16,185,129,0.1)', ar?'وحدة':'units'),
      k('kpiScrap', ar?'نسبة الـ Scrap':'Scrap Rate', m.scrapRate.toFixed(2)+'%', m.scrapRate>2?'var(--rose)':'var(--emerald)', m.scrapRate>2?'rgba(244,63,94,0.1)':'rgba(16,185,129,0.1)', m.scrapRate>2?(ar?'مرتفع':'high'):(ar?'ضمن الحد':'within target')),
      k('kpiMOC', ar?'بانتظار MOC':'Awaiting MOC', m.inMOC, 'var(--violet)', 'rgba(167,139,250,0.1)', ar?'دفعة':'batches'),
      k('kpiRunning', ar?'محطات شغّالة':'Running Stations', m.stationsRunning + '/5', 'var(--sky)', 'rgba(56,189,248,0.1)', ar?'من 5':'of 5'),
      k('kpiDelivered', ar?'تم تسليم':'Delivered', m.delivered, 'var(--teal)', 'rgba(20,184,166,0.1)', ar?'دفعة':'total'),
    ].join('');
  },

  // Dynamic pipeline track: WOs ride the line as tokens that move when stages change
  pipelineHTML() {
    const ar = State.lang === 'ar';
    const stages = STAGE_ORDER.map(id => stageById(id));
    const total = stages.length;

    // Build stage markers with their position
    const markers = stages.map((s, i) => {
      const x = ((i + 0.5) / total) * 100;
      const ownerId = Q.ownerOfStage(s.id);
      const owner = ownerId ? Q.user(ownerId) : null;
      const counts = Q.woCountByStage();
      const c = counts[s.id] || 0;
      const ownerLabel = owner ? `${owner.avatar}` : '';
      return `<div class="stage-marker ${c>0?'has-wo':''}" style="${ar?'right':'left'}:${x}%" onclick="View.filterByStage('${s.id}')">
        <div class="stage-marker-label">${s.code}${ownerLabel?` · ${ownerLabel}`:''}</div>
      </div>`;
    }).join('');

    // Compute WO positions on the track based on currentStage
    // Group WOs by stage so they don't overlap perfectly
    const activeWOs = State.data.workOrders.filter(w => !['DELIVERED','REJECTED'].includes(w.currentStage));
    const woByStage = {};
    activeWOs.forEach(w => {
      if (!woByStage[w.currentStage]) woByStage[w.currentStage] = [];
      woByStage[w.currentStage].push(w);
    });

    let tokens = '';
    Object.keys(woByStage).forEach(stage => {
      const stageIdx = STAGE_ORDER.indexOf(stage);
      if (stageIdx < 0) return;
      const baseX = ((stageIdx + 0.5) / total) * 100;
      woByStage[stage].forEach((w, idx) => {
        // slight horizontal offset for multiple WOs at same stage
        const offsetPct = (idx - (woByStage[stage].length-1)/2) * 1.2;
        const x = baseX + offsetPct;
        const justMoved = w._justMoved ? 'just-moved' : '';
        const priority = w.priority === 'high' ? 'priority-high' : '';
        const dirAttr = ar ? `right:${x}%` : `left:${x}%`;
        tokens += `<div class="wo-token ${priority} ${justMoved}" style="${dirAttr}" data-wo="${w.id}" onclick="Action.openWO('${w.id}')">
          <div class="wo-token-id">${w.id.split('-').pop()}</div>
          <div class="wo-token-qty">${fmt.num(w.produced||w.qty)}</div>
        </div>`;
      });
    });

    if (activeWOs.length === 0) {
      tokens = `<div class="wo-token-empty">${ar?'لا توجد WOs في الخط حالياً':'No WOs on the line right now'}</div>`;
    }

    return `
      <div class="pipeline-head">
        <div class="pipeline-title">${ar?'مسار الإنتاج المباشر':'Live Production Pipeline'}</div>
        <div class="text-mute" style="font-size:11px">${activeWOs.length} ${ar?'WO على الخط · حركة لايف':'WOs on the line · live tracking'}</div>
      </div>
      <div class="pipeline-track" id="pipelineTrack">
        ${markers}
        ${tokens}
      </div>
    `;
  },

  // ─── CHART HTML BUILDERS ───
  chartThroughputHTML() {
    const hist = State.data.history?.hourly || [];
    if (hist.length < 2) return '<div class="empty-state" style="padding:24px">جاري جمع البيانات...</div>';
    // Convert cumulative produced into hourly diffs
    const data = [];
    for (let i = 1; i < hist.length; i++) {
      const diff = Math.max(0, hist[i].produced - hist[i-1].produced);
      const d = new Date(hist[i].ts);
      data.push({ value: diff, label: d.getHours().toString().padStart(2,'0')+':00' });
    }
    return Chart.line(data, { width: 400, height: 130 });
  },

  chartStationsHTML() {
    const ar = State.lang === 'ar';
    const rows = State.data.stations.map(s => {
      const pct = s.target > 0 ? Math.min(100, (s.produced / s.target) * 100) : 0;
      return {
        code: s.code,
        pct,
        status: s.status,
        stat: s.target > 0 ? `${pct.toFixed(0)}%` : '—',
      };
    });
    return Chart.radialBars(rows);
  },

  chartDistHTML() {
    const ar = State.lang === 'ar';
    const counts = Q.woCountByStage();
    // Group into 4 buckets for clarity
    const buckets = {
      'pre': { value: 0, label: ar?'قبل الإنتاج':'Pre-prod', color: '#14b8a6' },
      'prod': { value: 0, label: ar?'في الإنتاج':'Production', color: '#38bdf8' },
      'qc': { value: 0, label: 'MOC', color: '#a78bfa' },
      'post': { value: 0, label: ar?'بعد الإنتاج':'Post-prod', color: '#10b981' },
    };
    Object.entries(counts).forEach(([stage, c]) => {
      if (['CREATED','MAT_REQUEST','MAT_ISSUED'].includes(stage)) buckets.pre.value += c;
      else if (['AT_K1','AT_K2','AT_K3','AT_K4'].includes(stage)) buckets.prod.value += c;
      else if (stage === 'AT_MOC') buckets.qc.value += c;
      else if (['AT_PMF','AT_GDN'].includes(stage)) buckets.post.value += c;
    });
    return Chart.donut(Object.values(buckets), { centerLabel: ar?'WOs نشطة':'Active WOs' });
  },

  chartScrapHTML() {
    const hist = State.data.history?.hourly || [];
    if (hist.length < 2) return '<div class="empty-state" style="padding:24px">جاري جمع البيانات...</div>';
    const data = hist.map((h, i) => {
      const total = (h.produced + h.scrap) || 1;
      return { value: (h.scrap / total) * 100, label: i % 6 === 0 ? new Date(h.ts).getHours().toString().padStart(2,'0')+':00' : '' };
    });
    return Chart.line(data, { width: 400, height: 130 });
  },

  chartOEEHTML(m) {
    // Simplified OEE: Availability × Performance × Quality
    const availability = State.data.stations.filter(s => s.status !== 'maintenance').length / State.data.stations.length * 100;
    const performance = State.data.stations.reduce((sum, s) => {
      if (s.target > 0) return sum + Math.min(100, (s.produced/s.target)*100);
      return sum;
    }, 0) / Math.max(1, State.data.stations.filter(s => s.target > 0).length);
    const quality = 100 - m.scrapRate;
    const oee = (availability * performance * quality) / 10000;
    return Chart.gauge(oee, { label: State.lang==='ar'?'الفعالية العامة':'Effectiveness' });
  },

  tickerHTML() {

    const icons = { ok:'✓', warn:'⚠', err:'✕', info:'ℹ' };
    return items.map(m => {
      const u = Q.user(m.user);
      return `<div class="ticker-item" data-mid="${m.id}">
        <div class="ticker-icon ${m.type}">${icons[m.type]||'•'}</div>
        <div class="ticker-body">

            <span>·</span>
            <span class="mono">${fmt.ago(m.ts)}</span>
          </div>
        </div>
      </div>`;
    }).join('');
  },

  activeWOTable(wos) {
    const ar = State.lang === 'ar';
    if (!wos.length) return `<div class="empty-state">${ar?'لا توجد أوامر شغل نشطة':'No active work orders'}</div>`;
    return `<div style="overflow-x:auto"><table class="data">
      <thead><tr>
        <th>${ar?'رقم WO':'WO #'}</th><th>${ar?'الكمية':'Qty'}</th><th>${ar?'المرحلة الحالية':'Current Stage'}</th>
        <th>${ar?'المسؤول':'Owner'}</th><th>${ar?'التقدم':'Progress'}</th><th>${ar?'منذ':'Since'}</th><th></th>
      </tr></thead>
      <tbody>${wos.map(w => {
        const st = stageById(w.currentStage);
        const owner = w.currentOwner ? Q.user(w.currentOwner) : null;
        const lastTs = w.history[w.history.length-1]?.ts;
        const pct = w.qty > 0 ? Math.min(100, (w.produced / w.qty) * 100) : 0;
        return `<tr class="clickable" onclick="Action.openWO('${w.id}')">
          <td class="mono"><b>${w.id}</b></td>
          <td class="mono">${fmt.num(w.qty)}</td>
          <td><span class="badge-status b-progress">${escapeHTML(ar?st.name:st.nameEn)}</span></td>
          <td>${owner?`<span style="display:inline-flex;align-items:center;gap:6px"><span class="user-avatar" style="width:20px;height:20px;font-size:10px;background:${owner.color}">${owner.avatar}</span>${escapeHTML((ar?owner.name:owner.nameEn).split(' ').slice(0,2).join(' '))}</span>`:'<span class="text-mute">—</span>'}</td>
          <td><div style="display:flex;align-items:center;gap:8px"><div style="flex:1;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;min-width:60px"><div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--gold),var(--gold-2))"></div></div><span class="mono" style="font-size:11px">${pct.toFixed(0)}%</span></div></td>
          <td class="text-mute mono">${fmt.ago(lastTs)}</td>
          <td><button class="btn btn-sm btn-secondary" onclick="event.stopPropagation();Action.openWO('${w.id}')">${ar?'تفاصيل':'Details'}</button></td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>`;
  },

  // Smart refresh — animate counters, slide tokens, update charts only when data changed
  refreshDashboard() {
    History.push();
    const m = this._metrics();
    const old = this._lastMetrics || m;

    // Animate KPI counters
    const animateEl = (id, oldVal, newVal, format) => {
      const el = document.getElementById(id);
      if (!el || oldVal === newVal) return;
      Animate.counter(el, oldVal, newVal, { formatter: format });
    };
    animateEl('kpiActive', old.active.length, m.active.length, v => fmt.num(v));
    animateEl('kpiProduced', old.totalProduced, m.totalProduced, v => fmt.num(v));
    animateEl('kpiMOC', old.inMOC, m.inMOC, v => fmt.num(v));
    animateEl('kpiDelivered', old.delivered, m.delivered, v => fmt.num(v));
    if (Math.abs(old.scrapRate - m.scrapRate) > 0.005) {
      const el = document.getElementById('kpiScrap');
      if (el) Animate.counter(el, old.scrapRate, m.scrapRate, { formatter: v => v.toFixed(2)+'%' });
    }
    if (old.stationsRunning !== m.stationsRunning) {
      const el = document.getElementById('kpiRunning');
      if (el) { el.textContent = m.stationsRunning + '/5'; el.classList.add('counter-pulse'); setTimeout(()=>el.classList.remove('counter-pulse'),700); }
    }

    // Update chart meta labels
    const tm = document.getElementById('throughputMeta');
    if (tm) tm.textContent = `+${fmt.num(m.last1h)} ${State.lang==='ar'?'/ساعة':'/h'}`;
    const sm = document.getElementById('scrapMeta');
    if (sm) { sm.textContent = m.scrapRate.toFixed(2) + '%'; sm.style.color = m.scrapRate > 2 ? 'var(--rose)' : 'var(--emerald)'; }

    // Update station produced counters with animation
    State.data.stations.forEach(s => {
      const oldS = old._stationSnapshots?.[s.id];
      if (oldS && oldS.produced !== s.produced) {
        const el = document.getElementById('stProduced-' + s.id);
        if (el) Animate.counter(el, oldS.produced, s.produced, { formatter: v => fmt.num(v) });
        const fill = document.getElementById('stFill-' + s.id);
        if (fill && s.target > 0) fill.style.width = Math.min(100, (s.produced/s.target)*100) + '%';
      }
    });
    m._stationSnapshots = {};
    State.data.stations.forEach(s => { m._stationSnapshots[s.id] = { produced: s.produced }; });

    // Update charts (regenerate inner HTML — SVG transitions handle smoothness)
    const updateChart = (id, html) => { const el = document.getElementById(id); if (el) el.innerHTML = html; };
    updateChart('chartThroughput', this.chartThroughputHTML());
    updateChart('chartStations', this.chartStationsHTML());
    updateChart('chartDist', this.chartDistHTML());
    updateChart('chartScrap', this.chartScrapHTML());
    updateChart('chartOEE', this.chartOEEHTML(m));

    // Update pipeline track — tokens slide via CSS transition
    const pl = document.getElementById('pipeline');
    if (pl) pl.innerHTML = this.pipelineHTML();

    // Refresh ticker if new movements arrived
    const tl = document.getElementById('tickerList');
    if (tl) {
      const currentFirst = tl.querySelector('.ticker-item')?.dataset?.mid;
      const newFirst = State.data.movements[0]?.id;
      if (currentFirst !== newFirst) tl.innerHTML = this.tickerHTML();
    }

    this._lastMetrics = m;
  },

  filterByStage(stageId) {
    State.route = 'workorders';
    this.workorders(stageId);
  },
};

View.runTrace = function() {
  const ar = State.lang === 'ar';
  const q = (document.getElementById('traceQuery').value||'').trim();
  const wo = State.data.workOrders.find(w => w.id.toLowerCase() === q.toLowerCase());
  const el = document.getElementById('traceResult');
  if (!q) { el.innerHTML = ''; return; }
  if (!wo) { el.innerHTML = `<div class="card"><div class="empty-state">${ar?'لم يتم العثور على WO':'WO not found'}</div></div>`; return; }
  const cur = STAGE_ORDER.indexOf(wo.currentStage);
  el.innerHTML = `
    <div class="card mb-2">
      <div class="flex justify-between items-center mb-2 flex-wrap gap-2">
        <div>
          <div class="mono" style="font-size:18px;font-weight:700">${wo.id}</div>
          <div class="text-mute" style="font-size:12px">${escapeHTML(wo.desc)}</div>
        </div>
        <div class="flex" style="gap:14px;font-size:12px">
          <div><div class="text-mute">${ar?'الكمية':'Qty'}</div><div class="mono" style="font-weight:700">${fmt.num(wo.qty)}</div></div>
          <div><div class="text-mute">${ar?'منتج':'Produced'}</div><div class="mono" style="font-weight:700;color:var(--emerald)">${fmt.num(wo.produced)}</div></div>
          <div><div class="text-mute">Scrap</div><div class="mono" style="font-weight:700;color:var(--rose)">${fmt.num(wo.scrap)}</div></div>
          <div><div class="text-mute">${ar?'الحالة':'Status'}</div><div><span class="badge-status b-${wo.currentStage==='DELIVERED'?'done':wo.currentStage==='REJECTED'?'rejected':'progress'}">${escapeHTML(stageById(wo.currentStage)?.[ar?'name':'nameEn'])}</span></div></div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">${ar?'الرحلة الكاملة':'Full Journey'} (${wo.history.length} ${ar?'حركة':'events'})</div>
      ${wo.history.map((h,i) => {
        const st = stageById(h.stage);
        const fromU = h.fromUser ? Q.user(h.fromUser) : null;
        const toU = h.toUser ? Q.user(h.toUser) : null;
        const isLast = i === wo.history.length - 1;
        const cls = h.stage === 'REJECTED' ? 'rejected' : (isLast && wo.currentStage !== 'DELIVERED' ? 'current' : 'done');
        return `<div class="trace-step ${cls}">
          <div class="trace-dot">${st?.code||'?'}</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;font-size:13px">${escapeHTML(st?(ar?st.name:st.nameEn):h.stage)}</div>
            <div class="text-mute" style="font-size:11.5px;margin-top:3px">
              ${fromU?`<span style="color:var(--text-2)">${escapeHTML((ar?fromU.name:fromU.nameEn))}</span>`:''}
              ${toU?` → <span style="color:var(--text-2)">${escapeHTML((ar?toU.name:toU.nameEn))}</span>`:''}
              ${h.qty!=null?` · <span class="mono">${fmt.num(h.qty)} ${ar?'قطعة':'pcs'}</span>`:''}
              ${h.scrap?` · <span class="mono text-rose">${fmt.num(h.scrap)} scrap</span>`:''}
            </div>
            ${h.notes?`<div class="text-mute" style="font-size:11px;margin-top:3px;font-style:italic">"${escapeHTML(h.notes)}"</div>`:''}
          </div>
          <div class="text-mute mono" style="font-size:11px;text-align:end;flex-shrink:0">
            ${fmt.date(h.ts)}<br><span style="font-size:10px">${fmt.ago(h.ts)}</span>
          </div>
        </div>`;
      }).join('')}
    </div>
  `;
};

/* ============ ACTIONS (modals + WO state transitions) ============ */
const Action = {
  // Open a WO detail
  openWO(woId) {

        <div><div class="text-mute" style="font-size:10.5px">Scrap</div><div class="mono" style="font-size:18px;font-weight:700;color:var(--rose)">${fmt.num(wo.scrap)}</div></div>
        <div><div class="text-mute" style="font-size:10.5px">${ar?'المرحلة':'Stage'}</div><div><span class="badge-status b-progress">${escapeHTML(ar?st.name:st.nameEn)}</span></div></div>

        ${owner?`<div style="display:flex;align-items:center;gap:9px"><div class="user-avatar" style="width:28px;height:28px;font-size:12px;background:${owner.color}">${owner.avatar}</div><div><div style="font-weight:600;font-size:13px">${escapeHTML(ar?owner.name:owner.nameEn)}</div><div class="text-mute" style="font-size:11px">${escapeHTML(ar?owner.role:owner.roleEn)} · ${escapeHTML(ar?Q.dept(owner.dept).name:Q.dept(owner.dept).nameEn)}</div></div></div>`:'<div class="text-mute">—</div>'}

      <div style="max-height:240px;overflow-y:auto">
        ${wo.history.slice().reverse().map(h => {
          const stg = stageById(h.stage);

          return `<div style="padding:8px 0;border-bottom:1px dashed var(--border);font-size:11.5px">

            </div>
            <div class="text-mute" style="margin-top:3px">
              ${fU?escapeHTML(ar?fU.name:fU.nameEn):'—'} ${tU?'→ '+escapeHTML(ar?tU.name:tU.nameEn):''}
              ${h.qty?` · <span class="mono">${fmt.num(h.qty)}</span>`:''}
              ${h.scrap?` · <span class="mono text-rose">scrap ${h.scrap}</span>`:''}
            </div>
            ${h.notes?`<div class="text-mute" style="font-style:italic;font-size:11px;margin-top:2px">"${escapeHTML(h.notes)}"</div>`:''}

    const footer = `
      <button class="btn btn-secondary" onclick="App.closeModal()">${t('close')}</button>
      <button class="btn btn-secondary" onclick="App.closeModal();App.goto('trace');setTimeout(()=>{document.getElementById('traceQuery').value='${woId}';View.runTrace()},50)">${ar?'فتح في التتبع':'Open in Trace'}</button>
      ${action && canAct ? `<button class="btn btn-primary" onclick="App.closeModal();${action.handler}">${escapeHTML(action.label)}</button>` : (action?`<span class="text-mute" style="font-size:11px;align-self:center">${t('no_perm')}</span>`:'')}
    `;
    App.openModal(woId, body, footer, true);
  },

  // ─────── CREATE WO ───────
  createWO() {
    if (!Perm.canAct('PROD')) { toast(t('no_perm'), 'error'); return; }
    const ar = State.lang === 'ar';
    const body = `
      <div class="form-grid">
        <div class="field"><label>${ar?'وصف الدفعة':'Batch Description'} <span class="req">*</span></label><input id="newWODesc" placeholder="${ar?'مثال: بطاقة وطنية - دفعة 044':'e.g. National ID - Batch 044'}"></div>
        <div class="form-row">
          <div class="field"><label>${ar?'الكمية':'Quantity'} <span class="req">*</span></label><input id="newWOQty" type="number" min="1" value="5000"></div>
          <div class="field"><label>${ar?'الأولوية':'Priority'}</label><select id="newWOPriority"><option value="low">low</option><option value="medium" selected>medium</option><option value="high">high</option></select></div>
        </div>
        <div class="field"><label>SKU</label><input id="newWOSku" value="CARD-NID-${String(State.data.workOrders.length+44).padStart(3,'0')}"></div>
      </div>
    `;
    App.openModal(t('create_wo'), body,
      `<button class="btn btn-secondary" onclick="App.closeModal()">${t('cancel')}</button>
       <button class="btn btn-primary" onclick="Action.submitNewWO()">${t('confirm')}</button>`);
  },

  submitNewWO() {
    const desc = document.getElementById('newWODesc').value.trim();
    const qty = parseInt(document.getElementById('newWOQty').value) || 0;
    const priority = document.getElementById('newWOPriority').value;
    const sku = document.getElementById('newWOSku').value.trim();
    if (!desc || !qty) { toast(State.lang==='ar'?'املأ الحقول المطلوبة':'Fill required fields', 'error'); return; }
    const id = 'WO-' + new Date().getFullYear() + '-' + String(State.data.workOrders.length + 44).padStart(4,'0');
    const wo = {
      id, sku, desc, qty, priority, currentStage: 'CREATED',
      currentOwner: State.user.id, createdBy: State.user.id, createdAt: now(),
      produced: 0, scrap: 0,
      history: [{ stage: 'CREATED', action: 'create', fromUser: null, toUser: State.user.id, qty, scrap: 0, ts: now(), notes: 'WO أنشئ بواسطة '+State.user.name }],
    };
    State.data.workOrders.unshift(wo);
    Audit.log('create_wo', 'WorkOrder', id, { qty, priority });
    Movements.add('info', `${id} ${State.lang==='ar'?'تم إنشاؤه':'created'} (${fmt.num(qty)} ${State.lang==='ar'?'قطعة':'pcs'})`, { woId: id });
    State.save();
    App.closeModal();
    toast(State.lang==='ar'?'تم إنشاء WO':'WO created', 'success');
