          </div>
          <div class="field">
            <label>${ar?'مرجع الصرف':'Issue Reference'} <span class="req">*</span></label>
            <input id="isRef" placeholder="${ar?'مثال: WO-2026-0001':'e.g. WO-2026-0001'}">
          </div>
        </div>
        <div class="form-row">
          <div class="field">
            <label>${ar?'الوجهة':'Destination'}</label>
            <input id="isDest" placeholder="${ar?'الإنتاج / مستودع آخر':'Production / other WH'}">
          </div>
          <div class="field">
            <label>${ar?'تاريخ الصرف':'Issue Date'}</label>
            <input id="isDate" type="date" value="${new Date().toISOString().split('T')[0]}">
          </div>
        </div>
        <div class="field">
          <label>${ar?'ملاحظات':'Notes'}</label>
          <textarea id="isNotes" rows="2"></textarea>
        </div>
      </div>
    `;
    App.openModal(`${ar?'صرف مخزون':'Issue Stock'} — ${wh.code}`, body,
      `<button class="btn btn-secondary" onclick="App.closeModal()">${t('cancel')}</button>
       <button class="btn btn-danger" onclick="Action.saveIssue('${whId}')">${ar?'تأكيد الصرف':'Confirm Issue'}</button>`, true);
  },

  saveIssue(whId) {
    const wh = Q.wh(whId);
    if (!wh || !this._whCanEdit(wh)) return;
    const ar = State.lang === 'ar';
    const sku = document.getElementById('isSku').value;
    const qty = parseFloat(document.getElementById('isQty').value);
    const ref = document.getElementById('isRef').value.trim();
    const dest = document.getElementById('isDest').value.trim();
    const notes = document.getElementById('isNotes').value.trim();
    const item = wh.items.find(i => i.sku === sku);
    if (!item) return;
    if (isNaN(qty) || qty <= 0) { toast(ar?'أدخل كمية موجبة':'Enter positive qty','error'); return; }
    if (!ref) { toast(ar?'مرجع الصرف مطلوب':'Reference required','error'); return; }
    const avail = item.qty - item.allocated;
    if (qty > avail) { toast(ar?`الكمية أكبر من المتاح (${fmt.num(avail)})`:`Exceeds available (${fmt.num(avail)})`,'error'); return; }

    item.qty -= qty;
    Movements.addStock({ whId, sku, type: 'issue', qty, ref, notes: dest ? `→ ${dest} | ${notes}` : notes });
    Audit.log('issue_stock', 'Warehouse', `${whId}/${sku}`, { qty, ref, dest });
    Movements.add('warn', `↑ ${ar?'صرف':'Issue'}: ${wh.code}/${sku} −${fmt.num(qty)} ${item.unit} → ${dest||ref}`, { whId, sku, qty });
    State.save();
    App.closeModal();
    toast(ar?`✓ تم الصرف: −${fmt.num(qty)} ${item.unit}`:`✓ Issued: −${fmt.num(qty)} ${item.unit}`, 'success');
    View.warehouses();
  },

  // Form: Adjust stock (audit / correction)
  adjustStock(whId) {
    const wh = Q.wh(whId);
    if (!wh || !this._whCanEdit(wh)) { toast(t('no_perm'), 'error'); return; }
    if (wh.items.length === 0) return;
    const ar = State.lang === 'ar';
    const itemOpts = wh.items.map(i =>
      `<option value="${i.sku}">${escapeHTML(i.sku)} — ${escapeHTML(i.name)} · ${ar?'الحالي:':'current:'} ${fmt.num(i.qty)} ${i.unit}</option>`
    ).join('');
    const body = `
      <div style="background:rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.25);border-radius:9px;padding:10px;margin-bottom:14px;font-size:11.5px;color:var(--amber)">
        ⚙ <b>${ar?'تعديل / جرد':'Adjustment / Audit'}</b> — ${ar?'تصحيح الكمية بعد جرد فعلي':'Correct quantity after physical count'}
      </div>
      <div class="form-grid">
        <div class="field">
          <label>${ar?'المادة':'Material'} <span class="req">*</span></label>
          <select id="adSku" onchange="Action._adjustSyncCurrent()">${itemOpts}</select>
        </div>
        <div class="form-row">
          <div class="field">
            <label>${ar?'الكمية الحالية في النظام':'Current System Qty'}</label>
            <input id="adCurrent" readonly class="mono">
          </div>
          <div class="field">
            <label>${ar?'الكمية الفعلية بعد الجرد':'Actual Qty After Audit'} <span class="req">*</span></label>
            <input id="adNew" type="number" min="0" step="any">
          </div>
        </div>
        <div class="field">
          <label>${ar?'سبب التعديل':'Reason for Adjustment'} <span class="req">*</span></label>
          <input id="adReason" placeholder="${ar?'مثال: جرد فعلي ربعي، تالف، مفقود':'e.g. Quarterly count, damaged, missing'}">
        </div>
        <div class="field">
          <label>${ar?'ملاحظات':'Notes'}</label>
          <textarea id="adNotes" rows="2"></textarea>
        </div>
      </div>
    `;
    App.openModal(`${ar?'تعديل المخزون':'Stock Adjustment'} — ${wh.code}`, body,
      `<button class="btn btn-secondary" onclick="App.closeModal()">${t('cancel')}</button>
       <button class="btn btn-primary" onclick="Action.saveAdjust('${whId}')">${ar?'حفظ التعديل':'Save Adjustment'}</button>`, true);
    setTimeout(() => this._adjustSyncCurrent(), 50);
  },

  _adjustSyncCurrent() {
    const sel = document.getElementById('adSku');
    const cur = document.getElementById('adCurrent');
    if (!sel || !cur) return;
    const wh = State.data.warehouses.find(w => w.items.some(i => i.sku === sel.value));
    const item = wh?.items.find(i => i.sku === sel.value);
    if (item) cur.value = `${fmt.num(item.qty)} ${item.unit}`;
  },

  saveAdjust(whId) {
    const wh = Q.wh(whId);
    if (!wh || !this._whCanEdit(wh)) return;
    const ar = State.lang === 'ar';
    const sku = document.getElementById('adSku').value;
    const newQty = parseFloat(document.getElementById('adNew').value);
    const reason = document.getElementById('adReason').value.trim();
    const notes = document.getElementById('adNotes').value.trim();
    const item = wh.items.find(i => i.sku === sku);
    if (!item) return;
    if (isNaN(newQty) || newQty < 0) { toast(ar?'أدخل كمية صحيحة':'Enter valid qty','error'); return; }
    if (!reason) { toast(ar?'سبب التعديل مطلوب':'Reason required','error'); return; }

    const diff = newQty - item.qty;
    if (diff === 0) { toast(ar?'لا يوجد فرق':'No change','info'); return; }
    item.qty = newQty;
    Movements.addStock({ whId, sku, type: 'adjust', qty: diff, ref: reason, notes });
    Audit.log('adjust_stock', 'Warehouse', `${whId}/${sku}`, { from: item.qty - diff, to: newQty, reason });
    Movements.add('warn', `⚙ ${ar?'تعديل':'Adjust'}: ${wh.code}/${sku} ${diff>0?'+':''}${fmt.num(diff)} ${item.unit} (${reason})`, { whId, sku, diff });
    State.save();
    App.closeModal();
    toast(ar?`✓ تم التعديل: ${diff>0?'+':''}${fmt.num(diff)} ${item.unit}`:`✓ Adjusted: ${diff>0?'+':''}${fmt.num(diff)} ${item.unit}`, 'success');
    View.warehouses();
  },

  // View item-specific history
  viewItemHistory(whId, sku) {
    const wh = Q.wh(whId);
    const item = wh?.items.find(i => i.sku === sku);
    if (!item) return;
    const ar = State.lang === 'ar';
    const movements = (State.data.stockMovements || []).filter(m => m.whId === whId && m.sku === sku);
    const typeLabels = { opening:ar?'رصيد افتتاحي':'Opening', receive:ar?'استلام':'Receive', issue:ar?'صرف':'Issue', adjust:ar?'تعديل':'Adjust', return:ar?'مرتجع':'Return' };

    const body = `
      <div style="background:var(--glass-2);padding:11px;border-radius:8px;margin-bottom:14px;font-size:12px">
        <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px">
          <div><span class="text-mute">${ar?'الكود:':'SKU:'}</span> <b class="mono">${escapeHTML(sku)}</b></div>
          <div><span class="text-mute">${ar?'الكمية الحالية:':'Current:'}</span> <b class="mono">${fmt.num(item.qty)} ${item.unit}</b></div>
          <div><span class="text-mute">${ar?'مخصص:':'Allocated:'}</span> <b class="mono" style="color:var(--amber)">${fmt.num(item.allocated)}</b></div>
          <div><span class="text-mute">${ar?'متاح:':'Available:'}</span> <b class="mono" style="color:var(--emerald)">${fmt.num(item.qty-item.allocated)}</b></div>
        </div>
      </div>
      ${movements.length === 0 ? `<div class="empty-state">${ar?'لا توجد حركات لهذي المادة':'No movements for this item'}</div>` : `
      <div style="overflow-x:auto;max-height:50vh"><table class="data">
        <thead><tr>
          <th>${ar?'التاريخ':'Date'}</th>
          <th>${ar?'النوع':'Type'}</th>
          <th>${ar?'الكمية':'Qty'}</th>
          <th>${ar?'المرجع':'Reference'}</th>
          <th>${ar?'المنفّذ':'By'}</th>
        </tr></thead>
        <tbody>${movements.map(m => {
          const u = Q.user(m.user);
          const sign = ['receive','opening','return'].includes(m.type) ? '+' : (m.type === 'adjust' ? (m.qty>=0?'+':'') : '−');
          const color = m.qty > 0 ? 'var(--emerald)' : m.qty < 0 ? 'var(--rose)' : 'var(--amber)';
          return `<tr>
            <td class="mono" style="font-size:10.5px">${fmt.date(m.ts)}</td>
            <td><span class="badge-status">${escapeHTML(typeLabels[m.type]||m.type)}</span></td>
            <td class="mono" style="color:${color};font-weight:700">${sign}${fmt.num(Math.abs(m.qty))}</td>
            <td class="text-mute">${escapeHTML(m.ref||'—')}</td>
            <td>${u?escapeHTML(ar?u.name:u.nameEn):'—'}</td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>`}
    `;
    App.openModal(`${ar?'سجل حركة المادة':'Item History'} — ${escapeHTML(sku)}`, body,
      `<button class="btn btn-secondary" onclick="App.closeModal()">${ar?'إغلاق':'Close'}</button>`, true);
  },

  exportData() {
    const payload = {
      _meta: { exportedAt: now(), exportedBy: State.user.id, version: '1.0', source: 'Veridos ProdLine' },
      data: State.data,
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const stamp = new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');
    a.href = url; a.download = `prodline-backup-${stamp}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    Audit.log('export_data', 'System', 'backup', { size: JSON.stringify(payload).length });
    toast(State.lang==='ar'?'تم تنزيل النسخة الاحتياطية':'Backup downloaded','success');
  },
  importData(file) {
    if (!file) return;
    if (!Perm.isManager()) { toast(t('no_perm'),'error'); return; }
    const ar = State.lang === 'ar';
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const parsed = JSON.parse(e.target.result);
        const incoming = parsed.data || parsed; // accept both shapes
        if (!incoming.users || !incoming.workOrders || !incoming.stations) {
          toast(ar?'الملف غير صالح':'Invalid file','error'); return;
        }
        App.openModal(ar?'تأكيد الاستيراد':'Confirm Import',
          `<p>${ar?'سيتم استبدال كل البيانات الحالية بمحتوى الملف:':'All current data will be replaced with file contents:'}</p>
           <div class="mono" style="background:var(--glass-2);padding:10px;border-radius:8px;font-size:11.5px;margin-top:10px">
            ${incoming.users.length} ${ar?'مستخدم':'users'} ·
            ${incoming.workOrders.length} WO ·
            ${incoming.audit?incoming.audit.length:0} ${ar?'سجل تدقيق':'audit'}<br>
            ${parsed._meta?(ar?'تاريخ التصدير: ':'Exported: ')+fmt.date(parsed._meta.exportedAt):''}
           </div>
           <p style="font-size:11px;color:var(--rose);margin-top:10px">${ar?'⚠️ لا يمكن التراجع عن هذا الإجراء':'⚠️ This cannot be undone'}</p>`,
          `<button class="btn btn-secondary" onclick="App.closeModal()">${t('cancel')}</button>
           <button class="btn btn-danger" onclick="Action.confirmImport()">${ar?'استيراد':'Import'}</button>`);
        Action._pendingImport = incoming;
      } catch (err) {
        toast(ar?'خطأ في قراءة الملف':'File read error','error');
      }
    };
    reader.readAsText(file);
  },
  confirmImport() {
    if (!Action._pendingImport) return;
    const importedAuditId = uid('AUD');
    State.data = Action._pendingImport;
    State.migrate?.() || (function(){
      // fallback migrate
      if (!State.data.departments) State.data.departments = JSON.parse(JSON.stringify(DEPTS));
      if (!State.data.stageOverrides) State.data.stageOverrides = {};
    })();
    if (!State.data.audit) State.data.audit = [];
    State.data.audit.unshift({ id: importedAuditId, ts: now(), user: State.user.id, userName: State.user.name, action: 'import_data', entity: 'System', entityId: 'backup', details: {} });
    State.save();
    Action._pendingImport = null;
    App.closeModal();
    toast(State.lang==='ar'?'تم الاستيراد':'Imported','success');
    // Re-login if current user not in imported data
    if (!Q.user(State.user.id)) { App.logout(); }
    else { App.renderSidebar(); App.goto('admin'); }
  },
};

Action.saveNewSupplier = function() {
  const ar = State.lang === 'ar';
  const get = (id) => (document.getElementById(id)?.value || '').trim();
  const code = get('supCode').toUpperCase();
  const name = get('supName');
  if (!code || !name) { toast(ar?'الكود والاسم مطلوبان':'Code and name required','error'); return; }
  if (!/^[A-Z0-9\-_]+$/.test(code)) { toast(ar?'الكود يحتوي رموز غير مسموحة':'Invalid code','error'); return; }
  if (!State.data.suppliers) State.data.suppliers = [];
  if (State.data.suppliers.some(s => s.code === code)) { toast(ar?'الكود موجود مسبقاً':'Code already exists','error'); return; }

  const supplier = {
    code, name,
    nameEn: get('supNameEn') || name,
    category: get('supCategory'),
    country: get('supCountry'),
    city: get('supCity'),
    contactPerson: get('supContact'),
    title: get('supTitle'),
    email: get('supEmail'),
    phone: get('supPhone'),
    address: get('supAddress'),
    materials: get('supMaterials').split(',').map(s=>s.trim()).filter(Boolean),
    notes: get('supNotes'),
    active: true,
    createdAt: now(), createdBy: State.user.id,
  };
  State.data.suppliers.push(supplier);
  Audit.log('add_supplier', 'Supplier', code, { name, category: supplier.category });
  Movements.add('info', `${ar?'مورد جديد:':'New supplier:'} ${code} — ${name}`, { code });
  State.save();
  // Cloud sync (background)
  Repo.suppliers.upsert(supplier).then(ok => {
    if (!ok) toast(ar?'⚠ حُفظ محلياً، فشل sync':'⚠ Saved locally, sync failed', 'warn');
  });
  App.closeModal();
  toast(ar?`✓ تم إضافة ${code}`:`✓ Added ${code}`, 'success');
  View.suppliers();
};

    if (!ok) toast(State.lang==='ar'?'⚠ حُفظ محلياً، فشل sync':'⚠ Saved locally, sync failed', 'warn');
  });
  App.closeModal();
  toast(State.lang==='ar'?'تم الحفظ':'Saved', 'success');
  View.suppliers();
};

// Initialize
App.init();
</script>
</body>
</html>
