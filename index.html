View.runTrace = function() {
  const ar = State.lang === 'ar';
  const q = (document.getElementById('traceQuery').value||'').trim();
  const wo = State.data.workOrders.find(w => w.id.toLowerCase() === q.toLowerCase());
  const el = document.getElementById('traceResult');
  if (!q) { el.innerHTML = ''; return; }
  if (!wo) { el.innerHTML = `<div class="card"><div class="empty-state">${ar?'لم يتم العثور على WO':'WO not found'}</div></div>`; return; }
  const cur = STAGE_ORDER.indexOf(wo.currentStage);
  el.innerHTML = `
    <div class="card mb-2">
      <div class="flex justify-between items-center mb-2 flex-wrap gap-2">
        <div>
          <div class="mono" style="font-size:18px;font-weight:700">${wo.id}</div>
          <div class="text-mute" style="font-size:12px">${escapeHTML(wo.desc)}</div>
        </div>
        <div class="flex" style="gap:14px;font-size:12px">
          <div><div class="text-mute">${ar?'الكمية':'Qty'}</div><div class="mono" style="font-weight:700">${fmt.num(wo.qty)}</div></div>
          <div><div class="text-mute">${ar?'منتج':'Produced'}</div><div class="mono" style="font-weight:700;color:var(--emerald)">${fmt.num(wo.produced)}</div></div>
          <div><div class="text-mute">Scrap</div><div class="mono" style="font-weight:700;color:var(--rose)">${fmt.num(wo.scrap)}</div></div>
          <div><div class="text-mute">${ar?'الحالة':'Status'}</div><div><span class="badge-status b-${wo.currentStage==='DELIVERED'?'done':wo.currentStage==='REJECTED'?'rejected':'progress'}">${escapeHTML(stageById(wo.currentStage)?.[ar?'name':'nameEn'])}</span></div></div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">${ar?'الرحلة الكاملة':'Full Journey'} (${wo.history.length} ${ar?'حركة':'events'})</div>
      ${wo.history.map((h,i) => {
        const st = stageById(h.stage);
        const fromU = h.fromUser ? Q.user(h.fromUser) : null;
        const toU = h.toUser ? Q.user(h.toUser) : null;
        const isLast = i === wo.history.length - 1;
        const cls = h.stage === 'REJECTED' ? 'rejected' : (isLast && wo.currentStage !== 'DELIVERED' ? 'current' : 'done');
        return `<div class="trace-step ${cls}">
          <div class="trace-dot">${st?.code||'?'}</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;font-size:13px">${escapeHTML(st?(ar?st.name:st.nameEn):h.stage)}</div>
            <div class="text-mute" style="font-size:11.5px;margin-top:3px">
              ${fromU?`<span style="color:var(--text-2)">${escapeHTML((ar?fromU.name:fromU.nameEn))}</span>`:''}
              ${toU?` → <span style="color:var(--text-2)">${escapeHTML((ar?toU.name:toU.nameEn))}</span>`:''}
              ${h.qty!=null?` · <span class="mono">${fmt.num(h.qty)} ${ar?'قطعة':'pcs'}</span>`:''}
              ${h.scrap?` · <span class="mono text-rose">${fmt.num(h.scrap)} scrap</span>`:''}
            </div>
            ${h.notes?`<div class="text-mute" style="font-size:11px;margin-top:3px;font-style:italic">"${escapeHTML(h.notes)}"</div>`:''}
          </div>
          <div class="text-mute mono" style="font-size:11px;text-align:end;flex-shrink:0">
            ${fmt.date(h.ts)}<br><span style="font-size:10px">${fmt.ago(h.ts)}</span>
          </div>
        </div>`;
      }).join('')}
    </div>
  `;
};

const Action = {
  // Open a WO detail
  openWO(woId) {
    const wo = Q.wo(woId);
    if (!wo) return;
    const ar = State.lang === 'ar';
    const st = stageById(wo.currentStage);
    const owner = wo.currentOwner ? Q.user(wo.currentOwner) : null;
    const action = View.actionForStage(wo.currentStage, wo);
    const canAct = Perm.canActOnWO(wo);

    const body = `
      <div class="grid-2" style="margin-bottom:14px">
        <div><div class="text-mute" style="font-size:10.5px">${ar?'الكمية':'Qty'}</div><div class="mono" style="font-size:18px;font-weight:700">${fmt.num(wo.qty)}</div></div>
        <div><div class="text-mute" style="font-size:10.5px">${ar?'منتج':'Produced'}</div><div class="mono" style="font-size:18px;font-weight:700;color:var(--emerald)">${fmt.num(wo.produced)}</div></div>
        <div><div class="text-mute" style="font-size:10.5px">Scrap</div><div class="mono" style="font-size:18px;font-weight:700;color:var(--rose)">${fmt.num(wo.scrap)}</div></div>
        <div><div class="text-mute" style="font-size:10.5px">${ar?'المرحلة':'Stage'}</div><div><span class="badge-status b-progress">${escapeHTML(ar?st.name:st.nameEn)}</span></div></div>
      </div>
      <div style="background:var(--glass);border:1px solid var(--border);border-radius:9px;padding:11px;margin-bottom:14px">
        <div class="text-mute" style="font-size:10.5px;margin-bottom:4px">${ar?'المسؤول الحالي':'Current Owner'}</div>
        ${owner?`<div style="display:flex;align-items:center;gap:9px"><div class="user-avatar" style="width:28px;height:28px;font-size:12px;background:${owner.color}">${owner.avatar}</div><div><div style="font-weight:600;font-size:13px">${escapeHTML(ar?owner.name:owner.nameEn)}</div><div class="text-mute" style="font-size:11px">${escapeHTML(ar?owner.role:owner.roleEn)} · ${escapeHTML(ar?Q.dept(owner.dept).name:Q.dept(owner.dept).nameEn)}</div></div></div>`:'<div class="text-mute">—</div>'}
      </div>
      <div class="card-title" style="margin-bottom:8px">${ar?'سجل الحركات':'Movement History'}</div>
      <div style="max-height:240px;overflow-y:auto">
        ${wo.history.slice().reverse().map(h => {
          const stg = stageById(h.stage);
          const fU = h.fromUser ? Q.user(h.fromUser) : null;
          const tU = h.toUser ? Q.user(h.toUser) : null;
          return `<div style="padding:8px 0;border-bottom:1px dashed var(--border);font-size:11.5px">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <div><b>${escapeHTML(stg?(ar?stg.name:stg.nameEn):h.stage)}</b> <span class="tag">${h.action}</span></div>
              <div class="text-mute mono" style="font-size:10.5px">${fmt.ago(h.ts)}</div>
            </div>
            <div class="text-mute" style="margin-top:3px">
              ${fU?escapeHTML(ar?fU.name:fU.nameEn):'—'} ${tU?'→ '+escapeHTML(ar?tU.name:tU.nameEn):''}
              ${h.qty?` · <span class="mono">${fmt.num(h.qty)}</span>`:''}
              ${h.scrap?` · <span class="mono text-rose">scrap ${h.scrap}</span>`:''}
            </div>
            ${h.notes?`<div class="text-mute" style="font-style:italic;font-size:11px;margin-top:2px">"${escapeHTML(h.notes)}"</div>`:''}
          </div>`;
        }).join('')}
      </div>
      ${(() => {
        const consumption = BOM.forWO(woId);
        if (consumption.length === 0) return '';
        // Group by station
        const byStation = {};
        consumption.forEach(c => { (byStation[c.stationId] = byStation[c.stationId] || []).push(c); });
        return `
          <div class="card-title" style="margin-top:14px;margin-bottom:8px">🧾 ${ar?'استهلاك المواد':'Material Consumption'}</div>
          <div style="background:var(--glass);border-radius:8px;padding:10px;font-size:11.5px">
            ${Object.keys(byStation).sort().map(st => `
              <div style="margin-bottom:8px">
                <div style="font-weight:600;color:var(--gold);margin-bottom:4px">${st}</div>
                ${byStation[st].map(c => `
                  <div style="display:flex;justify-content:space-between;padding:3px 8px;font-size:11px">
                    <span class="mono">${escapeHTML(c.sku)}</span>
                    <span class="text-mute mono">${fmt.num(c.qtyConsumed)} ${escapeHTML(c.unit)}</span>
                  </div>
                `).join('')}
              </div>
            `).join('')}
          </div>
        `;
      })()}
      ${(() => {
        const scrapEntries = Scrap.forWO(woId);
        if (scrapEntries.length === 0) return '';
        const totalRecovered = scrapEntries.reduce((s, e) => s + (e.totalRecovered || 0), 0);
        const totalLost = scrapEntries.reduce((s, e) => s + (e.totalLost || 0), 0);
        return `
          <div class="card-title" style="margin-top:14px;margin-bottom:8px">🔻 ${ar?'سجل Scrap':'Scrap Log'} (${scrapEntries.length})</div>
          <div style="background:var(--glass);border-radius:8px;padding:10px;font-size:11.5px">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;padding-bottom:8px;border-bottom:1px dashed var(--border)">
              <div><span class="text-mute">${ar?'إجمالي مُسترد:':'Total recovered:'}</span> <b class="mono" style="color:var(--emerald)">${fmt.num(totalRecovered)}</b></div>
              <div><span class="text-mute">${ar?'إجمالي فقد:':'Total lost:'}</span> <b class="mono" style="color:var(--rose)">${fmt.num(totalLost)}</b></div>
            </div>
            ${scrapEntries.map(e => {
              const u = e.by ? Q.user(e.by) : null;
              return `
                <div style="margin-bottom:8px;padding-bottom:6px;border-bottom:1px dashed var(--border)">
                  <div style="display:flex;justify-content:space-between;align-items:center">
                    <div><b style="color:var(--rose)">${e.stationId}</b> · ${fmt.num(e.scrapQty)} ${ar?'وحدة':'units'}</div>
                    <div class="text-mute mono" style="font-size:10.5px">${fmt.ago(e.ts)}</div>
                  </div>
                  ${e.reason ? `<div class="text-mute" style="font-style:italic;font-size:11px;margin-top:2px">"${escapeHTML(e.reason)}"</div>` : ''}
                  ${e.materials && e.materials.length > 0 ? `
                    <div style="margin-top:4px;font-size:10.5px">
                      ${e.materials.map(m => `
                        <span class="mono" style="margin-${ar?'left':'right'}:8px">
                          ${m.sku}${m.fromStation ? ' (' + m.fromStation + ')' : ''}:
                          ${m.recovered > 0 ? `<span style="color:var(--emerald)">+${fmt.num(m.recovered)}</span> ` : ''}
                          <span style="color:var(--rose)">−${fmt.num(m.lost)}</span> ${m.unit}
                        </span>
                      `).join('')}
                    </div>
                  ` : ''}
                  ${u ? `<div class="text-mute" style="font-size:10.5px;margin-top:2px">${ar?'بواسطة:':'by:'} ${escapeHTML(ar?u.name:u.nameEn)}</div>` : ''}
                </div>
              `;
            }).join('')}
          </div>
        `;
      })()}
    `;

    const canReturn = (wo.currentStage === 'AT_GDN' || wo.currentStage === 'DELIVERED') &&
                      (State.user.dept === 'GDN' || State.user.dept === 'PMF' || Perm.isManager());

    // Can report scrap if at a K-station and user is PROD/MGMT
    const atKStation = wo.currentStage?.startsWith('AT_K');
    const canReportScrap = atKStation && (State.user.dept === 'PROD' || Perm.isManager());

    const footer = `
      <button class="btn btn-secondary" onclick="App.closeModal()">${t('close')}</button>
      <button class="btn btn-secondary" onclick="App.closeModal();App.goto('trace');setTimeout(()=>{document.getElementById('traceQuery').value='${woId}';View.runTrace()},50)">${ar?'فتح في التتبع':'Open in Trace'}</button>
      ${canReportScrap ? `<button class="btn btn-secondary" onclick="App.closeModal();Action.reportScrap('${woId}','${wo.currentStage.replace('AT_','')}')" style="color:var(--rose)">🔻 ${ar?'تسجيل Scrap':'Scrap'}</button>` : ''}

  // ─────── REQUEST MAINTENANCE ───────
  // ─────── MAINTENANCE WORKFLOW (4-stage) ───────
  
  // STAGE 1: Operator/Production identifies fault and submits request
  requestMaint(stationId) {
    const ar = State.lang === 'ar';
    App.closeModal();
    const stationOpts = State.data.stations.map(s=>`<option value="${s.id}" ${s.id===stationId?'selected':''}>${s.code} — ${escapeHTML(ar?s.name:s.nameEn)} · ${s.status}</option>`).join('');
    const body = `
      <div style="background:rgba(244,63,94,0.06);border:1px solid rgba(244,63,94,0.25);border-radius:9px;padding:11px;margin-bottom:14px;font-size:11.5px;color:var(--rose)">
        🛠 <b>${ar?'طلب صيانة جديد':'New Maintenance Request'}</b>
        <div style="margin-top:4px;color:var(--text-2)">${ar?'حدد العطل بدقة. مشرف الصيانة سيقيّم الأولوية ويُنشئ أمر صيانة.':'Describe the fault precisely. Maintenance supervisor will evaluate priority and create work order.'}</div>
      </div>
      <div class="form-grid">
        <div class="field">
          <label>${ar?'المحطة':'Station'} <span class="req">*</span></label>
          <select id="mrStation">${stationOpts}</select>
        </div>
        <div class="field">
          <label>${ar?'وصف العطل (عنوان)':'Fault Title'} <span class="req">*</span></label>
          <input id="mrTitle" placeholder="${ar?'مثال: صوت غير طبيعي من المحرك':'e.g. Unusual motor sound'}">
        </div>
        <div class="form-row">
          <div class="field">
            <label>${ar?'الأولوية المقترحة':'Suggested Priority'}</label>
            <select id="mrPriority">
              <option value="low">${ar?'منخفض — جدولة دورية':'Low — schedule maintenance'}</option>
              <option value="normal" selected>${ar?'عادي — لا يوقف الإنتاج':'Normal — production continues'}</option>
              <option value="high">${ar?'عالي — يتطلب تدخل قريب':'High — needs prompt attention'}</option>
              <option value="critical">${ar?'حرج — يوقف المحطة فوراً':'Critical — stops station now'}</option>
            </select>
          </div>
          <div class="field">
            <label>${ar?'حالة المحطة':'Station Status'}</label>
            <select id="mrStnStatus">
              <option value="working">${ar?'تعمل لكن بمشاكل':'Working with issues'}</option>
              <option value="degraded">${ar?'تعمل بأداء منخفض':'Reduced performance'}</option>
              <option value="stopped">${ar?'متوقفة كلياً':'Completely stopped'}</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label>${ar?'وصف تفصيلي للعطل':'Detailed Description'}</label>
          <textarea id="mrDesc" rows="3" placeholder="${ar?'متى بدأ العطل؟ ما الأعراض؟ هل توقف الإنتاج؟':'When did the fault start? Symptoms? Has production stopped?'}"></textarea>
        </div>
        <div class="field">
          <label>${ar?'الفحص الأولي (اختياري)':'Initial Check (Optional)'}</label>
          <textarea id="mrCheck" rows="2" placeholder="${ar?'هل قمت بأي فحص أولي؟':'Any initial diagnostic checks performed?'}"></textarea>
        </div>
      </div>
      <div style="background:rgba(245,158,11,0.05);border:1px solid rgba(245,158,11,0.2);border-radius:8px;padding:9px;margin-top:8px;font-size:10.5px;color:var(--text-3)">
        💡 ${ar?'الأولوية النهائية يحدّدها مشرف الصيانة بعد التقييم. الأولوية "حرج" توقف المحطة فوراً.':'Final priority will be set by the maintenance supervisor. "Critical" priority stops the station immediately.'}
      </div>
    `;
    App.openModal(ar?'طلب صيانة جديد':'New Maintenance Request', body,
      `<button class="btn btn-secondary" onclick="App.closeModal()">${t('cancel')}</button>
       <button class="btn btn-primary" onclick="Action.submitMaintRequest()">${ar?'تقديم الطلب':'Submit Request'}</button>`, true);
  },

  submitMaintRequest() {
    const ar = State.lang === 'ar';
    const stationId = document.getElementById('mrStation').value;
    const title = document.getElementById('mrTitle').value.trim();
    const priority = document.getElementById('mrPriority').value;
    const stnStatus = document.getElementById('mrStnStatus').value;
    const description = document.getElementById('mrDesc').value.trim();
    const initialCheck = document.getElementById('mrCheck').value.trim();
    if (!title) { toast(ar?'وصف العطل مطلوب':'Fault title required','error'); return; }

    if (!State.data.maintenanceRequests) State.data.maintenanceRequests = [];
    const id = 'MR-' + String(State.data.maintenanceRequests.length + 1).padStart(4, '0');
    const req = {
      id, stationId,
      requestedBy: State.user.id,
      requestedAt: now(),
      faultTitle: title,
      description,
      initialCheck,
      stationStatusAtRequest: stnStatus,
      requestedPriority: priority,
      priority, // can be changed by supervisor
      status: 'requested',
      history: [
        { stage: 'requested', action: 'submit', by: State.user.id, ts: now(), notes: title }
      ]
    };
    State.data.maintenanceRequests.unshift(req);

    // Critical priority: stop station immediately
    const station = Q.station(stationId);
    if (station && priority === 'critical') {
      station.status = 'maintenance';
      station._maintRef = id;
      Movements.add('err', `🛑 ${ar?'محطة متوقفة لطلب حرج':'Station stopped for critical request'} — ${stationId}`, { stationId, mrId: id });
    } else if (station && stnStatus === 'stopped') {
      // If user reports station as fully stopped, mark it as such
      station.status = 'maintenance';
      station._maintRef = id;
    }

    Audit.log('request_maint', 'Maintenance', id, { stationId, priority, stnStatus });
    Movements.add('warn', `🛠 ${ar?'طلب صيانة جديد':'New maintenance request'}: ${stationId} — ${title} [${priority}]`, { mrId: id });
    State.save();
    Repo.maintenance.upsert(req).then(ok => {
      if (!ok) toast(ar?'⚠ حُفظ محلياً، فشل sync':'⚠ Saved locally, sync failed', 'warn');
    });
    App.closeModal();
    toast(ar?`✓ تم تقديم الطلب ${id}`:`✓ Request ${id} submitted`, 'success');
    App.goto('maintenance');
  },

  // STAGE 2: Maintenance Supervisor evaluates the request
  evaluateMaint(mrId) {
    const ar = State.lang === 'ar';
    const m = (State.data.maintenanceRequests||[]).find(x => x.id === mrId);
    if (!m) return;
    const isMaintSup = State.user.dept === 'MAINT' && /مشرف|Supervisor/i.test(State.user.role||'');
    if (!isMaintSup && !Perm.isManager()) { toast(t('no_perm'), 'error'); return; }

    const reqr = Q.user(m.requestedBy);
    const station = Q.station(m.stationId);
    const techOpts = Q.usersOf('MAINT').map(u =>
      `<option value="${u.id}">${escapeHTML(ar?u.name:u.nameEn)} ${/مشرف|Supervisor/i.test(u.role||'')?(ar?' (مشرف)':' (Sup)'):''}</option>`
    ).join('');

    const body = `
      <div style="background:rgba(245,185,66,0.08);border:1px solid rgba(245,185,66,0.3);border-radius:9px;padding:12px;margin-bottom:14px">
        <div style="font-size:13px;font-weight:700;margin-bottom:8px">📋 ${ar?'تفاصيل الطلب':'Request Details'}</div>
        <div style="display:grid;grid-template-columns:auto 1fr;gap:6px 14px;font-size:12px">
          <span class="text-mute">${ar?'الرقم:':'ID:'}</span><b class="mono">${m.id}</b>
          <span class="text-mute">${ar?'المحطة:':'Station:'}</span><b>${m.stationId} — ${escapeHTML(station?(ar?station.name:station.nameEn):'')}</b>
          <span class="text-mute">${ar?'العطل:':'Fault:'}</span><b>${escapeHTML(m.faultTitle)}</b>
          <span class="text-mute">${ar?'الوصف:':'Description:'}</span><span>${escapeHTML(m.description||'—')}</span>
          ${m.initialCheck?`<span class="text-mute">${ar?'الفحص الأولي:':'Initial Check:'}</span><span>${escapeHTML(m.initialCheck)}</span>`:''}
          <span class="text-mute">${ar?'حالة المحطة:':'Station Status:'}</span><span>${m.stationStatusAtRequest}</span>
          <span class="text-mute">${ar?'الطالب:':'Requested by:'}</span><span>${reqr?escapeHTML(ar?reqr.name:reqr.nameEn):'—'}</span>
          <span class="text-mute">${ar?'الأولوية المقترحة:':'Suggested priority:'}</span><span><b style="color:var(--gold)">${m.requestedPriority}</b></span>
        </div>
      </div>
      <div class="form-grid">
        <div class="form-row">
          <div class="field">
            <label>${ar?'تأكيد/تعديل الأولوية':'Confirm/Set Priority'} <span class="req">*</span></label>
            <select id="evPriority">
              <option value="critical" ${m.priority==='critical'?'selected':''}>${ar?'حرج — يوقف المحطة فوراً':'Critical'}</option>
              <option value="high" ${m.priority==='high'?'selected':''}>${ar?'عالي':'High'}</option>
              <option value="normal" ${m.priority==='normal'?'selected':''}>${ar?'عادي':'Normal'}</option>
              <option value="low" ${m.priority==='low'?'selected':''}>${ar?'منخفض':'Low'}</option>
            </select>
          </div>
          <div class="field">
            <label>${ar?'الفني المعيَّن':'Assigned Technician'} <span class="req">*</span></label>
            <select id="evTech">${techOpts}</select>
          </div>
        </div>
        <div class="form-row">
          <div class="field">
            <label>${ar?'النوع':'Type'}</label>
            <select id="evType">
              <option value="corrective">${ar?'تصحيحية':'Corrective'}</option>
              <option value="preventive">${ar?'وقائية':'Preventive'}</option>
              <option value="predictive">${ar?'تنبؤية':'Predictive'}</option>
              <option value="emergency">${ar?'طارئة':'Emergency'}</option>
            </select>
          </div>
          <div class="field">
            <label>${ar?'الوقت المقدَّر (ساعات)':'Est. Hours'}</label>
            <input id="evHours" type="number" min="0" step="0.5" placeholder="2.5">
          </div>
        </div>
        <div class="field">
          <label>${ar?'تشخيص المشرف':'Supervisor Diagnosis'} <span class="req">*</span></label>
          <textarea id="evDiagnosis" rows="2" placeholder="${ar?'ما هو السبب المحتمل؟ ماذا يحتاج الإصلاح؟':'Probable cause? What needs fixing?'}"></textarea>
        </div>
        <div class="field">
          <label>${ar?'القطع/المواد المطلوبة (اختياري)':'Parts/Materials Needed (optional)'}</label>
          <textarea id="evParts" rows="2"></textarea>
        </div>
      </div>
    `;
    App.openModal(`${ar?'تقييم طلب صيانة':'Evaluate Request'} — ${m.id}`, body,
      `<button class="btn btn-secondary" onclick="App.closeModal()">${t('cancel')}</button>
       <button class="btn btn-primary" onclick="Action.saveEvaluation('${mrId}')">${ar?'إنشاء أمر صيانة':'Create Work Order'}</button>`, true);
  },

  saveEvaluation(mrId) {
    const ar = State.lang === 'ar';
    const m = (State.data.maintenanceRequests||[]).find(x => x.id === mrId);
    if (!m) return;
    const get = (id) => document.getElementById(id).value.trim();
    const priority = document.getElementById('evPriority').value;
    const tech = document.getElementById('evTech').value;
    const type = document.getElementById('evType').value;
    const hours = parseFloat(document.getElementById('evHours').value) || 0;
    const diagnosis = get('evDiagnosis');
    const parts = get('evParts');
    if (!diagnosis) { toast(ar?'التشخيص مطلوب':'Diagnosis required','error'); return; }

    m.status = 'evaluated';
    m.priority = priority;
    m.assignedTo = tech;
    m.maintenanceType = type;
    m.estimatedHours = hours;
    m.diagnosis = diagnosis;
    m.partsNeeded = parts;
    m.evaluatedBy = State.user.id;
    m.evaluatedAt = now();
    m.workOrderNumber = 'MWO-' + new Date().getFullYear() + '-' + String((State.data.maintenanceRequests||[]).filter(x=>x.workOrderNumber).length + 1).padStart(4,'0');
    m.history.push({ stage: 'evaluated', action: 'evaluate', by: State.user.id, ts: now(), notes: `${priority} | ${diagnosis.substring(0,50)}` });

    // Adjust station status based on priority
    const station = Q.station(m.stationId);
    if (station) {
      if (priority === 'critical' || priority === 'high') {
        if (station.status !== 'maintenance') {
          station.status = 'maintenance';
          station._maintRef = mrId;
          Movements.add('warn', `🛑 ${ar?'المحطة متوقفة للصيانة':'Station stopped for maintenance'} — ${m.stationId}`, { stationId: m.stationId, mrId });
        }
      }
      // normal/low: station stays running until "start work"
    }

    Audit.log('evaluate_maint', 'Maintenance', mrId, { priority, tech, wo: m.workOrderNumber });
    Movements.add('info', `📋 ${ar?'تم تقييم':'Evaluated'} ${mrId} — ${m.workOrderNumber} (${priority})`, { mrId });
    State.save();
    Repo.maintenance.upsert(m).then(ok => {
      if (!ok) toast(ar?'⚠ حُفظ محلياً، فشل sync':'⚠ Saved locally, sync failed', 'warn');
    });
    App.closeModal();
    toast(ar?`✓ ${m.workOrderNumber} جاهز للتنفيذ`:`✓ ${m.workOrderNumber} ready for work`, 'success');
    App.goto('maintenance');
  },

  // STAGE 3: Engineer starts the maintenance work
  startMaint(mrId) {
    const ar = State.lang === 'ar';
    const m = (State.data.maintenanceRequests||[]).find(x => x.id === mrId);
    if (!m) return;
    if (State.user.dept !== 'MAINT' && !Perm.isManager()) { toast(t('no_perm'), 'error'); return; }

    m.status = 'in_progress';
    m.startedAt = now();
    m.startedBy = State.user.id;
    if (!m.assignedTo) m.assignedTo = State.user.id;
    m.history.push({ stage: 'in_progress', action: 'start', by: State.user.id, ts: now() });

    // Now station MUST be in maintenance
    const station = Q.station(m.stationId);
    if (station && station.status !== 'maintenance') {
      station.status = 'maintenance';
      station._maintRef = mrId;
    }

    Audit.log('start_maint', 'Maintenance', mrId, {});
    Movements.add('info', `▶ ${ar?'بدء صيانة':'Maintenance started'}: ${mrId} — ${m.stationId}`, { mrId });
    State.save();
    Repo.maintenance.upsert(m).then(ok => {
      if (!ok) toast(ar?'⚠ حُفظ محلياً، فشل sync':'⚠ Saved locally, sync failed', 'warn');
    });
    toast(ar?'بدأ التنفيذ':'Work started','success');
    App.goto('maintenance');
  },

  // STAGE 4a: Engineer marks work complete (with documentation)
  finishMaint(mrId) {
    const ar = State.lang === 'ar';
    const m = (State.data.maintenanceRequests||[]).find(x => x.id === mrId);
    if (!m) return;
    if (State.user.dept !== 'MAINT' && !Perm.isManager()) { toast(t('no_perm'), 'error'); return; }

    const body = `
      <div style="background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.25);border-radius:9px;padding:11px;margin-bottom:14px;font-size:11.5px;color:var(--emerald)">
        ✓ <b>${ar?'إنجاز الصيانة':'Complete Maintenance'}</b> — ${ar?'وثّق العمل المُنفَّذ. المشرف سيتحقق ثم يبلّغ الإنتاج.':'Document the work. Supervisor will verify then notify production.'}
      </div>
      <div class="form-grid">
        <div class="field">
          <label>${ar?'العمل المُنفَّذ':'Work Performed'} <span class="req">*</span></label>
          <textarea id="cmWork" rows="3" placeholder="${ar?'صف بالتفصيل ما تم إصلاحه':'Describe in detail what was repaired'}"></textarea>
        </div>
        <div class="form-row">
          <div class="field">
            <label>${ar?'القطع المستخدمة':'Parts Used'}</label>
            <textarea id="cmParts" rows="2"></textarea>
          </div>
          <div class="field">
            <label>${ar?'الوقت الفعلي (ساعات)':'Actual Hours'} <span class="req">*</span></label>
            <input id="cmHours" type="number" min="0" step="0.5" value="${m.estimatedHours||1}">
          </div>
        </div>
        <div class="field">
          <label>${ar?'الاختبار والتحقق':'Testing & Verification'} <span class="req">*</span></label>
          <textarea id="cmTest" rows="2" placeholder="${ar?'كيف تم اختبار الإصلاح؟ هل المحطة تعمل بشكل طبيعي؟':'How was repair tested? Station running normally?'}"></textarea>
        </div>
        <div class="field">
          <label>${ar?'ملاحظات للمشرف':'Notes for Supervisor'}</label>
          <textarea id="cmNotes" rows="2"></textarea>
        </div>
      </div>
    `;
    App.openModal(`${ar?'إنهاء الصيانة':'Complete Work'} — ${m.id}`, body,
      `<button class="btn btn-secondary" onclick="App.closeModal()">${t('cancel')}</button>
       <button class="btn btn-success" onclick="Action.saveFinishMaint('${mrId}')">${ar?'تم الإنجاز':'Mark Complete'}</button>`, true);
  },

  saveFinishMaint(mrId) {
    const ar = State.lang === 'ar';
    const m = (State.data.maintenanceRequests||[]).find(x => x.id === mrId);
    if (!m) return;
    const get = (id) => document.getElementById(id).value.trim();
    const work = get('cmWork');
    const parts = get('cmParts');
    const hours = parseFloat(document.getElementById('cmHours').value) || 0;
    const testing = get('cmTest');
    const notes = get('cmNotes');
    if (!work || !testing) { toast(ar?'العمل المُنفَّذ والاختبار مطلوبان':'Work and testing required','error'); return; }

    m.status = 'completed';
    m.workPerformed = work;
    m.partsUsed = parts;
    m.actualHours = hours;
    m.testResults = testing;
    m.completionNotes = notes;
    m.completedAt = now();
    m.completedBy = State.user.id;
    m.history.push({ stage: 'completed', action: 'finish', by: State.user.id, ts: now(), notes: work.substring(0, 60) });

    Audit.log('finish_maint', 'Maintenance', mrId, { hours });
    Movements.add('ok', `✓ ${ar?'انتهت الصيانة':'Maintenance finished'}: ${mrId} — ${m.stationId} (${ar?'بانتظار تحقق المشرف':'awaiting verification'})`, { mrId });
    State.save();
    Repo.maintenance.upsert(m).then(ok => {
      if (!ok) toast(ar?'⚠ حُفظ محلياً، فشل sync':'⚠ Saved locally, sync failed', 'warn');
    });
    App.closeModal();
    toast(ar?'تم الإنجاز — بانتظار تحقق المشرف':'Done — awaiting supervisor verification','success');
    App.goto('maintenance');
  },

  // STAGE 4b: Supervisor verifies and notifies production
  verifyMaint(mrId) {
    const ar = State.lang === 'ar';
    const m = (State.data.maintenanceRequests||[]).find(x => x.id === mrId);
    if (!m) return;
    const isMaintSup = State.user.dept === 'MAINT' && /مشرف|Supervisor/i.test(State.user.role||'');
    if (!isMaintSup && !Perm.isManager()) { toast(t('no_perm'), 'error'); return; }

    const tech = m.completedBy ? Q.user(m.completedBy) : null;
    const body = `
      <div style="background:rgba(245,185,66,0.08);border:1px solid rgba(245,185,66,0.3);border-radius:9px;padding:12px;margin-bottom:14px">
        <div style="font-size:13px;font-weight:700;margin-bottom:8px">📋 ${ar?'مراجعة العمل':'Work Review'}</div>
        <div style="display:grid;grid-template-columns:auto 1fr;gap:6px 14px;font-size:12px">
          <span class="text-mute">${ar?'الفني:':'Tech:'}</span><b>${tech?escapeHTML(ar?tech.name:tech.nameEn):'—'}</b>
          <span class="text-mute">${ar?'العمل:':'Work:'}</span><span>${escapeHTML(m.workPerformed||'')}</span>
          <span class="text-mute">${ar?'القطع:':'Parts:'}</span><span>${escapeHTML(m.partsUsed||'—')}</span>
          <span class="text-mute">${ar?'الوقت:':'Hours:'}</span><span class="mono">${m.actualHours||0}</span>
          <span class="text-mute">${ar?'الاختبار:':'Testing:'}</span><span>${escapeHTML(m.testResults||'')}</span>
        </div>
      </div>
      <div class="form-grid">
        <div class="field">
          <label>${ar?'حكم المشرف':'Supervisor Verdict'} <span class="req">*</span></label>
          <select id="vmVerdict">
            <option value="approved">${ar?'✓ مقبول — الإصلاح كامل':'✓ Approved — fix complete'}</option>
            <option value="needs_rework">${ar?'⟲ يحتاج إعادة عمل':'⟲ Needs rework'}</option>
          </select>
        </div>
        <div class="field">
          <label>${ar?'ملاحظات التحقق':'Verification Notes'}</label>
          <textarea id="vmNotes" rows="3" placeholder="${ar?'أي ملاحظات على الإصلاح':'Any notes on the repair'}"></textarea>
        </div>
      </div>
    `;
    App.openModal(`${ar?'تحقق وإغلاق':'Verify & Close'} — ${m.id}`, body,
      `<button class="btn btn-secondary" onclick="App.closeModal()">${t('cancel')}</button>
       <button class="btn btn-primary" onclick="Action.saveVerification('${mrId}')">${ar?'تأكيد':'Confirm'}</button>`, true);
  },

  saveVerification(mrId) {
    const ar = State.lang === 'ar';
    const m = (State.data.maintenanceRequests||[]).find(x => x.id === mrId);
    if (!m) return;
    const verdict = document.getElementById('vmVerdict').value;
    const notes = document.getElementById('vmNotes').value.trim();

    if (verdict === 'needs_rework') {
      m.status = 'in_progress';
      m.history.push({ stage: 'in_progress', action: 'rework_required', by: State.user.id, ts: now(), notes });
      Audit.log('reject_completion', 'Maintenance', mrId, { notes });
      Movements.add('warn', `↩ ${ar?'إعادة عمل':'Rework required'}: ${mrId}`, { mrId });
      State.save();
      Repo.maintenance.upsert(m).then(ok => {
        if (!ok) toast(ar?'⚠ حُفظ محلياً، فشل sync':'⚠ Saved locally, sync failed', 'warn');
      });
      App.closeModal();
      toast(ar?'تم إرجاع للفني':'Sent back to technician','info');
      App.goto('maintenance');
      return;
    }

    // Approved — close everything
    m.status = 'verified';
    m.verifiedBy = State.user.id;
    m.verifiedAt = now();
    m.verificationNotes = notes;
    m.productionNotified = true;
    m.history.push({ stage: 'verified', action: 'verify', by: State.user.id, ts: now(), notes });

    // Re-enable station
    const station = Q.station(m.stationId);
    if (station && station._maintRef === mrId) {
      station.status = 'idle';
      station._maintRef = null;
      Movements.add('ok', `🟢 ${ar?'المحطة جاهزة للعمل':'Station ready'} — ${m.stationId}`, { stationId: m.stationId });
    }

    Audit.log('verify_maint', 'Maintenance', mrId, { notes });
    Movements.add('ok', `✓ ${ar?'تم إغلاق الصيانة':'Maintenance closed'}: ${mrId} — ${ar?'الإنتاج بُلِّغ':'production notified'}`, { mrId });
    State.save();
    Repo.maintenance.upsert(m).then(ok => {
      if (!ok) toast(ar?'⚠ حُفظ محلياً، فشل sync':'⚠ Saved locally, sync failed', 'warn');
    });
    App.closeModal();
    toast(ar?'✓ تم الإغلاق — المحطة جاهزة':'✓ Closed — station ready','success');
    App.goto('maintenance');
  },

  // Reject a request before evaluation (supervisor decides it's not needed)
  rejectMaint(mrId) {
    const ar = State.lang === 'ar';
    const m = (State.data.maintenanceRequests||[]).find(x => x.id === mrId);
    if (!m) return;
    const isMaintSup = State.user.dept === 'MAINT' && /مشرف|Supervisor/i.test(State.user.role||'');
    if (!isMaintSup && !Perm.isManager()) { toast(t('no_perm'), 'error'); return; }
    const body = `
      <div style="background:rgba(244,63,94,0.06);border:1px solid rgba(244,63,94,0.25);border-radius:9px;padding:11px;margin-bottom:14px;font-size:11.5px;color:var(--rose)">
        ✕ <b>${ar?'رفض طلب الصيانة':'Reject Request'}</b>
      </div>
      <div class="field">
        <label>${ar?'سبب الرفض':'Rejection Reason'} <span class="req">*</span></label>
        <textarea id="rjReason" rows="3" placeholder="${ar?'مثال: ليس عطل، إساءة استخدام، طلب مكرر':'e.g. Not a fault, misuse, duplicate request'}"></textarea>
      </div>
    `;
    App.openModal(`${ar?'رفض الطلب':'Reject'} — ${m.id}`, body,
      `<button class="btn btn-secondary" onclick="App.closeModal()">${t('cancel')}</button>
       <button class="btn btn-danger" onclick="Action.saveReject('${mrId}')">${ar?'تأكيد الرفض':'Confirm Reject'}</button>`, true);
  },

  saveReject(mrId) {
    const ar = State.lang === 'ar';
    const m = (State.data.maintenanceRequests||[]).find(x => x.id === mrId);
    if (!m) return;
    const reason = document.getElementById('rjReason').value.trim();
    if (!reason) { toast(ar?'السبب مطلوب':'Reason required','error'); return; }
    m.status = 'rejected';
    m.rejectedBy = State.user.id;
    m.rejectedAt = now();
    m.rejectionReason = reason;
    m.history.push({ stage: 'rejected', action: 'reject', by: State.user.id, ts: now(), notes: reason });

    // If station was set to maintenance for this request, restore it
    const station = Q.station(m.stationId);
    if (station && station._maintRef === mrId) {
      station.status = 'idle';
      station._maintRef = null;
    }
    Audit.log('reject_maint', 'Maintenance', mrId, { reason });
    Movements.add('warn', `✕ ${ar?'تم رفض طلب صيانة':'Maintenance request rejected'}: ${mrId}`, { mrId });
    State.save();
    Repo.maintenance.upsert(m).then(ok => {
      if (!ok) toast(ar?'⚠ حُفظ محلياً، فشل sync':'⚠ Saved locally, sync failed', 'warn');
    });
    App.closeModal();
    toast(ar?'تم الرفض':'Rejected','info');
    App.goto('maintenance');
  },

       <button class="btn btn-primary" onclick="Action.saveCommitteeSettings()">${t('save')}</button>`, true);
  },

  saveCommitteeSettings() {
    const ar = State.lang === 'ar';
    if (!Perm.isManager()) return;
    const enabled = document.getElementById('cmEnabled').value === 'true';
    const quorum = parseInt(document.getElementById('cmQuorum').value) || 3;
    const checks = document.querySelectorAll('.cmMember:checked');
    const memberIds = Array.from(checks).map(c => c.value);

    if (enabled && memberIds.length < quorum) {
      toast(ar?`عدد الأعضاء (${memberIds.length}) أقل من النصاب (${quorum})`:`Members (${memberIds.length}) < quorum (${quorum})`,'error');
      return;
    }

    const members = memberIds.map(uid => ({ userId: uid, addedAt: now(), addedBy: State.user.id }));
    if (!State.data.committee) State.data.committee = {};
    State.data.committee.enabled = enabled;
    State.data.committee.requiredApprovals = quorum;
    State.data.committee.members = members;

    Audit.log('committee_config', 'Committee', 'config', { enabled, quorum, memberCount: members.length });
    Movements.add('info', `⚙ ${ar?'تحديث إعدادات لجنة القبول':'Committee config updated'} — ${members.length} ${ar?'عضو':'members'}, ${ar?'النصاب':'quorum'}: ${quorum}`, {});
    State.save();
    // Cloud sync — both config and members
    Promise.all([
      Repo.committee.setConfig({ enabled, requiredApprovals: quorum }),
      Repo.committee.setMembers(memberIds),
    ]).then(([ok1, ok2]) => {
      if (!ok1 || !ok2) toast(ar?'⚠ حُفظ محلياً، فشل sync':'⚠ Saved locally, sync failed', 'warn');
    });
    App.closeModal();
    toast(ar?'✓ تم حفظ الإعدادات':'✓ Settings saved','success');
    View.committee();
  },

            <option value="reject">${ar?'✕ رفض — يحتاج إعادة فحص':'✕ Reject — needs re-inspection'}</option>
          </select>
        </div>
        <div class="field">
          <label>${ar?'ملاحظات':'Notes'}</label>
          <textarea id="crNotes" rows="2" placeholder="${ar?'مثال: تم فحص العينات، الجودة ضمن المعايير':'e.g. Samples inspected, quality within spec'}"></textarea>

       <button class="btn btn-primary" onclick="Action.saveCommitteeReview('${woId}')">${ar?'تأكيد المراجعة':'Submit Review'}</button>`, true);
  },

  saveCommitteeReview(woId) {
    const ar = State.lang === 'ar';
    const wo = Q.wo(woId);
    if (!wo) return;
    const decision = document.getElementById('crDecision').value;
    const notes = document.getElementById('crNotes').value.trim();
    const cfg = State.data.committee || {};

    if (!State.data.committeeReviews) State.data.committeeReviews = [];
    const myReview = {
      id: 'CR-' + (State.data.committeeReviews.length + 1),
      woId, userId: State.user.id, decision, notes, ts: now()
    };
    State.data.committeeReviews.unshift(myReview);
    Audit.log('committee_review', 'WorkOrder', woId, { decision, notes: notes.substring(0, 80) });
    Movements.add(decision==='approve'?'ok':'warn', `${decision==='approve'?'✓':'✕'} ${ar?'مراجعة لجنة':'Committee review'} ${woId} — ${decision}`, { woId });

    // Check if quorum reached
    const reviews = State.data.committeeReviews.filter(r => r.woId === woId);
    const approvals = reviews.filter(r => r.decision === 'approve').length;
    const rejections = reviews.filter(r => r.decision === 'reject').length;
    const quorum = cfg.requiredApprovals || 3;
    let createdReturn = null;

    if (approvals >= quorum) {
      // APPROVED — move to DELIVERED
      wo.currentStage = 'DELIVERED';
      wo.currentOwner = null;
      wo.history.push({ stage: 'DELIVERED', action: 'committee_approved', fromUser: State.user.id, toUser: null, qty: wo.produced, scrap: wo.scrap, ts: now(), notes: `${ar?'موافقة اللجنة':'Committee approved'} (${approvals} ${ar?'موافقات':'approvals'})` });
      Audit.log('committee_approved', 'WorkOrder', woId, { approvals, total: reviews.length });
      Movements.add('ok', `🎉 ${ar?'موافقة اللجنة':'Committee APPROVED'} ${woId} — ${ar?'تم التسليم':'delivered'}`, { woId });
    } else if (rejections >= quorum) {
      // REJECTED — return to PMF
      createdReturn = {
        id: 'RET-' + ((State.data.returns||[]).length + 1),
        woId, qty: wo.produced - wo.scrap,
        reason: ar?`رفضت اللجنة (${rejections} رفض)`:`Committee rejected (${rejections} rejections)`,
        source: ar?'لجنة القبول':'Acceptance Committee',
        requestedBy: State.user.id, ts: now(), status: 'pending', disposition: null
      };
      if (!State.data.returns) State.data.returns = [];
      State.data.returns.unshift(createdReturn);
      wo.currentStage = 'RETURNED';
      wo.currentOwner = State.data.warehouses.find(w=>w.dept==='PMF')?.managerId || null;
      wo.history.push({ stage: 'RETURNED', action: 'committee_rejected', fromUser: State.user.id, toUser: wo.currentOwner, qty: wo.produced, scrap: wo.scrap, ts: now(), notes: createdReturn.reason });
      Audit.log('committee_rejected', 'WorkOrder', woId, { rejections });
      Movements.add('err', `↩ ${ar?'رفض اللجنة':'Committee REJECTED'} ${woId} — ${ar?'مرتجع لـ PMF':'returned to PMF'}`, { woId });
    }

    State.save();
    // Cloud sync — review always, return if quorum-rejected
    const tasks = [Repo.committee.addReview(myReview)];
    if (createdReturn) tasks.push(Repo.returns.upsert(createdReturn));
    Promise.all(tasks).then(results => {
      if (results.some(r => !r)) toast(ar?'⚠ حُفظ محلياً، فشل sync':'⚠ Saved locally, sync failed', 'warn');
    });
    App.closeModal();
    toast(ar?'✓ تم تسجيل مراجعتك':'✓ Review submitted','success');
    View.committee();
  },

  },

  saveReturn(woId) {
    const ar = State.lang === 'ar';
    const wo = Q.wo(woId);
    if (!wo) return;
    const qty = parseInt(document.getElementById('rtQty').value);
    const defectType = document.getElementById('rtType').value;
    const reason = document.getElementById('rtReason').value.trim();
    const notes = document.getElementById('rtNotes').value.trim();
    if (!reason || !qty || qty <= 0) { toast(ar?'الكمية والسبب مطلوبان':'Quantity and reason required','error'); return; }

    if (!State.data.returns) State.data.returns = [];
    const ret = {
      id: 'RET-' + (State.data.returns.length + 1),
      woId, qty, defectType, reason, notes,
      source: wo.currentStage === 'AT_GDN' ? 'GDN' : wo.currentStage === 'DELIVERED' ? (ar?'العميل':'Customer') : wo.currentStage,
      requestedBy: State.user.id, ts: now(),
      status: 'pending', disposition: null
    };
    State.data.returns.unshift(ret);

    // Move WO to RETURNED stage (back to PMF custody)
    const prevStage = wo.currentStage;
    wo.currentStage = 'RETURNED';
    wo.currentOwner = State.data.warehouses.find(w=>w.dept==='PMF')?.managerId || null;
    wo.history.push({ stage: 'RETURNED', action: 'return', fromUser: State.user.id, toUser: wo.currentOwner, qty, scrap: 0, ts: now(), notes: `${ar?'من':'from'} ${prevStage}: ${reason.substring(0, 80)}` });

    Audit.log('return_wo', 'WorkOrder', woId, { qty, prevStage, reason: reason.substring(0,100) });
    Movements.add('warn', `↩ ${ar?'إرجاع دفعة':'Batch returned'} ${woId} (${fmt.num(qty)}) — ${reason.substring(0,40)}`, { woId, retId: ret.id });
    State.save();
    Repo.returns.upsert(ret).then(ok => {
      if (!ok) toast(ar?'⚠ حُفظ محلياً، فشل sync':'⚠ Saved locally, sync failed', 'warn');
    });
    App.closeModal();
    toast(ar?'✓ تم تسجيل المرتجع — في انتظار قرار PMF/QC':'✓ Return logged — awaiting PMF/QC decision','success');
    App.goto('returns');
  },

  // Decide what to do with a returned batch
  returnDecision(woId, disposition) {
    const ar = State.lang === 'ar';
    const wo = Q.wo(woId);
    const ret = (State.data.returns||[]).find(r => r.woId === woId && r.status === 'pending');
    if (!wo || !ret) return;
    const canDecide = State.user.dept === 'PMF' || State.user.dept === 'QC' || Perm.isManager();
    if (!canDecide) { toast(t('no_perm'), 'error'); return; }

    const dispositionLabel = disposition === 'reprocess' ? (ar?'إعادة للإنتاج':'Reprocess') : (ar?'شطب (Scrap)':'Scrap');
    const body = `
      <div style="background:${disposition==='reprocess'?'rgba(56,189,248,0.06)':'rgba(244,63,94,0.06)'};border:1px solid ${disposition==='reprocess'?'rgba(56,189,248,0.25)':'rgba(244,63,94,0.25)'};border-radius:9px;padding:11px;margin-bottom:14px;font-size:11.5px">
        ${disposition==='reprocess'?'🔄':'🗑'} <b>${dispositionLabel}</b> — ${woId}
      </div>
      <div style="background:var(--glass-2);padding:10px;border-radius:8px;margin-bottom:14px;font-size:12px">

              <option value="AT_K1">${ar?'العودة لـ K1 — تجليد':'Back to K1 — Binding'}</option>
              <option value="AT_K2">${ar?'العودة لـ K2 — تغليف':'Back to K2 — Lamination'}</option>
              <option value="AT_K3">${ar?'العودة لـ K3 — نقش':'Back to K3 — Embossing'}</option>
              <option value="AT_K4">${ar?'العودة لـ K4 — تشخيص':'Back to K4 — Pre-Person'}</option>
              <option value="AT_MOC" selected>${ar?'العودة لـ MOC — فحص نهائي':'Back to MOC — Final QC'}</option>
            </select>
          </div>
          <div class="field">
            <label>${ar?'ملاحظات':'Notes'}</label>
            <textarea id="rdNotes" rows="2"></textarea>
          </div>
        </div>
      ` : `
        <div class="form-grid">
          <div class="field">
            <label>${ar?'سبب الشطب النهائي':'Final Scrap Reason'} <span class="req">*</span></label>
            <textarea id="rdNotes" rows="3" placeholder="${ar?'سبب عدم إمكانية الإصلاح':'Why cannot be fixed'}"></textarea>
          </div>
        </div>
        <div style="background:rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.25);border-radius:8px;padding:9px;margin-top:8px;font-size:11px;color:var(--amber)">
          ⚠ ${ar?'الكمية ستُضاف للـ scrap. هذي عملية لا يمكن التراجع عنها.':'Quantity will be added to scrap. This is irreversible.'}

      `}
    `;

      `<button class="btn btn-secondary" onclick="App.closeModal()">${t('cancel')}</button>
       <button class="btn ${disposition==='reprocess'?'btn-primary':'btn-danger'}" onclick="Action.saveReturnDecision('${woId}','${disposition}')">${ar?'تأكيد':'Confirm'}</button>`, true);
  },

  saveReturnDecision(woId, disposition) {
    const ar = State.lang === 'ar';
    const wo = Q.wo(woId);
    const ret = (State.data.returns||[]).find(r => r.woId === woId && r.status === 'pending');
    if (!wo || !ret) return;
    const notes = document.getElementById('rdNotes').value.trim();

    ret.status = 'closed';
    ret.disposition = disposition;
    ret.decidedBy = State.user.id;
    ret.decidedAt = now();
    ret.decisionNotes = notes;

    if (disposition === 'reprocess') {
      const stage = document.getElementById('rdStage').value;
      wo.currentStage = stage;
      const stationId = stage.replace('AT_','');
      const station = Q.station(stationId);
      wo.currentOwner = station?.operatorId || (stage==='AT_MOC'?Q.usersOf('QC')[0]?.id:null);
      wo.history.push({ stage, action: 'reprocess', fromUser: State.user.id, toUser: wo.currentOwner, qty: ret.qty, scrap: 0, ts: now(), notes: `${ar?'إعادة معالجة':'Reprocess'}: ${notes||'—'}` });
      Audit.log('return_reprocess', 'WorkOrder', woId, { stage, qty: ret.qty });
      Movements.add('info', `🔄 ${ar?'إعادة معالجة':'Reprocess'} ${woId} → ${stage}`, { woId });
      toast(ar?`✓ أُعيدت للمحطة ${stage}`:`✓ Sent back to ${stage}`, 'success');
    } else {
      // Scrap — add to wo.scrap
      wo.scrap += ret.qty;
      // Move back to a final state — back to GDN or DELIVERED depending on prev
      wo.currentStage = 'DELIVERED'; // close it as delivered with the scrapped portion noted
      wo.history.push({ stage: 'DELIVERED', action: 'scrap_return', fromUser: State.user.id, toUser: null, qty: 0, scrap: ret.qty, ts: now(), notes: `${ar?'شطب نهائي:':'Scrapped:'} ${notes}` });
      Audit.log('return_scrap', 'WorkOrder', woId, { qty: ret.qty, reason: notes.substring(0,100) });
      Movements.add('err', `🗑 ${ar?'شطب':'Scrap'} ${woId}: ${fmt.num(ret.qty)} ${ar?'وحدة':'units'}`, { woId });
      toast(ar?`✓ تم الشطب: ${fmt.num(ret.qty)} وحدة`:`✓ Scrapped: ${fmt.num(ret.qty)} units`, 'success');
    }

    State.save();
    Repo.returns.upsert(ret).then(ok => {
      if (!ok) toast(State.lang==='ar'?'⚠ حُفظ محلياً، فشل sync':'⚠ Saved locally, sync failed', 'warn');
    });
    App.closeModal();
    App.goto('returns');
  },

  // ─────── SEQUENCE WORKFLOW — Buffer → MOC → Packaging ───────

  // Helper: update sequence range preview when batch size changes
  _updateSeqRange(startSerial) {
    const v = parseInt(document.getElementById('seqQty')?.value) || 0;
    const el = document.getElementById('seqRangePreview');
    if (el) el.textContent = startSerial + ' → ' + (startSerial + v - 1);
  },

  // Helper: update MOC sum preview when pass/fail counts change
  _updateMocSum(expectedTotal) {
    const p = parseInt(document.getElementById('mocPassed')?.value) || 0;
    const f = parseInt(document.getElementById('mocFailed')?.value) || 0;
    const sum = p + f;
    const el = document.getElementById('mocSumPreview');
    if (el) {
      el.textContent = sum;
      el.style.color = sum === expectedTotal ? 'var(--emerald)' : 'var(--rose)';
    }
  },

  // ─────── SCRAP REPORTING ───────

  // Open scrap reporting dialog for a WO at a specific station
  reportScrap(woId, stationId) {
    const ar = State.lang === 'ar';
    if (!Perm.canAct('PROD') && !Perm.isManager()) { toast(t('no_perm'), 'error'); return; }
    const wo = Q.wo(woId);
    if (!wo) return;
    const station = stationId || (wo.currentStage?.startsWith('AT_K') ? wo.currentStage.replace('AT_', '') : null);
    if (!station) { toast(ar?'لا توجد محطة محددة':'No station identified','error'); return; }

    const recipe = BOM.forStation(station);
    const hasRecipe = recipe.length > 0;

    const body = `
      <div style="background:rgba(244,63,94,0.06);border:1px solid rgba(244,63,94,0.25);border-radius:9px;padding:12px;margin-bottom:14px;font-size:11.5px">
        🔻 <b style="color:var(--rose)">${ar?'تسجيل Scrap':'Report Scrap'}</b>
        <div style="margin-top:6px;color:var(--text-2)">${ar?'WO:':'WO:'} <b>${woId}</b> · ${ar?'المحطة:':'Station:'} <b>${station}</b></div>
        ${hasRecipe ? '' : `<div style="margin-top:6px;color:var(--amber)">⚠ ${ar?'هذه المحطة بدون BOM — لن يُحسب فقد المواد':'This station has no BOM — material loss not calculated'}</div>`}
      </div>
      <div class="form-grid">
        <div class="field">
          <label>${ar?'عدد الوحدات التالفة':'Scrapped Units'} <span class="req">*</span></label>
          <input id="scrapQty" type="number" min="1" value="1" oninput="Action._previewScrap('${woId}','${station}')">
        </div>
        <div class="field">
          <label>${ar?'السبب (اختياري)':'Reason (optional)'}</label>
          <textarea id="scrapReason" rows="2" placeholder="${ar?'مثلاً: عيب طباعة، تلف ميكانيكي':'e.g. print defect, mechanical damage'}"></textarea>
        </div>
        <div id="scrapPreview" style="background:var(--glass);border-radius:8px;padding:10px;font-size:11.5px"></div>
      </div>
    `;
    App.openModal(`${ar?'تسجيل Scrap':'Report Scrap'} — ${station}`, body,
      `<button class="btn btn-secondary" onclick="App.closeModal()">${t('cancel')}</button>
       <button class="btn btn-primary" onclick="Action.saveReportScrap('${woId}','${station}')" style="background:var(--rose);border-color:var(--rose)">${ar?'تأكيد Scrap':'Confirm Scrap'}</button>`, true);
    // Initial preview
    setTimeout(() => Action._previewScrap(woId, station), 30);
  },

  // Live preview of scrap impact (recovery + loss)
  _previewScrap(woId, stationId) {
    const ar = State.lang === 'ar';
    const qty = parseInt(document.getElementById('scrapQty')?.value) || 0;
    const el = document.getElementById('scrapPreview');
    if (!el) return;
    if (qty <= 0) { el.innerHTML = ''; return; }
    const calc = Scrap.calculate(woId, stationId, qty);
    if (!calc.ok) { el.innerHTML = `<span style="color:var(--rose)">${calc.error}</span>`; return; }
    if (calc.noBom || calc.materials.length === 0) {
      el.innerHTML = `<span class="text-mute">${ar?'لا يوجد BOM لهذه المحطة — سيُسجَّل scrap كمياً فقط':'No BOM for this station — scrap recorded as qty only'}</span>`;
      return;
    }
    el.innerHTML = `
      <div style="font-weight:600;margin-bottom:6px">${ar?'تأثير Scrap على المواد:':'Material impact:'}</div>
      <table class="data" style="width:100%;font-size:11px">
        <thead><tr>
          <th>${ar?'المادة':'Material'}</th>
          <th>${ar?'مُستهلك':'Consumed'}</th>
          <th>${ar?'مُسترد':'Recovered'}</th>
          <th>${ar?'فقد':'Lost'}</th>
        </tr></thead>
        <tbody>${calc.materials.map(m => `
          <tr>
            <td class="mono">${m.sku}</td>
            <td class="mono">${fmt.num(m.consumed)} ${m.unit}</td>
            <td class="mono" style="color:var(--emerald)">${m.recovered > 0 ? '+' + fmt.num(m.recovered) + ' ' + m.unit : '—'}</td>
            <td class="mono" style="color:var(--rose)">${fmt.num(m.lost)} ${m.unit}</td>
          </tr>
        `).join('')}</tbody>
        <tfoot><tr style="border-top:2px solid var(--border)">
          <td colspan="2"><b>${ar?'الإجمالي':'Total'}</b></td>
          <td class="mono" style="color:var(--emerald)"><b>+${fmt.num(calc.totals.recovered)}</b></td>
          <td class="mono" style="color:var(--rose)"><b>${fmt.num(calc.totals.lost)}</b></td>
        </tr></tfoot>
      </table>
    `;
  },

  saveReportScrap(woId, stationId) {
    const ar = State.lang === 'ar';
    const qty = parseInt(document.getElementById('scrapQty').value);
    const reason = document.getElementById('scrapReason').value.trim();
    if (!qty || qty <= 0) { toast(ar?'الكمية يجب أن تكون موجبة':'Qty must be positive', 'error'); return; }
    const result = Scrap.apply(woId, stationId, qty, { reason });
    if (!result.ok) { toast(result.error, 'error'); return; }
    App.closeModal();
    toast(ar
      ? `✓ تم تسجيل ${qty} scrap` + (result.totals.recovered > 0 ? ` · مُسترد: ${fmt.num(result.totals.recovered)}` : '')
      : `✓ Scrapped ${qty}` + (result.totals.recovered > 0 ? ` · recovered: ${fmt.num(result.totals.recovered)}` : ''),
      'success');
    // Refresh current view
    if (typeof View[State.view] === 'function') View[State.view]();
  },

  // ─────── STATION BATCH DELIVERY (K1→K2→K3→K4) ───────
  // Explicit delivery dialog with qty + scrap inputs.
  // Concept: each K-station processes a BATCH and delivers it to the next station.
  // Materials at the next station are auto-consumed via BOM on entry.
  deliverStation(woId) {
    const ar = State.lang === 'ar';
    const wo = Q.wo(woId);
    if (!wo) return;
    if (!Perm.canActOnWO(wo)) { toast(t('no_perm'), 'error'); return; }

    const currentStg = wo.currentStage;
    if (!currentStg.startsWith('AT_K')) {
      toast(ar?'هذا الإجراء فقط للمحطات K1-K4':'This action is only for K1-K4 stations','error');
      return;
    }

    const fromStation = currentStg.replace('AT_', '');
    const nextStg = nextStage(currentStg);
    const nextStgObj = stageById(nextStg);
    const isLast = nextStg === 'AT_BUFFER'; // K4 → IFA WH
    const incomingQty = (wo.produced != null && wo.produced > 0) ? wo.produced : (wo.qty - (wo.scrap || 0));

    // Get next station's BOM for preview
    const nextStationId = nextStg.startsWith('AT_K') ? nextStg.replace('AT_', '') : null;
    const nextBom = nextStationId ? BOM.forStation(nextStationId) : [];

    const body = `
      <div style="background:rgba(56,189,248,0.06);border:1px solid rgba(56,189,248,0.25);border-radius:9px;padding:12px;margin-bottom:14px;font-size:11.5px">
        ${isLast ? '📦' : '↦'} <b style="color:var(--sky)">${ar?'تسليم دفعة':'Batch Delivery'}</b>
        <div style="margin-top:6px;color:var(--text-2)">
          <b>${fromStation}</b> → <b>${escapeHTML(ar?nextStgObj.name:nextStgObj.nameEn)}</b>
        </div>
        <div style="margin-top:4px;color:var(--text-3);font-size:10.5px">
          ${ar?'الكمية الواردة من المحطة السابقة:':'Incoming from previous station:'} <b class="mono">${fmt.num(incomingQty)}</b>
        </div>
      </div>
      <div class="form-grid">
        <div class="form-row">
          <div class="field">
            <label>${ar?'الكمية المُنتَجة (سليمة)':'Produced (good)'} <span class="req">*</span></label>
            <input id="dlvQty" type="number" min="0" max="${incomingQty}" value="${incomingQty}" oninput="Action._updateDeliveryPreview(${incomingQty})">
            <div style="font-size:10.5px;color:var(--text-3);margin-top:4px">${ar?'تسلَّم للمحطة التالية':'Delivered to next station'}</div>
          </div>
          <div class="field">
            <label>${ar?'Scrap في هذه المحطة':'Scrap at this station'}</label>
            <input id="dlvScrap" type="number" min="0" max="${incomingQty}" value="0" oninput="Action._updateDeliveryPreview(${incomingQty})">
            <div style="font-size:10.5px;color:var(--text-3);margin-top:4px">${ar?'وحدات تالفة في '+fromStation:'Defective at '+fromStation}</div>
          </div>
        </div>
        <div id="dlvBalance" style="background:var(--glass);padding:10px;border-radius:7px;font-size:11.5px"></div>
        ${nextBom.length > 0 ? `
          <div style="background:rgba(245,185,66,0.06);border:1px solid rgba(245,185,66,0.2);border-radius:7px;padding:10px;font-size:11px">
            <div style="font-weight:600;color:var(--gold);margin-bottom:4px">🧾 ${ar?'سيُصرف للمحطة التالية ('+nextStationId+'):':'Will be consumed at next station ('+nextStationId+'):'}</div>
            <div id="dlvNextBom"></div>
          </div>
        ` : ''}
        <div class="field">
          <label>${ar?'ملاحظات (اختياري)':'Notes (optional)'}</label>
          <textarea id="dlvNotes" rows="2" placeholder="${ar?'مثلاً: انتهاء الوردية، نوع الدفعة':'e.g. shift end, batch type'}"></textarea>
        </div>
      </div>
    `;
    App.openModal(`${ar?'تسليم دفعة':'Deliver Batch'} — ${fromStation}`, body,
      `<button class="btn btn-secondary" onclick="App.closeModal()">${t('cancel')}</button>
       <button class="btn btn-primary" onclick="Action.saveDeliverStation('${woId}',${incomingQty})">${ar?'تأكيد التسليم':'Confirm Delivery'}</button>`, true);
    setTimeout(() => Action._updateDeliveryPreview(incomingQty), 30);
  },

  // Live preview of delivery balance (qty + scrap = incoming) and next-BOM impact
  _updateDeliveryPreview(incomingQty) {
    const ar = State.lang === 'ar';
    const qty = parseInt(document.getElementById('dlvQty')?.value) || 0;
    const scrap = parseInt(document.getElementById('dlvScrap')?.value) || 0;
    const sum = qty + scrap;
    const balance = document.getElementById('dlvBalance');
    if (balance) {
      const ok = sum === incomingQty;
      balance.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span class="text-mute">${ar?'المجموع يجب أن يساوي:':'Total must equal:'}</span>
          <span class="mono"><b>${incomingQty}</b></span>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px">
          <span class="text-mute">${ar?'الحالي:':'Current:'}</span>
          <span class="mono" style="color:${ok?'var(--emerald)':'var(--rose)'}"><b>${qty} + ${scrap} = ${sum}</b></span>
        </div>
      `;
    }

    // Update next-BOM preview
    const nextBomEl = document.getElementById('dlvNextBom');
    if (!nextBomEl) return;
    // Recompute next station BOM × qty (the good qty going forward)
    const wh = State.data.warehouses;
    let html = '';
    // Find next station from URL/context — we'll recompute from a hidden wo lookup
    // Actually, we need the next station from the dialog context. Easier: fetch from data attr.
    nextBomEl.innerHTML = `<div class="text-mute" style="font-size:10.5px">${ar?'الكمية المُسلَّمة × الـ BOM لكل وحدة':'Delivered qty × BOM per unit'}</div>`;
  },

  saveDeliverStation(woId, incomingQty) {
    const ar = State.lang === 'ar';
    const qty = parseInt(document.getElementById('dlvQty').value) || 0;
    const scrap = parseInt(document.getElementById('dlvScrap').value) || 0;
    const notes = document.getElementById('dlvNotes').value.trim();

    if (qty + scrap !== incomingQty) {
      toast(ar?`المجموع (${qty+scrap}) يجب أن يساوي ${incomingQty}`:`Total (${qty+scrap}) must equal ${incomingQty}`,'error');
      return;
    }
    if (qty < 0 || scrap < 0) {
      toast(ar?'القيم يجب أن تكون موجبة':'Values must be positive','error');
      return;
    }

    // Use WF.advance with scrap + qty options.
    // Note: WF.advance applies Scrap.apply automatically when scrap > 0 and origin is K-station.
    // Scrap.apply now also decrements wo.produced.
    const ok = WF.advance(woId, {
      qty: qty,
      scrap: scrap,
      action: 'deliver_batch',
      notes: notes || (ar?`تسليم دفعة من ${stageById(Q.wo(woId).currentStage).name}`:`Batch delivery from ${stageById(Q.wo(woId).currentStage).name}`)
    });

    if (!ok) return;
    App.closeModal();
    toast(ar?`✓ تم تسليم ${qty} وحدة` + (scrap > 0 ? ` (${scrap} scrap)` : ''):`✓ Delivered ${qty}` + (scrap > 0 ? ` (${scrap} scrap)` : ''),'success');
    if (typeof View[State.view] === 'function') View[State.view]();
  },

  createSequence(woId) {
    const ar = State.lang === 'ar';
    if (State.user.dept !== 'QC' && !Perm.isManager()) { toast(t('no_perm'), 'error'); return; }
    const wo = Q.wo(woId);
    if (!wo) return;
    const remaining = SEQ.remainingBufferQty(woId);
    if (remaining <= 0) { toast(ar?'لا توجد وحدات متبقية في IFA':'No IFA stock remaining','error'); return; }
    const defaultBatch = Math.min(State.data.seqDefaults?.batchSize || 1000, remaining);
    const nextStart = SEQ.nextStartSerial(woId);

    const body = `
      <div style="background:rgba(167,139,250,0.06);border:1px solid rgba(167,139,250,0.25);border-radius:9px;padding:12px;margin-bottom:14px;font-size:11.5px">
        📦 <b style="color:var(--violet)">${ar?'إنشاء سيكوينس جديد':'Create New Sequence'}</b>
        <div style="margin-top:6px;color:var(--text-2)">${ar?'WO:':'WO:'} <b>${woId}</b> · ${ar?'متبقي في IFA:':'Remaining in IFA:'} <b class="mono">${fmt.num(remaining)}</b></div>
      </div>
      <div class="form-grid">
        <div class="form-row">
          <div class="field">
            <label>${ar?'الرقم البدائي (Start Serial)':'Start Serial'}</label>
            <input class="mono" value="${nextStart}" readonly style="background:var(--glass-2)">
            <div style="font-size:10.5px;color:var(--text-3);margin-top:4px">${ar?'يُحسب تلقائياً من آخر سيكوينس':'Auto-calculated from last sequence'}</div>
          </div>
          <div class="field">
            <label>${ar?'حجم الدفعة':'Batch Size'} <span class="req">*</span></label>
            <input id="seqQty" type="number" min="1" max="${remaining}" value="${defaultBatch}" oninput="Action._updateSeqRange(${nextStart})">
            <div style="font-size:10.5px;color:var(--text-3);margin-top:4px">${ar?`الحد الأقصى: ${remaining}`:`Max: ${remaining}`}</div>
          </div>
        </div>
        <div style="background:var(--glass);padding:10px;border-radius:7px;font-size:11.5px">
          <span class="text-mute">${ar?'الأرقام التسلسلية:':'Serial range:'}</span>
          <span class="mono"><b id="seqRangePreview">${nextStart} → ${nextStart + defaultBatch - 1}</b></span>
        </div>
      </div>
    `;
    App.openModal(`${ar?'سيكوينس جديد':'New Sequence'} — ${woId}`, body,
      `<button class="btn btn-secondary" onclick="App.closeModal()">${t('cancel')}</button>
       <button class="btn btn-primary" onclick="Action.saveCreateSequence('${woId}')">${ar?'إنشاء':'Create'}</button>`, true);
  },

  saveCreateSequence(woId) {
    const ar = State.lang === 'ar';
    const qty = parseInt(document.getElementById('seqQty').value);
    const result = SEQ.create(woId, qty);
    if (!result.ok) { toast(result.error, 'error'); return; }
    App.closeModal();
    toast(ar?`✓ تم إنشاء ${result.seq.id}`:`✓ Created ${result.seq.id}`,'success');
    View.quality();
  },

  viewSequences(woId) {

          <span class="text-mute">${ar?'مخصص:':'Allocated:'}</span><b class="mono">${fmt.num(allocated)}</b>

              <td class="mono">${s.packagedQty || '—'}</td>
            </tr>
          `).join('')}</tbody>
        </table></div>
      `}

    App.openModal(`${ar?'Sequences للـ WO':'Sequences for'} ${woId}`, body,
      `<button class="btn btn-secondary" onclick="App.closeModal()">${ar?'إغلاق':'Close'}</button>`, true);
  },

          <b class="mono" id="mocSumPreview">${seq.qty}</b>
        </div>
        <div class="field">
          <label>${ar?'ملاحظات (اختياري)':'Notes (optional)'}</label>
          <textarea id="mocNotes" rows="2" placeholder="${ar?'سبب الرفض، أنواع العيوب':'Rejection reasons, defect types'}"></textarea>
        </div>

  async saveUser(existingId) {
    if (!Perm.isManager()) return;
    const ar = State.lang === 'ar';
    const get = (id) => (document.getElementById(id)?.value || '').trim();
    const id = get('usrId'), name = get('usrName'), nameEn = get('usrNameEn');
    if (!id || !name || !nameEn) { toast(ar?'املأ الحقول المطلوبة':'Fill required fields','error'); return; }

    const dept = get('usrDept'), color = get('usrColor') || '#888';
    const avatar = get('usrAvatar') || name.charAt(0);
    const role = get('usrRole') || '—', roleEn = get('usrRoleEn') || '—';

    // EDIT MODE — local update only (Phase 1.4b will sync to Supabase)
    if (existingId) {
      const u = Q.user(existingId);
      if (!u) return;
      Object.assign(u, { id, name, nameEn, avatar, dept, color, role, roleEn });
      Audit.log('edit_user', 'User', id, { fields: 'name/dept/role' });
      Movements.add('info', `${ar?'تم تعديل المستخدم':'User edited'} ${name}`, { userId: id });
      State.save();
      App.closeModal();
      toast(ar?'تم الحفظ':'Saved','success');
      View.adminUsers();
      return;
    }

    // CREATE MODE — call Edge Function to create Supabase Auth user + link to public.users
    const email = get('usrEmail'), password = get('usrPassword');
    if (!email || !password) {
      toast(ar?'الإيميل وكلمة السر مطلوبان':'Email and password required','error');
      return;
    }
    if (password.length < 8) {
      toast(ar?'كلمة السر يجب 8 أحرف على الأقل':'Password must be 8+ chars','error');
      return;
    }
    if (State.data.users.find(x => x.id === id)) {
      toast(ar?'المعرّف موجود مسبقاً':'ID already exists','error');
      return;
    }

    if (!sb) {
      toast(ar?'Supabase غير مهيّأ — لا يمكن إنشاء حساب':'Supabase not configured','error');
      return;
    }

    const btn = document.getElementById('saveUserBtn');
    if (btn) { btn.disabled = true; btn.textContent = ar?'...جاري الإنشاء':'Creating...'; }

    try {
      // Get current session token to authorize Edge Function call
      const { data: { session } } = await sb.auth.getSession();
      if (!session) throw new Error(ar?'انتهت الجلسة':'Session expired');

      const fnUrl = SUPABASE_CONFIG.url.replace(/\/$/,'') + '/functions/v1/create-user';
      const response = await fetch(fnUrl, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${session.access_token}`,
          'Content-Type': 'application/json',
          'apikey': SUPABASE_CONFIG.anonKey,
        },
        body: JSON.stringify({
          id, email, password,
          name_ar: name, name_en: nameEn,
          dept_id: dept,
          role_ar: role, role_en: roleEn,
          color, avatar
        })
      });

      const result = await response.json();
      if (!response.ok || !result.ok) {
        throw new Error(result.error || `HTTP ${response.status}`);
      }

      // Add to local state too so UI updates immediately
      State.data.users.push({
        id, name, nameEn, dept, color, avatar, role, roleEn,
        auth_user_id: result.auth_uuid, active: true
      });
      Audit.log('create_user', 'User', id, { name, dept, email });
      Movements.add('info', `${ar?'مستخدم جديد:':'New user:'} ${name} (${email})`, { userId: id });
      State.save();

      App.closeModal();
      toast(ar?`تم إنشاء ${name} ✓ كلمة السر: ${password}`:`Created ${name} ✓`, 'success');
      View.adminUsers();
    } catch (e) {
      toast((ar?'فشل الإنشاء: ':'Create failed: ') + (e.message || String(e)), 'error');
      if (btn) { btn.disabled = false; btn.textContent = t('save'); }
    }
  },

    const sku = get('bomSku').toUpperCase();

    const name = get('bomName');

    const qtyPerUnit = parseFloat(document.getElementById('bomQtyPerUnit').value);
    const unit = get('bomUnit');
    const recoverable = document.getElementById('bomRecoverable').value === 'true';

    if (!sku || !name) { toast(ar?'SKU والاسم مطلوبان':'SKU and name required','error'); return; }
    if (isNaN(qtyPerUnit) || qtyPerUnit <= 0) { toast(ar?'الكمية يجب أن تكون موجبة':'Qty must be positive','error'); return; }

    if (!State.data.bom) State.data.bom = {};
    if (!State.data.bom[stationId]) State.data.bom[stationId] = [];
    const arr = State.data.bom[stationId];

    const entry = { sku, name, nameEn, whId, qtyPerUnit, unit, recoverable, recoveryRate: recoverable ? recoveryRate : 0 };

    const isEdit = editIdx !== null && editIdx !== 'null' && editIdx !== undefined;
    if (isEdit) {
      arr[editIdx] = entry;
      Audit.log('edit_bom', 'BOM', `${stationId}/${sku}`, { qtyPerUnit, recoverable });
    } else {
      // Check duplicate
      if (arr.some(m => m.sku === sku)) { toast(ar?'الـ SKU موجود مسبقاً':'SKU already in this BOM','error'); return; }
      arr.push(entry);
      Audit.log('add_bom', 'BOM', `${stationId}/${sku}`, { qtyPerUnit });
    }

    Movements.add('info', `🧾 ${ar?'تحديث BOM':'BOM updated'}: ${stationId} — ${sku} (${fmt.num(qtyPerUnit)} ${unit}/${ar?'وحدة':'unit'})`, { stationId, sku });
    State.save();
    // Cloud sync
    if (typeof Repo !== 'undefined' && Repo.bom) {
      Repo.bom.upsertStation(stationId, arr).then(ok => {
        if (!ok) toast(ar?'⚠ حُفظ محلياً، فشل sync':'⚠ Saved locally, sync failed','warn');
      });
    }
    App.closeModal();
    toast(ar?'✓ تم حفظ الوصفة':'✓ Recipe saved','success');
    View.adminBOM();
  },

  deleteBOMMaterial(stationId, idx) {
    if (!Perm.isManager()) { toast(t('no_perm'), 'error'); return; }
    const ar = State.lang === 'ar';
    const m = (State.data.bom[stationId] || [])[idx];
    if (!m) return;
    if (!confirm(ar ? `حذف ${m.sku} من وصفة ${stationId}؟` : `Delete ${m.sku} from ${stationId} recipe?`)) return;
    State.data.bom[stationId].splice(idx, 1);
    Audit.log('delete_bom', 'BOM', `${stationId}/${m.sku}`, {});
    Movements.add('warn', `🧾 ${ar?'حذف من BOM':'BOM removed'}: ${stationId} — ${m.sku}`, { stationId, sku: m.sku });

    // Cloud sync
    if (typeof Repo !== 'undefined' && Repo.bom) {
      Repo.bom.upsertStation(stationId, State.data.bom[stationId]).catch(e => console.error('[BOM delete sync]', e));

  saveNewWHItem(whId) {
    const wh = Q.wh(whId);
    if (!wh || !this._whCanEdit(wh)) return;
    const ar = State.lang === 'ar';
    const get = (id) => (document.getElementById(id)?.value || '').trim();
    const sku = get('whSku').toUpperCase();
    const name = get('whName');
    const nameEn = get('whNameEn') || name;
    const unit = get('whUnit');
    const minQty = parseFloat(get('whMin')) || 0;
    const maxQty = parseFloat(get('whMax')) || 0;
    const notes = get('whNotes');

    if (!sku || !name || !unit) {
      toast(ar?'املأ الحقول المطلوبة':'Fill required fields','error');
      return;
    }
    if (!/^[A-Z0-9\-_]+$/.test(sku)) {
      toast(ar?'الكود يحتوي على رموز غير مسموحة':'SKU has invalid characters','error');
      return;
    }
    // Check uniqueness across ALL warehouses
    const existing = State.data.warehouses.some(w => w.items.some(i => i.sku === sku));
    if (existing) {
      toast(ar?`الكود ${sku} موجود مسبقاً في النظام`:`SKU ${sku} already exists`,'error');
      return;
    }

    wh.items.push({
      sku, name, nameEn, unit,
      qty: 0, allocated: 0,
      minQty, maxQty,
      notes,
      openingBalanceSet: false,
      createdAt: now(), createdBy: State.user.id,
    });
    Audit.log('add_material', 'Warehouse', `${whId}/${sku}`, { name, unit, minQty });
    Movements.add('info', `${ar?'مادة جديدة في':'New material in'} ${wh.code}: ${sku} — ${name}`, { whId, sku });

    // IMMEDIATE cloud sync (don't wait for debounce)
    if (typeof Repo !== 'undefined' && Repo.warehouses) {
      Repo.warehouses.upsertItems(wh.id, wh.items).catch(e => 
        console.error('[Add material sync]', e));
    }
    App.closeModal();
    toast(ar?`✓ تم إضافة ${sku}`:`✓ Added ${sku}`, 'success');
    View.warehouses();
  },

  saveReceive(whId) {
    const wh = Q.wh(whId);
    if (!wh || !this._whCanEdit(wh)) return;
    const ar = State.lang === 'ar';
    const sku = document.getElementById('rcSku').value;
    const qty = parseFloat(document.getElementById('rcQty').value);
    const ref = document.getElementById('rcRef').value.trim();
    const supplierCode = document.getElementById('rcSupplier').value.trim();
    const notes = document.getElementById('rcNotes').value.trim();
    const useCommittee = document.getElementById('rcCommittee')?.checked;
    const item = wh.items.find(i => i.sku === sku);
    if (!item) return;
    if (isNaN(qty) || qty <= 0) { toast(ar?'أدخل كمية موجبة':'Enter positive qty','error'); return; }
    if (!ref) { toast(ar?'رقم الفاتورة مطلوب':'Reference required','error'); return; }
    const supplier = (State.data.suppliers||[]).find(s => s.code === supplierCode);
    if (!supplier && (State.data.suppliers||[]).length > 0) { toast(ar?'اختر مورّد':'Select supplier','error'); return; }
    const supplierLabel = supplier ? `${supplier.code} (${supplier.name})` : '';

    if (useCommittee) {
      // Route through committee — DON'T add to stock yet
      const committeeId = Action.startCommittee({ whId, sku, qty, supplierCode, shipmentRef: ref });
      if (!committeeId) return; // failed (e.g., missing members)
      State.save();
      App.closeModal();
      toast(ar?`✓ أُرسلت للجنة ${committeeId}`:`✓ Sent to committee ${committeeId}`, 'success');
      App.goto('committee');
    } else {
      // Direct receive — add to stock immediately
      item.qty += qty;
      Movements.addStock({ whId, sku, type: 'receive', qty, ref, notes: supplierLabel ? `${supplierLabel} | ${notes}` : notes });
      Audit.log('receive_stock', 'Warehouse', `${whId}/${sku}`, { qty, ref, supplier: supplierCode });
      Movements.add('ok', `↓ ${ar?'استلام':'Receive'}: ${wh.code}/${sku} +${fmt.num(qty)} ${item.unit} (${ref})${supplier?` ← ${supplier.code}`:''}`, { whId, sku, qty });
      State.save();
      App.closeModal();
      toast(ar?`✓ تم الاستلام: +${fmt.num(qty)} ${item.unit}`:`✓ Received: +${fmt.num(qty)} ${item.unit}`, 'success');
      View.warehouses();
    }
  },

  // Form: Issue stock (outgoing — to production or other warehouse)
  issueStock(whId) {
    const wh = Q.wh(whId);
    if (!wh || !this._whCanEdit(wh)) { toast(t('no_perm'), 'error'); return; }
    if (wh.items.length === 0 || wh.items.every(i => i.qty - i.allocated <= 0)) {
      toast(State.lang==='ar'?'لا توجد كميات متاحة للصرف':'No available stock to issue','error');
      return;
    }
    const ar = State.lang === 'ar';
    const itemOpts = wh.items.filter(i => i.qty - i.allocated > 0).map(i =>
      `<option value="${i.sku}">${escapeHTML(i.sku)} — ${escapeHTML(i.name)} · ${ar?'متاح:':'avail:'} ${fmt.num(i.qty-i.allocated)} ${i.unit}</option>`
    ).join('');
    const body = `
      <div style="background:rgba(244,63,94,0.06);border:1px solid rgba(244,63,94,0.25);border-radius:9px;padding:10px;margin-bottom:14px;font-size:11.5px;color:var(--rose)">

      </div>
      <div class="form-grid">

        <div class="form-row">
          <div class="field">
