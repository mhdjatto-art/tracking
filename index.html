<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Veridos ProdLine — نظام مراقبة خط الإنتاج</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg-0: #060912;
  --bg-1: #0b1020;
  --bg-2: #131a2e;
  --bg-3: #1a2340;
  --glass: rgba(255,255,255,0.04);
  --glass-2: rgba(255,255,255,0.07);
  --glass-3: rgba(255,255,255,0.10);
  --border: rgba(255,255,255,0.08);
  --border-2: rgba(255,255,255,0.14);
  --text: #e9eef7;
  --text-2: #a8b3c5;
  --text-3: #6c7689;
  --gold: #f5b942;
  --gold-2: #d4941f;
  --emerald: #10b981;
  --emerald-2: #059669;
  --rose: #f43f5e;
  --sky: #38bdf8;
  --violet: #a78bfa;
  --amber: #f59e0b;
  --teal: #14b8a6;
  --shadow: 0 10px 40px -10px rgba(0,0,0,0.6);
  --r: 12px;
  --r-sm: 8px;
  --r-lg: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Cairo', 'Inter', system-ui, sans-serif;
  background: var(--bg-0);
  color: var(--text);
  font-size: 13px;
  line-height: 1.5;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}
body[data-lang="en"] { font-family: 'Inter', 'Cairo', sans-serif; direction: ltr; }
.mono { font-family: 'JetBrains Mono', monospace; font-feature-settings: 'tnum' 1; letter-spacing: -0.01em; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, select, textarea { font-family: inherit; }
a { color: inherit; text-decoration: none; }

body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 0%, rgba(245,185,66,0.07), transparent 50%),
    radial-gradient(ellipse 60% 50% at 80% 100%, rgba(56,189,248,0.06), transparent 50%),
    radial-gradient(ellipse 70% 50% at 50% 50%, rgba(167,139,250,0.04), transparent 60%);
  pointer-events: none; z-index: 0;
}

#app { position: relative; z-index: 1; height: 100vh; display: flex; flex-direction: column; }

/* ============ TOPBAR ============ */
.topbar {
  height: 58px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 22px;
  background: rgba(7,11,20,0.75);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 50;
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-mark {
  width: 36px; height: 36px;
  background: #fff;
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  padding: 4px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.3);
}
.brand-mark img { width: 100%; height: 100%; object-fit: contain; display: block; }
.brand-name { font-weight: 700; font-size: 14px; letter-spacing: -0.01em; }
.brand-sub { font-size: 11px; color: var(--text-3); margin-top: -2px; }
.topbar-actions { display: flex; align-items: center; gap: 8px; }
.icon-btn {
  width: 34px; height: 34px;
  border-radius: 9px;
  background: var(--glass); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  color: var(--text-2); transition: all 0.15s; position: relative;
}
.icon-btn:hover { background: var(--glass-2); color: var(--text); border-color: var(--border-2); }
.icon-btn svg { width: 16px; height: 16px; }
.icon-btn .dot {
  position: absolute; top: 5px; inset-inline-end: 5px;
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--rose); box-shadow: 0 0 0 2px var(--bg-0);
}
.lang-toggle {
  height: 34px; padding: 0 12px;
  border-radius: 9px;
  background: var(--glass); border: 1px solid var(--border);
  font-weight: 700; font-size: 11px; color: var(--text-2);
  transition: all 0.15s;
}
.lang-toggle:hover { background: var(--glass-2); color: var(--text); }
.user-chip {
  display: flex; align-items: center; gap: 9px;
  height: 34px; padding-inline: 4px 12px;
  background: var(--glass); border: 1px solid var(--border);
  border-radius: 9px;
}
.user-avatar {
  width: 26px; height: 26px;
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 11px; color: white;
  flex-shrink: 0;
}
.user-info { font-size: 11.5px; line-height: 1.25; }
.user-info .role { color: var(--text-3); font-size: 10px; }
.logout-btn {
  height: 34px; padding: 0 12px; border-radius: 9px;
  background: rgba(244,63,94,0.1); color: var(--rose);
  border: 1px solid rgba(244,63,94,0.2);
  font-weight: 600; font-size: 11px;
  transition: all 0.15s;
}
.logout-btn:hover { background: rgba(244,63,94,0.18); }

/* ============ LAYOUT ============ */
.main { flex: 1; display: grid; grid-template-columns: 230px 1fr; overflow: hidden; }

.sidebar {
  background: rgba(11,16,32,0.5);
  backdrop-filter: blur(18px);
  border-inline-end: 1px solid var(--border);
  padding: 16px 11px;
  overflow-y: auto;
  display: flex; flex-direction: column;
}
.nav-group { margin-bottom: 16px; }
.nav-group-title {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--text-3); padding: 0 9px; margin-bottom: 6px; font-weight: 700;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: 9px;
  color: var(--text-2); font-weight: 500; font-size: 12.5px;
  transition: all 0.15s; width: 100%; text-align: start; margin-bottom: 2px;
  border: 1px solid transparent;
}
.nav-item:hover { background: var(--glass); color: var(--text); }
.nav-item.active {
  background: linear-gradient(135deg, rgba(245,185,66,0.15), rgba(245,185,66,0.04));
  color: var(--gold);
  border-color: rgba(245,185,66,0.2);
}
.nav-item.disabled { opacity: 0.35; cursor: not-allowed; }
.nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
.nav-item .badge {
  margin-inline-start: auto;
  background: var(--glass-2); font-size: 10px;
  padding: 2px 6px; border-radius: 5px; font-weight: 700;
  font-family: 'JetBrains Mono', monospace; min-width: 20px; text-align: center;
}
.nav-item.active .badge { background: rgba(245,185,66,0.2); color: var(--gold); }
.nav-item .lock {
  margin-inline-start: auto; opacity: 0.4; width: 12px; height: 12px;
}
.sidebar-foot {
  margin-top: auto; padding: 11px;
  font-size: 10.5px; color: var(--text-3);
  border-top: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 3px;
}
.live-pill { display: flex; align-items: center; gap: 6px; }
.live-pill::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: var(--emerald); box-shadow: 0 0 8px var(--emerald);
  animation: pulse 1.6s infinite;
}
@keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1);} 50% { opacity: 0.5; transform: scale(0.85);} }

.content { overflow-y: auto; padding: 20px 24px 40px; }
.page-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 18px; flex-wrap: wrap; gap: 10px;
}
.page-title { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
.page-sub { color: var(--text-3); font-size: 12.5px; margin-top: 3px; }
.page-actions { display: flex; gap: 8px; flex-wrap: wrap; }

/* ============ BUTTONS ============ */
.btn {
  height: 34px; padding: 0 13px;
  border-radius: 9px; font-weight: 600; font-size: 12.5px;
  display: inline-flex; align-items: center; gap: 6px;
  transition: all 0.15s; white-space: nowrap;
}
.btn svg { width: 14px; height: 14px; }
.btn-primary {
  background: linear-gradient(135deg, var(--gold), var(--gold-2));
  color: #1a1208; box-shadow: 0 4px 14px rgba(245,185,66,0.25);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(245,185,66,0.35); }
.btn-secondary { background: var(--glass); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--glass-2); border-color: var(--border-2); }
.btn-danger { background: rgba(244,63,94,0.12); color: var(--rose); border: 1px solid rgba(244,63,94,0.25); }
.btn-danger:hover { background: rgba(244,63,94,0.2); }
.btn-success { background: rgba(16,185,129,0.12); color: var(--emerald); border: 1px solid rgba(16,185,129,0.25); }
.btn-success:hover { background: rgba(16,185,129,0.2); }
.btn-sm { height: 28px; padding: 0 10px; font-size: 11.5px; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ============ CARDS / KPIS ============ */
.card {
  background: var(--glass); backdrop-filter: blur(18px);
  border: 1px solid var(--border); border-radius: var(--r);
  padding: 16px; position: relative;
}
.card-title {
  font-size: 12.5px; font-weight: 600; color: var(--text-2);
  margin-bottom: 12px;
  display: flex; align-items: center; justify-content: space-between;
}

.kpi-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.kpi {
  background: var(--glass); backdrop-filter: blur(18px);
  border: 1px solid var(--border); border-radius: var(--r);
  padding: 14px 16px; position: relative; overflow: hidden;
}
.kpi::before {
  content: ''; position: absolute; inset-block-start: 0; inset-inline-start: 0;
  width: 3px; height: 100%; background: var(--accent, var(--gold));
}
.kpi-label { font-size: 11.5px; color: var(--text-3); font-weight: 500; }
.kpi-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 26px; font-weight: 700; margin-top: 4px;
  letter-spacing: -0.02em; color: var(--text);
}
.kpi-delta {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10.5px; font-weight: 600; margin-top: 4px;
  padding: 2px 7px; border-radius: 5px;
}
.kpi-delta.up { background: rgba(16,185,129,0.12); color: var(--emerald); }
.kpi-delta.down { background: rgba(244,63,94,0.12); color: var(--rose); }
.kpi-delta.neutral { background: var(--glass-2); color: var(--text-2); }
.kpi-icon {
  position: absolute; inset-block-start: 12px; inset-inline-end: 12px;
  width: 28px; height: 28px; border-radius: 7px;
  background: var(--accent-bg, rgba(245,185,66,0.1));
  color: var(--accent, var(--gold));
  display: flex; align-items: center; justify-content: center;
}
.kpi-icon svg { width: 14px; height: 14px; }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.grid-2-1 { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; margin-bottom: 12px; }
@media (max-width: 1100px) { .grid-2, .grid-3, .grid-2-1 { grid-template-columns: 1fr; } }

/* ============ TABLES ============ */
.table-wrap {
  background: var(--glass); backdrop-filter: blur(18px);
  border: 1px solid var(--border); border-radius: var(--r); overflow: hidden;
}
.table-toolbar {
  padding: 11px 13px;
  display: flex; align-items: center; gap: 9px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.search-input, .filter-select {
  height: 30px; padding: 0 11px;
  background: rgba(0,0,0,0.25); border: 1px solid var(--border);
  border-radius: 7px; color: var(--text); font-size: 12px;
}
.search-input { width: 220px; }
.search-input:focus, .filter-select:focus { outline: none; border-color: var(--gold); }

table.data { width: 100%; border-collapse: collapse; font-size: 12.5px; }
table.data thead th {
  text-align: start; padding: 10px 13px;
  font-weight: 600; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.05em;
  color: var(--text-3); background: rgba(0,0,0,0.18);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
table.data tbody td { padding: 10px 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
table.data tbody tr:last-child td { border-bottom: none; }
table.data tbody tr { transition: background 0.1s; }
table.data tbody tr:hover { background: rgba(255,255,255,0.025); }
table.data tbody tr.clickable { cursor: pointer; }
.empty-state { padding: 40px 20px; text-align: center; color: var(--text-3); font-size: 12.5px; }

/* ============ BADGES ============ */
.badge-status {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 8px; border-radius: 5px;
  font-size: 10.5px; font-weight: 700; white-space: nowrap;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.02em;
}
.badge-status::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
.b-active, .b-running { background: rgba(16,185,129,0.12); color: var(--emerald); }
.b-pending { background: rgba(245,158,11,0.12); color: var(--amber); }
.b-progress { background: rgba(56,189,248,0.12); color: var(--sky); }
.b-done, .b-completed { background: rgba(167,139,250,0.12); color: var(--violet); }
.b-rejected { background: rgba(244,63,94,0.12); color: var(--rose); }
.b-closed, .b-idle { background: rgba(255,255,255,0.06); color: var(--text-3); }
.b-maintenance { background: rgba(244,63,94,0.12); color: var(--rose); }

.dept-tag {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 2px 7px; border-radius: 5px;
  font-size: 10.5px; font-weight: 600;
  background: var(--dept-bg, var(--glass-2));
  color: var(--dept-color, var(--text-2));
}
.dept-tag::before {
  content: ''; width: 5px; height: 5px; border-radius: 50%;
  background: currentColor;
}

/* ============ LIVE PIPELINE (Dashboard) ============ */
.pipeline {
  background: var(--glass); backdrop-filter: blur(18px);
  border: 1px solid var(--border); border-radius: var(--r);
  padding: 22px 18px 18px;
  margin-bottom: 14px;
  position: relative; overflow: hidden;
}
.pipeline-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 22px;
}
.pipeline-title {
  font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px;
}
.pipeline-title::before {
  content: ''; width: 8px; height: 8px; border-radius: 50%;
  background: var(--emerald); box-shadow: 0 0 10px var(--emerald);
  animation: pulse 1.6s infinite;
}
.pipeline-stages {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 0; position: relative;
  padding: 6px 0;
}
@media (max-width: 1300px) { .pipeline-stages { grid-template-columns: repeat(4, 1fr); row-gap: 22px; } }
@media (max-width: 700px) { .pipeline-stages { grid-template-columns: repeat(2, 1fr); } }

.stage {
  position: relative; text-align: center;
  padding: 0 6px;
}
.stage:not(:last-child)::after {
  content: ''; position: absolute;
  inset-block-start: 26px;
  inset-inline-start: 50%;
  width: 100%; height: 2px;
  background: linear-gradient(90deg, var(--border-2), var(--border));
  z-index: 0;
}
body[dir="rtl"] .stage:not(:last-child)::after {
  background: linear-gradient(-90deg, var(--border-2), var(--border));
}
.stage.has-flow::after {
  background: linear-gradient(90deg, var(--gold), var(--gold-2));
  background-size: 200% 100%;
  animation: flow 1.8s linear infinite;
}
@keyframes flow {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.stage-node {
  width: 54px; height: 54px;
  margin: 0 auto;
  border-radius: 50%;
  background: var(--bg-2);
  border: 2px solid var(--border-2);
  display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 800; font-size: 13px;
  position: relative; z-index: 1;
  transition: all 0.3s;
}
.stage.active .stage-node {
  background: linear-gradient(135deg, rgba(245,185,66,0.2), rgba(245,185,66,0.05));
  border-color: var(--gold);
  color: var(--gold);
  box-shadow: 0 0 20px rgba(245,185,66,0.25);
}
.stage.completed .stage-node { border-color: var(--emerald); color: var(--emerald); }
.stage.idle .stage-node { opacity: 0.55; }
.stage-count {
  position: absolute;
  inset-block-start: -6px; inset-inline-end: 12px;
  background: var(--gold); color: #1a1208;
  font-size: 10px; font-weight: 800;
  padding: 1px 6px; border-radius: 8px;
  font-family: 'JetBrains Mono', monospace;
  z-index: 2;
  min-width: 18px; text-align: center;
}
.stage-name { font-size: 10.5px; color: var(--text-2); margin-top: 8px; font-weight: 600; line-height: 1.3; }
.stage-user {
  font-size: 9.5px; color: var(--text-3);
  margin-top: 2px; font-weight: 500;
}
.stage-user .ouser { color: var(--gold); font-weight: 700; }
.stage-flow-anim {
  position: absolute; inset: 0;
  pointer-events: none; overflow: hidden;
  border-radius: var(--r);
}
.flow-particle {
  position: absolute;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 10px var(--gold);
  opacity: 0;
}

/* ============ STATIONS ============ */
.station-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 12px;
}
.station {
  background: var(--glass); backdrop-filter: blur(18px);
  border: 1px solid var(--border); border-radius: var(--r);
  padding: 14px; position: relative; overflow: hidden;
  cursor: pointer; transition: all 0.15s;
}
.station:hover { border-color: var(--border-2); transform: translateY(-2px); }
.station.running { border-color: rgba(16,185,129,0.4); }
.station.running::before {
  content: ''; position: absolute; inset-block-start: 0; inset-inline: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--emerald), transparent);
  background-size: 200% 100%;
  animation: scan 2s infinite linear;
}
@keyframes scan { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.station.idle { opacity: 0.7; }
.station.maintenance { border-color: rgba(244,63,94,0.4); }
.station-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.station-code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px; font-weight: 800; color: var(--gold); letter-spacing: -0.02em;
}
.station-pulse {
  width: 9px; height: 9px; border-radius: 50%; background: var(--text-3);
}
.station.running .station-pulse {
  background: var(--emerald); box-shadow: 0 0 10px var(--emerald);
  animation: pulse 1.6s infinite;
}
.station.maintenance .station-pulse { background: var(--rose); box-shadow: 0 0 10px var(--rose); }
.station-name { font-size: 11.5px; color: var(--text-2); margin-bottom: 10px; min-height: 28px; line-height: 1.35; }
.station-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.station-stat-label { font-size: 9.5px; color: var(--text-3); text-transform: uppercase; }
.station-stat-value { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 15px; }
.station-progress {
  height: 4px; background: rgba(255,255,255,0.05);
  border-radius: 2px; margin-top: 11px; overflow: hidden;
}
.station-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold-2));
  border-radius: 2px; transition: width 0.4s;
}
.station-operator {
  margin-top: 10px; padding-top: 10px;
  border-top: 1px solid var(--border);
  font-size: 10.5px; color: var(--text-3);
  display: flex; align-items: center; gap: 6px;
}
.station-operator .opname { color: var(--text-2); font-weight: 600; }

/* ============ FORMS ============ */
.form-grid { display: grid; gap: 12px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }
@media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 11.5px; font-weight: 600; color: var(--text-2); }
.field label .req { color: var(--rose); }
.field input, .field select, .field textarea {
  height: 36px; padding: 0 11px;
  background: rgba(0,0,0,0.28); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 12.5px; width: 100%;
}
.field textarea { height: auto; padding: 9px 11px; min-height: 64px; resize: vertical; }
.field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--gold); }
.field-hint { font-size: 10.5px; color: var(--text-3); }

/* ============ MODAL ============ */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
  z-index: 100; display: none;
  align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.show { display: flex; animation: fadeIn 0.2s; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--bg-1);
  border: 1px solid var(--border-2); border-radius: var(--r);
  width: 100%; max-width: 520px; max-height: 90vh;
  display: flex; flex-direction: column;
  box-shadow: var(--shadow);
}
.modal.lg { max-width: 760px; }
.modal-head {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title { font-weight: 700; font-size: 15px; }
.modal-body { padding: 20px; overflow-y: auto; flex: 1; }
.modal-foot {
  padding: 13px 20px; border-top: 1px solid var(--border);
  display: flex; justify-content: flex-end; gap: 8px; flex-wrap: wrap;
}

/* ============ TOAST ============ */
.toast-container {
  position: fixed; inset-block-end: 18px; inset-inline-end: 18px;
  z-index: 200; display: flex; flex-direction: column; gap: 8px;
}
.toast {
  padding: 11px 14px; background: var(--bg-2);
  border: 1px solid var(--border-2); border-radius: 9px;
  font-size: 12.5px; box-shadow: var(--shadow);
  min-width: 240px; animation: slideUp 0.25s ease;
  display: flex; align-items: center; gap: 9px;
  transition: opacity 0.4s;
}
.toast.success { border-color: rgba(16,185,129,0.45); }
.toast.error { border-color: rgba(244,63,94,0.45); }
.toast.warn { border-color: rgba(245,158,11,0.45); }
.toast.info { border-color: rgba(56,189,248,0.45); }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ============ LOGIN SPLASH ============ */
.splash {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg-0); z-index: 1000;
  flex-direction: column;
}
.splash::before {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% 0%, rgba(245,185,66,0.08), transparent 50%),
    radial-gradient(ellipse 60% 50% at 50% 100%, rgba(56,189,248,0.06), transparent 50%);
  pointer-events: none;
}
.splash-card {
  position: relative;
  background: var(--glass-2); backdrop-filter: blur(20px);
  border: 1px solid var(--border-2); border-radius: 18px;
  padding: 32px 32px 26px;
  width: 420px; max-width: 90%;
}
.splash-mark {
  width: 96px; height: 96px;
  margin: 0 auto 18px;
  background: #fff;
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  padding: 10px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.5);
}
.splash-mark img { width: 100%; height: 100%; object-fit: contain; display: block; }
.splash-title { text-align: center; font-size: 19px; font-weight: 700; margin-bottom: 4px; }
.splash-sub { text-align: center; color: var(--text-3); font-size: 12px; margin-bottom: 22px; }

.user-card-list {
  display: grid; gap: 8px; max-height: 340px; overflow-y: auto;
  padding: 2px;
}
.user-card {
  display: flex; align-items: center; gap: 11px;
  padding: 10px 12px;
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer; transition: all 0.15s;
  text-align: start;
}
.user-card:hover { background: var(--glass-2); border-color: var(--border-2); }
.user-card .user-avatar { width: 34px; height: 34px; font-size: 13px; }
.user-card-info { flex: 1; }
.user-card-name { font-size: 13px; font-weight: 600; }
.user-card-meta { font-size: 11px; color: var(--text-3); margin-top: 2px; display: flex; align-items: center; gap: 6px; }

/* ============ DYNAMIC VISUALIZATIONS (Phase 1.4a-viz) ============ */

/* Animated counter — pulses on change */
.counter-pulse {
  animation: counterPulse 0.6s ease;
}
@keyframes counterPulse {
  0% { transform: scale(1); color: var(--text); }
  40% { transform: scale(1.08); color: var(--gold); text-shadow: 0 0 20px rgba(245,185,66,0.5); }
  100% { transform: scale(1); color: var(--text); }
}

/* WO tokens that ride the pipeline */
.pipeline-track {
  position: relative;
  height: 130px;
  margin: 8px -8px 12px -8px;
  background: linear-gradient(180deg, transparent, rgba(255,255,255,0.02));
  border-radius: var(--r);
  overflow: hidden;
}
.pipeline-track::before {
  content: '';
  position: absolute;
  top: 65px; left: 24px; right: 24px;
  height: 3px;
  background: linear-gradient(90deg,
    rgba(245,185,66,0.15) 0%,
    rgba(245,185,66,0.4) 50%,
    rgba(245,185,66,0.15) 100%);
  background-size: 200% 100%;
  animation: trackFlow 3s linear infinite;
  border-radius: 2px;
  z-index: 0;
}
@keyframes trackFlow {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.stage-marker {
  position: absolute;
  top: 50px; bottom: 50px;
  width: 2px;
  background: linear-gradient(180deg, transparent, var(--border-2), transparent);
  z-index: 1;
}
.stage-marker-label {
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  font-weight: 700;
  color: var(--text-3);
  white-space: nowrap;
  background: var(--bg-1);
  padding: 1px 5px;
  border-radius: 4px;
}
.stage-marker.has-wo .stage-marker-label {
  color: var(--gold);
  background: rgba(245,185,66,0.1);
  border: 1px solid rgba(245,185,66,0.3);
}
.wo-token {
  position: absolute;
  top: 56px;
  width: 64px;
  margin-left: -32px;
  background: linear-gradient(135deg, var(--bg-2), var(--bg-3));
  border: 1.5px solid var(--gold);
  border-radius: 9px;
  padding: 5px 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  font-weight: 700;
  color: var(--gold);
  text-align: center;
  z-index: 2;
  transition: left 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 4px 14px rgba(245,185,66,0.25), 0 0 0 1px rgba(245,185,66,0.1);
  cursor: pointer;
}
.wo-token::before {
  content: '';
  position: absolute;
  top: -4px; left: 50%;
  transform: translateX(-50%);
  border: 4px solid transparent;
  border-bottom-color: var(--gold);
}
.wo-token.priority-high {
  border-color: var(--rose);
  color: var(--rose);
  box-shadow: 0 4px 14px rgba(244,63,94,0.3), 0 0 0 1px rgba(244,63,94,0.15);
}
.wo-token.priority-high::before { border-bottom-color: var(--rose); }
.wo-token.just-moved { animation: tokenLand 0.9s ease; }
@keyframes tokenLand {
  0% { transform: scale(1); }
  40% { transform: scale(1.15); }
  70% { transform: scale(0.95); }
  100% { transform: scale(1); }
}
.wo-token-id { font-size: 9px; line-height: 1.1; }
.wo-token-qty { font-size: 8px; opacity: 0.8; margin-top: 1px; }

.wo-token-empty {
  position: absolute;
  top: 56px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  color: var(--text-3);
  font-style: italic;
}

/* Dashboard grid for charts */
.charts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 12px;
  margin-bottom: 14px;
}
.chart-card {
  background: var(--glass); backdrop-filter: blur(18px);
  border: 1px solid var(--border); border-radius: var(--r);
  padding: 14px; position: relative; overflow: hidden;
}
.chart-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.chart-title {
  font-size: 12px; font-weight: 600; color: var(--text-2);
}
.chart-meta {
  font-size: 10.5px; color: var(--text-3);
  font-family: 'JetBrains Mono', monospace;
}
.chart-svg { width: 100%; height: 130px; display: block; }

/* Chart elements */
.chart-bar {
  fill: url(#goldGrad);
  transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}
.chart-bar:hover { fill: var(--gold); }
.chart-line {
  fill: none;
  stroke: var(--gold);
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  transition: d 0.6s ease;
}
.chart-area {
  fill: url(#goldArea);
  opacity: 0.6;
  transition: d 0.6s ease;
}
.chart-axis {
  stroke: var(--border);
  stroke-width: 1;
}
.chart-grid-line {
  stroke: var(--border);
  stroke-dasharray: 2,3;
  stroke-width: 1;
  opacity: 0.4;
}
.chart-label {
  fill: var(--text-3);
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
}
.chart-value {
  fill: var(--text);
  font-size: 11px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
}

/* Donut */
.donut-segment {
  transition: stroke-dashoffset 0.8s ease, stroke-dasharray 0.8s ease;
}
.donut-center-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px;
  font-weight: 700;
  fill: var(--text);
}
.donut-center-label {
  font-size: 10px;
  fill: var(--text-3);
  font-family: 'Cairo', sans-serif;
}
.donut-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  font-size: 10.5px;
  margin-top: 6px;
}
.donut-legend-item {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 6px;
  background: var(--glass-2);
  border-radius: 5px;
}
.donut-legend-item::before {
  content: '';
  width: 7px; height: 7px;
  border-radius: 2px;
  background: var(--legend-color, var(--gold));
}

/* Gauge */
.gauge-wrap {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.gauge-arc-bg { fill: none; stroke: rgba(255,255,255,0.05); stroke-width: 12; stroke-linecap: round; }
.gauge-arc { fill: none; stroke: var(--gold); stroke-width: 12; stroke-linecap: round;
  transition: stroke-dasharray 0.9s cubic-bezier(0.4,0,0.2,1); }
.gauge-arc.good { stroke: var(--emerald); }
.gauge-arc.warn { stroke: var(--amber); }
.gauge-arc.bad { stroke: var(--rose); }
.gauge-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 28px; font-weight: 700;
  text-align: center;
  margin-top: -38px;
}
.gauge-label { font-size: 11px; color: var(--text-3); text-align: center; margin-top: 4px; }

/* Radial bars (station performance) */
.radial-row {
  display: grid;
  grid-template-columns: 32px 1fr 60px;
  gap: 10px;
  align-items: center;
  margin-bottom: 9px;
}
.radial-row:last-child { margin-bottom: 0; }
.radial-code {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 12px;
  color: var(--gold);
}
.radial-track {
  height: 8px;
  background: rgba(255,255,255,0.05);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}
.radial-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold-2));
  border-radius: 4px;
  transition: width 0.9s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
}
.radial-fill.full { background: linear-gradient(90deg, var(--emerald), var(--emerald-2)); }
.radial-fill.warn { background: linear-gradient(90deg, var(--amber), #d97706); }
.radial-fill.idle { background: rgba(255,255,255,0.1); }
.radial-fill::after {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 6px; height: 100%;
  background: rgba(255,255,255,0.4);
  filter: blur(3px);
}
.radial-stat {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-2);
  text-align: end;
}

/* Card shimmer on data refresh */
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
.refreshed {
  animation: shimmerOnce 1s ease;
}
@keyframes shimmerOnce {
  0%, 100% { box-shadow: 0 0 0 transparent; }
  50% { box-shadow: 0 0 0 1px rgba(245,185,66,0.25); }
}

/* ============ MISC ============ */
.text-mute { color: var(--text-3); }
.text-2 { color: var(--text-2); }
.text-emerald { color: var(--emerald); }
.text-rose { color: var(--rose); }
.text-gold { color: var(--gold); }
.text-sky { color: var(--sky); }
.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-1 { gap: 5px; } .gap-2 { gap: 10px; }
.flex-wrap { flex-wrap: wrap; }
.mt-1 { margin-top: 8px; } .mt-2 { margin-top: 14px; } .mt-3 { margin-top: 22px; }
.mb-1 { margin-bottom: 8px; } .mb-2 { margin-bottom: 14px; } .mb-3 { margin-bottom: 22px; }
.hidden { display: none !important; }
.w-full { width: 100%; }
.tag {
  display: inline-block; padding: 2px 7px;
  background: var(--glass-2); border-radius: 5px;
  font-size: 10.5px; color: var(--text-2);
  font-family: 'JetBrains Mono', monospace;
}

/* Trace timeline */
.trace-step {
  display: flex; gap: 13px;
  padding: 11px 0;
  border-bottom: 1px dashed var(--border);
  position: relative;
}
.trace-step:last-child { border-bottom: none; }
.trace-dot {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--glass-2);
  border: 2px solid var(--border-2);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 700;
}
.trace-step.done .trace-dot { background: rgba(16,185,129,0.15); border-color: var(--emerald); color: var(--emerald); }
.trace-step.current .trace-dot { background: rgba(245,185,66,0.15); border-color: var(--gold); color: var(--gold); }
.trace-step.rejected .trace-dot { background: rgba(244,63,94,0.15); border-color: var(--rose); color: var(--rose); }

/* Audit row */
.audit-row {
  display: grid;
  grid-template-columns: 110px 1fr auto;
  gap: 12px; align-items: center;
  padding: 9px 13px;
  border-bottom: 1px solid var(--border);
  font-size: 11.5px;
}
.audit-row:last-child { border-bottom: none; }
.audit-time { font-family: 'JetBrains Mono', monospace; color: var(--text-3); font-size: 10.5px; }
.audit-msg { color: var(--text-2); }
.audit-msg b { color: var(--text); font-weight: 600; }
.audit-user { font-size: 10.5px; color: var(--text-3); }

/* Live ticker */
.ticker {
  background: var(--glass); backdrop-filter: blur(18px);
  border: 1px solid var(--border); border-radius: var(--r);
  overflow: hidden;
  height: 100%;
  display: flex; flex-direction: column;
}
.ticker-head {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  font-weight: 600; font-size: 12.5px;
  display: flex; align-items: center; justify-content: space-between;
}
.ticker-list { overflow-y: auto; flex: 1; max-height: 340px; }
.ticker-item {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; gap: 11px; align-items: flex-start;
  animation: slideIn 0.4s;
}
@keyframes slideIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }
body[dir="rtl"] .ticker-item { animation: slideInRtl 0.4s; }
@keyframes slideInRtl { from { opacity: 0; transform: translateX(8px); } to { opacity: 1; transform: translateX(0); } }
.ticker-icon {
  width: 28px; height: 28px; border-radius: 7px;
  background: var(--glass-2);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.ticker-icon.ok { background: rgba(16,185,129,0.12); color: var(--emerald); }
.ticker-icon.warn { background: rgba(245,158,11,0.12); color: var(--amber); }
.ticker-icon.err { background: rgba(244,63,94,0.12); color: var(--rose); }
.ticker-icon.info { background: rgba(56,189,248,0.12); color: var(--sky); }
.ticker-body { flex: 1; min-width: 0; }
.ticker-msg { font-size: 12px; color: var(--text); }
.ticker-msg b { font-weight: 600; }
.ticker-meta { font-size: 10.5px; color: var(--text-3); margin-top: 2px; display: flex; gap: 8px; flex-wrap: wrap; }

::-webkit-scrollbar { width: 9px; height: 9px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--glass-2); border-radius: 5px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-2); }

/* WO card mini */
.wo-mini {
  background: var(--glass-2);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 9px 11px;
  font-size: 11.5px;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 6px;
}
.wo-mini-id { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--text); }

/* My tasks card */
.task-card {
  background: var(--glass); border: 1px solid var(--border);
  border-radius: var(--r); padding: 14px;
  display: flex; flex-direction: column; gap: 10px;
  transition: all 0.15s;
}
.task-card:hover { border-color: var(--border-2); }
.task-card.urgent { border-color: rgba(244,63,94,0.4); }

@media print {
  body::before, .topbar, .sidebar, .page-actions, .splash { display: none !important; }
  .main { grid-template-columns: 1fr !important; }
  .content { padding: 0 !important; overflow: visible !important; }
}

const State = {
  data: null, route: 'dashboard', user: null, lang: 'ar', liveTimer: null,
  load() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { try { this.data = JSON.parse(raw); } catch(e) { this.data = Seed.generate(); } }
    else { this.data = Seed.generate(); }
    this.migrate();
    this.save();
  },
  // Forward-compatible migration so older saves get new fields
  migrate() {
    if (!this.data.departments || typeof this.data.departments !== 'object' || Array.isArray(this.data.departments)) {
      // Deep copy DEPTS into mutable storage (DEPTS is an object map)
      this.data.departments = JSON.parse(JSON.stringify(DEPTS));
    }
    if (!this.data.stageOverrides) this.data.stageOverrides = {};
    if (!this.data.meta) this.data.meta = { version: '1.0', initialized: now() };
    // Ensure all required collections exist (handles legacy localStorage)
    if (!Array.isArray(this.data.workOrders)) this.data.workOrders = [];
    if (!Array.isArray(this.data.warehouses)) this.data.warehouses = [];
    if (!Array.isArray(this.data.users)) this.data.users = [];
    if (!Array.isArray(this.data.stations)) this.data.stations = [];
    if (!Array.isArray(this.data.suppliers)) this.data.suppliers = [];
    if (!Array.isArray(this.data.movements)) this.data.movements = [];
    if (!Array.isArray(this.data.stockMovements)) this.data.stockMovements = [];
    if (!Array.isArray(this.data.maintenance)) this.data.maintenance = [];
    if (!Array.isArray(this.data.maintenanceRequests)) this.data.maintenanceRequests = [];
    if (!Array.isArray(this.data.returns)) this.data.returns = [];
    if (!Array.isArray(this.data.audit)) this.data.audit = [];
    if (!Array.isArray(this.data.sequences)) this.data.sequences = [];
    if (!Array.isArray(this.data.scrapLog)) this.data.scrapLog = [];
    if (!Array.isArray(this.data.stationConsumption)) this.data.stationConsumption = [];
    if (!Array.isArray(this.data.committeeReviews)) this.data.committeeReviews = [];
    if (!this.data.bom || typeof this.data.bom !== 'object') this.data.bom = {};
    if (!this.data.committee) this.data.committee = { members: [], requiredApprovals: 3, enabled: false };
    if (!this.data.seqDefaults) this.data.seqDefaults = { batchSize: 1000, baseSerial: 1001 };
    // Ensure each warehouse has items array
    this.data.warehouses.forEach(wh => {
      if (!Array.isArray(wh.items)) wh.items = [];
    });
  },
  save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(this.data));
    // Immediate cloud sync of warehouse items (JSONB column)
    // Fire-and-forget — UI shouldn't block on network
    if (typeof Repo !== 'undefined' && Repo.warehouses) {
      try {
        this.data.warehouses.forEach(wh => {
          if (Array.isArray(wh.items)) {
            Repo.warehouses.upsertItems(wh.id, wh.items).catch(e => 
              console.error('[State.save warehouse sync]', wh.id, e));
          }
        });
      } catch (e) { console.error('[State.save sync]', e); }
    }
  },
  reset() { localStorage.removeItem(STORAGE_KEY); this.data = Seed.generate(); this.migrate(); this.save(); }
};

const fmt = {
  num(n) { return new Intl.NumberFormat('en-US').format(Math.round(n||0)); },
  pct(n,d=1) { return ((n||0)).toFixed(d) + '%'; },
  date(iso) { if (!iso) return '—'; const d = new Date(iso); return d.toLocaleDateString('en-GB') + ' ' + d.toTimeString().slice(0,5); },
  ago(iso) {
    if (!iso) return '—';
    const m = (Date.now() - new Date(iso).getTime()) / 60000;
    if (m < 1) return State.lang === 'ar' ? 'الآن' : 'now';
    if (m < 60) return Math.round(m) + (State.lang === 'ar' ? ' د' : 'm');
    if (m < 1440) return Math.round(m/60) + (State.lang === 'ar' ? ' س' : 'h');
    return Math.round(m/1440) + (State.lang === 'ar' ? ' ي' : 'd');
  }
};

function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  const i = {success:'✓', error:'✕', warn:'⚠', info:'ℹ'};
  el.innerHTML = `<span style="font-weight:700;font-size:14px">${i[type]||'•'}</span><span>${msg}</span>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=> el.style.opacity='0', 2800);
  setTimeout(()=> el.remove(), 3200);
}

const Movements = {
  add(type, msg, ctx={}) {
    State.data.movements.unshift({
      id: uid('MV'), ts: now(), type, msg, ctx,
      user: State.user?.id, userName: State.user?.name,
    });
    if (State.data.movements.length > 100) State.data.movements.length = 100;
    State.save();
  },
  addStock({ whId, sku, type, qty, ref, notes }) {
    if (!State.data.stockMovements) State.data.stockMovements = [];
    // Sign convention:
    // - issue / scrap_loss: negative (material leaves stock)
    // - receive / recovery / opening / adjust+: positive
    // - adjust can be either; we keep the caller-provided sign for adjust
    const negTypes = ['issue', 'scrap_loss'];
    let signedQty;
    if (negTypes.includes(type)) {
      signedQty = -Math.abs(qty);
    } else if (type === 'adjust') {
      signedQty = qty; // caller controls sign
    } else {
      signedQty = Math.abs(qty);
    }
    const mv = {
      id: uid('SM'), ts: now(),
      whId, sku, type,
      qty: signedQty,
      ref: ref || '',
      notes: notes || '',
      user: State.user?.id, userName: State.user?.name,
      by: State.user?.id,
    };
    State.data.stockMovements.unshift(mv);
    if (State.data.stockMovements.length > 5000) State.data.stockMovements.length = 5000;
    // Cloud sync — fire and forget
    if (typeof Repo !== 'undefined' && Repo.stockMovements) {
      Repo.stockMovements.insert(mv).catch(err => console.error('[stockMovements sync]', err));
    }
  }
};

const Q = {
  user(id) { return State.data.users.find(u => u.id === id); },
  station(id) { return State.data.stations.find(s => s.id === id); },
  wh(id) { return State.data.warehouses.find(w => w.id === id); },
  whByDept(dept) { return State.data.warehouses.find(w => w.dept === dept); },
  wo(id) { return State.data.workOrders.find(w => w.id === id); },
  usersOf(dept) { return State.data.users.filter(u => u.dept === dept); },
  dept(id) { return (State.data.departments && State.data.departments[id]) || DEPTS[id] || { id, name: id, nameEn: id, color: '#888', bg: 'rgba(136,136,136,0.12)' }; },
  ownerOfStage(stage) {
    // Returns the responsible user for a given stage
    if (stage === 'CREATED' || stage === 'MAT_REQUEST') return Q.usersOf('PROD').find(u => u.role.includes('مشرف') || u.roleEn.includes('Supervisor'))?.id;
    if (stage === 'MAT_ISSUED') return Q.usersOf('RAW')[0]?.id;
    if (stage === 'AT_K1') return Q.station('K1').operatorId;
    if (stage === 'AT_K2') return Q.station('K2').operatorId;
    if (stage === 'AT_K3') return Q.station('K3').operatorId;
    if (stage === 'AT_K4') return Q.station('K4').operatorId;
    if (stage === 'AT_MOC') return Q.station('MOC').operatorId;
    if (stage === 'AT_PMF') return Q.whByDept('PMF').managerId;
    if (stage === 'AT_GDN') return Q.whByDept('GDN').managerId;
    return null;
  },
  woCountByStage() {
    const map = {};
    STAGE_ORDER.forEach(s => map[s] = 0);
    State.data.workOrders.forEach(wo => {
      if (wo.currentStage !== 'DELIVERED') {
        if (map[wo.currentStage] !== undefined) map[wo.currentStage]++;
      }
    });
    return map;
  },
  // Tasks pending for current user
  myTasks() {
    if (!State.user) return [];
    const tasks = [];
    State.data.workOrders.forEach(wo => {
      if (wo.currentStage === 'DELIVERED' || wo.currentStage === 'REJECTED') return;
      if (wo.currentOwner === State.user.id || (Perm.isManager() && wo.currentStage !== 'DELIVERED')) {
        tasks.push({ wo, stage: stageById(wo.currentStage) });
      }
    });
    return tasks;
  }
};

/* ============ REPO — CLOUD CRUD LAYER (Phase 1.4b) ============ */
// Hybrid pattern: writes go to BOTH localStorage (instant) AND Supabase (background).
// Reads from localStorage by default; bootstrap pulls from Supabase on login.
// Failures log to console but never block the UI — offline-resilient.

const Repo = {
  // Tracks the last sync state so we can show indicators
  _lastSync: null,
  _syncErrors: [],

  // Utility: log sync error without blocking
  _err(op, error) {
    console.error('[Repo]', op, error);
    this._syncErrors.unshift({ op, msg: error?.message || String(error), ts: Date.now() });
    if (this._syncErrors.length > 50) this._syncErrors.length = 50;
  },

  _ok(op) {
    this._lastSync = Date.now();
  },

  // ─── camelCase ↔ snake_case mappers ───

    return {
      code: s.code, name: s.name, name_en: s.nameEn || null,
      category: s.category, country: s.country || null, city: s.city || null,
      contact_person: s.contactPerson || null, title: s.title || null,
      email: s.email || null, phone: s.phone || null, address: s.address || null,
      materials: s.materials || [], notes: s.notes || null,
      active: s.active !== false, created_by: s.createdBy || null,
