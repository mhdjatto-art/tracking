  },

  // ─────── REQUEST MATERIALS (PROD → RAW) ───────
  requestMaterials(woId) {
    const wo = Q.wo(woId);
    const ar = State.lang === 'ar';
    if (wo.currentStage !== 'CREATED') return;
    if (!Perm.canActOnWO(wo)) { toast(t('no_perm'), 'error'); return; }
    const body = `
      <p style="margin-bottom:14px;font-size:12.5px;color:var(--text-2)">${ar?'سيتم إرسال طلب صرف مواد إلى مستودع المواد الخام':'Material request will be sent to the Raw Materials warehouse'}</p>
      <div class="field"><label>${ar?'ملاحظات':'Notes'}</label><textarea id="reqNotes" placeholder="${ar?'اختياري':'optional'}"></textarea></div>
    `;
    App.openModal(`${ar?'طلب مواد':'Request Materials'} — ${woId}`, body,
      `<button class="btn btn-secondary" onclick="App.closeModal()">${t('cancel')}</button>
       <button class="btn btn-primary" onclick="Action.submitRequestMaterials('${woId}')">${ar?'إرسال الطلب':'Send Request'}</button>`);
  },
  submitRequestMaterials(woId) {
    const notes = document.getElementById('reqNotes').value.trim();
    if (WF.advance(woId, { action: 'request', notes: notes || (State.lang==='ar'?'طلب مواد للإنتاج':'Material request') })) {
      App.closeModal(); toast(State.lang==='ar'?'تم إرسال الطلب لمستودع الخام':'Sent to Raw WH', 'success');
      App.goto(State.route);
    }
  },

  // ─────── ISSUE MATERIALS (RAW → PROD) ───────
  issueMaterials(woId) {
    const wo = Q.wo(woId);
    const ar = State.lang === 'ar';
    if (!Perm.canActOnWO(wo)) { toast(t('no_perm'), 'error'); return; }
    const body = `
      <p style="margin-bottom:14px;font-size:12.5px;color:var(--text-2)">${ar?'تأكيد صرف المواد للإنتاج. الكمية ستُحجز من مستودع الخام.':'Confirm material issuance to production. Quantity will be deducted from Raw WH.'}</p>
      <div class="form-row">
        <div class="field"><label>${ar?'الكمية المصروفة':'Issued Qty'}</label><input id="issQty" type="number" value="${wo.qty}"></div>
        <div class="field"><label>${ar?'إلى محطة':'To Station'}</label><select id="issStation"><option value="K1">K1</option></select></div>
      </div>
      <div class="field"><label>${ar?'ملاحظات':'Notes'}</label><textarea id="issNotes"></textarea></div>
    `;
    App.openModal(`${ar?'صرف مواد':'Issue Materials'} — ${woId}`, body,
      `<button class="btn btn-secondary" onclick="App.closeModal()">${t('cancel')}</button>
       <button class="btn btn-primary" onclick="Action.submitIssueMaterials('${woId}')">${t('confirm')}</button>`);
  },
  submitIssueMaterials(woId) {
    const qty = parseInt(document.getElementById('issQty').value) || 0;
    const notes = document.getElementById('issNotes').value.trim();
    if (WF.advance(woId, { action: 'issue', qty, notes: notes || (State.lang==='ar'?'صرف مواد للإنتاج':'Materials issued') })) {
      App.closeModal(); toast(State.lang==='ar'?'تم صرف المواد':'Materials issued', 'success');
      App.goto(State.route);
    }
  },

  // ─────── START STATION (K1 first start) ───────
  startStation(woId, station) {
    const wo = Q.wo(woId);
    if (WF.advance(woId, { action: 'start', notes: (State.lang==='ar'?'بدء ':'Started ') + station })) {
      const s = Q.station(station);
      if (s) { s.status='running'; s.currentWO=woId; s.target=wo.qty; s.produced=0; s.scrap=0; s.startedAt=now(); }
      State.save();
      toast(State.lang==='ar'?`بدأ التشغيل على ${station}`:`Started on ${station}`, 'success');
      App.goto(State.route);
    }
  },

  // ─────── HANDOVER (station to station) ───────
  handover(woId, targetStage, action='handover') {
    const wo = Q.wo(woId);
    const ar = State.lang === 'ar';
    if (!Perm.canActOnWO(wo)) { toast(t('no_perm'), 'error'); return; }
    const body = `
      <p style="margin-bottom:14px;font-size:12.5px;color:var(--text-2)">${ar?'إكمال التسليم للمرحلة التالية':'Complete handover to the next stage'}: <b>${escapeHTML(stageById(targetStage)?.[ar?'name':'nameEn'])}</b></p>
      <div class="form-row">
        <div class="field"><label>${ar?'الكمية المسلَّمة':'Handover Qty'}</label><input id="hoQty" type="number" value="${wo.produced || wo.qty}"></div>
        <div class="field"><label>${ar?'Scrap في هذه المرحلة':'Stage Scrap'}</label><input id="hoScrap" type="number" value="0"></div>
      </div>
      <div class="field"><label>${ar?'ملاحظات':'Notes'}</label><textarea id="hoNotes"></textarea></div>
    `;
    App.openModal(`${t('complete_handover')} — ${woId}`, body,
      `<button class="btn btn-secondary" onclick="App.closeModal()">${t('cancel')}</button>
       <button class="btn btn-primary" onclick="Action.submitHandover('${woId}','${action}')">${t('confirm')}</button>`);
  },
  submitHandover(woId, action) {
    const qty = parseInt(document.getElementById('hoQty').value) || 0;
    const scrap = parseInt(document.getElementById('hoScrap').value) || 0;
    const notes = document.getElementById('hoNotes').value.trim();
    if (WF.advance(woId, { action, qty, scrap, notes })) {
      App.closeModal(); toast(State.lang==='ar'?'تم التسليم':'Handover complete', 'success');
      App.goto(State.route);
    }
  },

  // ─────── MOC CHECK (accept or reject) ───────
  mocCheck(woId) {
    const wo = Q.wo(woId);
    const ar = State.lang === 'ar';
    if (!Perm.canActOnWO(wo)) { toast(t('no_perm'), 'error'); return; }
    const body = `
      <p style="margin-bottom:14px;font-size:12.5px;color:var(--text-2)">${ar?'فحص نهاية الإنتاج للدفعة':'Final product control inspection for batch'} <b>${woId}</b></p>
      <div class="form-row">
        <div class="field"><label>${ar?'الكمية المقبولة':'Accepted Qty'}</label><input id="mocAccept" type="number" value="${wo.produced}"></div>
        <div class="field"><label>${ar?'الكمية المرفوضة':'Rejected Qty'}</label><input id="mocReject" type="number" value="0"></div>
      </div>
      <div class="field"><label>${ar?'ملاحظات الفاحص':'Inspector Notes'}</label><textarea id="mocNotes" placeholder="${ar?'سبب القبول/الرفض، ملاحظات الجودة...':'Reason for accept/reject, quality notes...'}"></textarea></div>
    `;
    App.openModal(`MOC — ${woId}`, body,
      `<button class="btn btn-secondary" onclick="App.closeModal()">${t('cancel')}</button>
       <button class="btn btn-danger" onclick="Action.submitMOC('${woId}','reject')">${t('reject')}</button>
       <button class="btn btn-success" onclick="Action.submitMOC('${woId}','accept')">${t('accept')}</button>`);
  },
  submitMOC(woId, decision) {
    const accept = parseInt(document.getElementById('mocAccept').value) || 0;
    const reject = parseInt(document.getElementById('mocReject').value) || 0;
    const notes = document.getElementById('mocNotes').value.trim();
    if (decision === 'accept') {
      if (WF.acceptMOC(woId, accept, reject, notes)) {
        App.closeModal(); toast(State.lang==='ar'?'تم قبول الدفعة':'Batch accepted', 'success');
        App.goto(State.route);
      }
    } else {
      if (WF.reject(woId, accept, reject, notes)) {
        App.closeModal(); toast(State.lang==='ar'?'تم رفض الدفعة':'Batch rejected', 'warn');
        App.goto(State.route);
      }
    }
  },

  // ─────── STATION DETAIL ───────
  openStation(stationId) {
    const s = Q.station(stationId);
    const op = Q.user(s.operatorId);
    const ar = State.lang === 'ar';
    const wo = s.currentWO ? Q.wo(s.currentWO) : null;
    const pct = s.target > 0 ? Math.min(100, (s.produced/s.target)*100) : 0;
    const body = `
      <div class="grid-2 mb-2">
        <div><div class="text-mute" style="font-size:10.5px">${ar?'المشغّل المعيّن':'Operator'}</div>
          ${op?`<div style="display:flex;align-items:center;gap:8px;margin-top:4px"><div class="user-avatar" style="width:28px;height:28px;font-size:12px;background:${op.color}">${op.avatar}</div><div><div style="font-weight:600;font-size:13px">${escapeHTML(ar?op.name:op.nameEn)}</div><div class="text-mute" style="font-size:11px">${escapeHTML(ar?op.role:op.roleEn)}</div></div></div>`:'—'}</div>
        <div><div class="text-mute" style="font-size:10.5px">${ar?'الحالة':'Status'}</div><div style="margin-top:4px"><span class="badge-status b-${s.status}">${s.status}</span></div></div>
      </div>
      <div class="grid-3 mb-2">
        <div><div class="text-mute" style="font-size:10.5px">${ar?'منتج':'Produced'}</div><div class="mono" style="font-size:18px;font-weight:700">${fmt.num(s.produced)}</div></div>
        <div><div class="text-mute" style="font-size:10.5px">${ar?'الهدف':'Target'}</div><div class="mono" style="font-size:18px;font-weight:700">${fmt.num(s.target)}</div></div>
        <div><div class="text-mute" style="font-size:10.5px">Scrap</div><div class="mono" style="font-size:18px;font-weight:700;color:var(--rose)">${fmt.num(s.scrap)}</div></div>
      </div>
      ${s.target>0?`<div class="station-progress"><div class="station-progress-fill" style="width:${pct}%"></div></div>
      <div class="text-mute mono" style="font-size:11px;margin-top:6px">${pct.toFixed(1)}% — ${ar?'بدأ':'started'} ${fmt.ago(s.startedAt)}</div>`:''}
      ${wo?`<div style="margin-top:14px;padding:11px;background:var(--glass-2);border:1px solid var(--border);border-radius:9px">
        <div class="text-mute" style="font-size:10.5px">${ar?'WO الحالي':'Current WO'}</div>
        <div class="mono" style="font-weight:700;font-size:14px;margin-top:2px">${wo.id}</div>
        <div class="text-mute" style="font-size:11.5px">${escapeHTML(wo.desc)}</div>
      </div>`:''}
    `;
    App.openModal(`${s.code} — ${escapeHTML(ar?s.name:s.nameEn)}`, body,
      `<button class="btn btn-secondary" onclick="App.closeModal()">${t('close')}</button>
       ${(s.status!=='maintenance' && Perm.canAct('PROD'))?`<button class="btn btn-danger" onclick="Action.requestMaint('${s.id}')">${t('request_maint')}</button>`:''}`);
  },

  // ─────── REQUEST MAINTENANCE ───────
  requestMaint(stationId) {
    const ar = State.lang === 'ar';
    App.closeModal();
    const stationOpts = State.data.stations.map(s=>`<option value="${s.id}" ${s.id===stationId?'selected':''}>${s.code} — ${escapeHTML(ar?s.name:s.nameEn)}</option>`).join('');
    const body = `
      <div class="form-grid">
        <div class="field"><label>${ar?'المحطة':'Station'} <span class="req">*</span></label><select id="mrStation">${stationOpts}</select></div>
        <div class="form-row">
          <div class="field"><label>${ar?'العنوان':'Title'} <span class="req">*</span></label><input id="mrTitle" placeholder="${ar?'مثال: عطل في وحدة التشخيص':'e.g. Sensor fault'}"></div>
          <div class="field"><label>${ar?'الأولوية':'Priority'}</label><select id="mrPriority"><option value="low">low</option><option value="medium" selected>medium</option><option value="high">high</option></select></div>
        </div>
        <div class="field"><label>${ar?'الوصف':'Description'}</label><textarea id="mrDesc"></textarea></div>
      </div>
    `;
    App.openModal(t('request_maint'), body,
      `<button class="btn btn-secondary" onclick="App.closeModal()">${t('cancel')}</button>
       <button class="btn btn-primary" onclick="Action.submitMaint()">${t('confirm')}</button>`);
  },
  submitMaint() {
    const stationId = document.getElementById('mrStation').value;
    const title = document.getElementById('mrTitle').value.trim();
    const priority = document.getElementById('mrPriority').value;
    const desc = document.getElementById('mrDesc').value.trim();
    if (!title) { toast(State.lang==='ar'?'العنوان مطلوب':'Title required', 'error'); return; }
    const tech = Q.usersOf('MAINT')[0];
    const id = 'MR-' + String(State.data.maintenance.length+1).padStart(3,'0');
    State.data.maintenance.unshift({
      id, stationId, requestedBy: State.user.id, assignedTo: tech?.id || null,
      status: 'in_progress', priority, title, desc, requestedAt: now(),
    });
    // Optionally mark station as maintenance if high priority
    if (priority === 'high') {
      const s = Q.station(stationId);
      if (s && s.status !== 'running') s.status = 'maintenance';
    }
    Audit.log('request_maint', 'Maintenance', id, { stationId, priority });
    Movements.add('warn', `${State.lang==='ar'?'طلب صيانة جديد':'New maintenance request'} — ${stationId}: ${title}`, { mrId: id });
    State.save();
    App.closeModal(); toast(State.lang==='ar'?'تم تسجيل الطلب':'Request logged', 'success');
    App.goto('maintenance');
  },
  completeMaint(id) {
    if (!Perm.canAct('MAINT')) { toast(t('no_perm'), 'error'); return; }
    const m = State.data.maintenance.find(x=>x.id===id);
    if (!m) return;
    m.status = 'completed'; m.completedAt = now(); m.completedBy = State.user.id;
    const s = Q.station(m.stationId);
    if (s && s.status === 'maintenance') s.status = 'idle';
    Audit.log('complete_maint', 'Maintenance', id, {});
    Movements.add('ok', `${State.lang==='ar'?'تم إنجاز صيانة':'Maintenance completed'} ${m.stationId}`, { mrId: id });
    State.save();
    toast(State.lang==='ar'?'تم الإنجاز':'Completed', 'success');
    App.goto('maintenance');
  },

          <div class="field"><label>${ar?'الحرف الأول':'Avatar Letter'}</label><input id="usrAvatar" maxlength="2" value="${u?u.avatar:''}" placeholder="${ar?'أ':'A'}"></div>
        </div>
        ${isNew ? `
        <div style="background:rgba(56,189,248,0.06);border:1px solid rgba(56,189,248,0.2);border-radius:9px;padding:11px;margin:2px 0">
          <div style="font-size:11.5px;color:var(--sky);font-weight:600;margin-bottom:8px">🔐 ${ar?'بيانات تسجيل الدخول':'Login Credentials'}</div>
          <div class="form-row">
            <div class="field"><label>${ar?'الإيميل':'Email'} <span class="req">*</span></label><input type="email" id="usrEmail" placeholder="name@veridos.iq" autocomplete="off"></div>
            <div class="field"><label>${ar?'كلمة السر المؤقتة':'Temp Password'} <span class="req">*</span></label><input type="text" id="usrPassword" placeholder="${ar?'8 أحرف على الأقل':'min 8 chars'}" minlength="8" autocomplete="off"></div>
          </div>
          <div style="font-size:10.5px;color:var(--text-3);margin-top:6px">${ar?'سيتم إنشاء حساب Supabase تلقائياً. أبلغ الموظف بكلمة السر ليغيّرها عند أول دخول.':'Supabase account will be auto-created. Share password with the employee.'}</div>
        </div>
        ` : ''}
        <div class="form-row">
          <div class="field"><label>${ar?'الاسم بالعربي':'Name (AR)'} <span class="req">*</span></label><input id="usrName" value="${u?escapeHTML(u.name):''}"></div>
          <div class="field"><label>${ar?'الاسم بالإنجليزي':'Name (EN)'} <span class="req">*</span></label><input id="usrNameEn" value="${u?escapeHTML(u.nameEn):''}"></div>
        </div>
        <div class="form-row">
          <div class="field"><label>${ar?'القسم':'Department'} <span class="req">*</span></label><select id="usrDept">${deptOpts}</select></div>
          <div class="field"><label>${ar?'اللون':'Color'}</label><select id="usrColor">${colorOpts}</select></div>
        </div>
        <div class="form-row">
          <div class="field"><label>${ar?'الدور بالعربي':'Role (AR)'}</label><input id="usrRole" value="${u?escapeHTML(u.role):''}"></div>
          <div class="field"><label>${ar?'الدور بالإنجليزي':'Role (EN)'}</label><input id="usrRoleEn" value="${u?escapeHTML(u.roleEn):''}"></div>
        </div>
      </div>
    `;
    App.openModal(isNew ? (ar?'مستخدم جديد':'New User') : (ar?'تعديل المستخدم':'Edit User'), body,
      `<button class="btn btn-secondary" onclick="App.closeModal()">${t('cancel')}</button>
       <button class="btn btn-primary" id="saveUserBtn" onclick="Action.saveUser('${id||''}')">${t('save')}</button>`, true);
  },

  async saveUser(existingId) {
    if (!Perm.isManager()) return;
    const ar = State.lang === 'ar';
    const get = (id) => (document.getElementById(id)?.value || '').trim();
    const id = get('usrId'), name = get('usrName'), nameEn = get('usrNameEn');
    if (!id || !name || !nameEn) { toast(ar?'املأ الحقول المطلوبة':'Fill required fields','error'); return; }

    const dept = get('usrDept'), color = get('usrColor') || '#888';
    const avatar = get('usrAvatar') || name.charAt(0);
    const role = get('usrRole') || '—', roleEn = get('usrRoleEn') || '—';

    // EDIT MODE — local update only (Phase 1.4b will sync to Supabase)
    if (existingId) {
      const u = Q.user(existingId);
      if (!u) return;
      Object.assign(u, { id, name, nameEn, avatar, dept, color, role, roleEn });
      Audit.log('edit_user', 'User', id, { fields: 'name/dept/role' });
      Movements.add('info', `${ar?'تم تعديل المستخدم':'User edited'} ${name}`, { userId: id });
      State.save();
      App.closeModal();
      toast(ar?'تم الحفظ':'Saved','success');
      View.adminUsers();
      return;
    }

    // CREATE MODE — call Edge Function to create Supabase Auth user + link to public.users
    const email = get('usrEmail'), password = get('usrPassword');
    if (!email || !password) {
      toast(ar?'الإيميل وكلمة السر مطلوبان':'Email and password required','error');
      return;
    }
    if (password.length < 8) {
      toast(ar?'كلمة السر يجب 8 أحرف على الأقل':'Password must be 8+ chars','error');
      return;
    }
    if (State.data.users.find(x => x.id === id)) {
      toast(ar?'المعرّف موجود مسبقاً':'ID already exists','error');
      return;
    }

    if (!sb) {
      toast(ar?'Supabase غير مهيّأ — لا يمكن إنشاء حساب':'Supabase not configured','error');
      return;
    }

    const btn = document.getElementById('saveUserBtn');
    if (btn) { btn.disabled = true; btn.textContent = ar?'...جاري الإنشاء':'Creating...'; }

    try {
      // Get current session token to authorize Edge Function call
      const { data: { session } } = await sb.auth.getSession();
      if (!session) throw new Error(ar?'انتهت الجلسة':'Session expired');

      const fnUrl = SUPABASE_CONFIG.url.replace(/\/$/,'') + '/functions/v1/create-user';
      const response = await fetch(fnUrl, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${session.access_token}`,
          'Content-Type': 'application/json',
          'apikey': SUPABASE_CONFIG.anonKey,
        },
        body: JSON.stringify({
          id, email, password,
          name_ar: name, name_en: nameEn,
          dept_id: dept,
          role_ar: role, role_en: roleEn,
          color, avatar
        })
      });

      const result = await response.json();
      if (!response.ok || !result.ok) {
        throw new Error(result.error || `HTTP ${response.status}`);
      }

      // Add to local state too so UI updates immediately
      State.data.users.push({
        id, name, nameEn, dept, color, avatar, role, roleEn,
        auth_user_id: result.auth_uuid, active: true
      });
      Audit.log('create_user', 'User', id, { name, dept, email });
      Movements.add('info', `${ar?'مستخدم جديد:':'New user:'} ${name} (${email})`, { userId: id });
      State.save();

      App.closeModal();
      toast(ar?`تم إنشاء ${name} ✓ كلمة السر: ${password}`:`Created ${name} ✓`, 'success');
      View.adminUsers();
    } catch (e) {
      toast((ar?'فشل الإنشاء: ':'Create failed: ') + (e.message || String(e)), 'error');
      if (btn) { btn.disabled = false; btn.textContent = t('save'); }
    }
  },
  deleteUser(id) {
    if (!Perm.isManager()) return;
    const u = Q.user(id);
    if (!u) return;
    const ar = State.lang === 'ar';
    if (id === State.user.id) { toast(ar?'لا يمكنك حذف نفسك':"Can't delete yourself",'error'); return; }
    // Check dependencies
    const blockingWO = State.data.workOrders.find(w => w.currentOwner === id && w.currentStage !== 'DELIVERED' && w.currentStage !== 'REJECTED');
    if (blockingWO) { toast(ar?`المستخدم مسؤول عن ${blockingWO.id}`:`User owns ${blockingWO.id}`,'error'); return; }
    const blockingStation = State.data.stations.find(s => s.operatorId === id);
    if (blockingStation) { toast(ar?`المستخدم مشغّل لـ ${blockingStation.code}`:`User operates ${blockingStation.code}`,'error'); return; }
    App.openModal(ar?'تأكيد الحذف':'Confirm Delete',
      `<p>${ar?'هل أنت متأكد من حذف المستخدم':'Are you sure you want to delete'} <b>${escapeHTML(u.name)}</b>؟</p><p style="font-size:11px;color:var(--text-3);margin-top:8px">${ar?'لا يمكن التراجع عن هذا الإجراء':'This cannot be undone'}</p>`,
      `<button class="btn btn-secondary" onclick="App.closeModal()">${t('cancel')}</button>
       <button class="btn btn-danger" onclick="Action.confirmDeleteUser('${id}')">${ar?'حذف':'Delete'}</button>`);
  },
  confirmDeleteUser(id) {
    const u = Q.user(id);
    State.data.users = State.data.users.filter(x => x.id !== id);
    Audit.log('delete_user', 'User', id, { name: u.name });
    Movements.add('warn', `${State.lang==='ar'?'تم حذف المستخدم':'User deleted'} ${u.name}`, { userId: id });
    State.save();
    App.closeModal();
    toast(State.lang==='ar'?'تم الحذف':'Deleted','success');
    View.adminUsers();
  },

  // ─────── ADMIN — DEPT EDIT (name/color only) ───────
  editDept(id) {
    if (!Perm.isManager()) return;
    const ar = State.lang === 'ar';
    const d = Q.dept(id);
    const colors = ['#f5b942','#14b8a6','#38bdf8','#0ea5e9','#a78bfa','#22c55e','#10b981','#8b5cf6','#f43f5e','#f59e0b','#ec4899','#06b6d4'];
    const colorOpts = colors.map(c=>`<option value="${c}" ${d.color===c?'selected':''}>${c}</option>`).join('');
    const body = `
      <div class="form-grid">
        <div class="field"><label>${ar?'المعرّف':'ID'}</label><input value="${d.id}" readonly class="mono"></div>
        <div class="form-row">
          <div class="field"><label>${ar?'الاسم بالعربي':'Name (AR)'}</label><input id="dpName" value="${escapeHTML(d.name)}"></div>
          <div class="field"><label>${ar?'الاسم بالإنجليزي':'Name (EN)'}</label><input id="dpNameEn" value="${escapeHTML(d.nameEn)}"></div>
        </div>
        <div class="field"><label>${ar?'اللون':'Color'}</label><select id="dpColor">${colorOpts}</select></div>
      </div>
    `;
    App.openModal(ar?'تعديل القسم':'Edit Department', body,
      `<button class="btn btn-secondary" onclick="App.closeModal()">${t('cancel')}</button>
       <button class="btn btn-primary" onclick="Action.saveDept('${id}')">${t('save')}</button>`);
  },
  saveDept(id) {
    if (!Perm.isManager()) return;
    const d = State.data.departments[id];
    if (!d) return;
    const get = (x) => document.getElementById(x).value.trim();
    d.name = get('dpName') || d.name;
    d.nameEn = get('dpNameEn') || d.nameEn;
    const newColor = get('dpColor');
    if (newColor) {
      d.color = newColor;
      // Compute matching translucent bg
      const hex = newColor.replace('#','');
      const r = parseInt(hex.slice(0,2),16), g = parseInt(hex.slice(2,4),16), b = parseInt(hex.slice(4,6),16);
      d.bg = `rgba(${r},${g},${b},0.12)`;
    }
    Audit.log('edit_dept', 'Department', id, { name: d.name });
    State.save();
    App.closeModal();
    toast(State.lang==='ar'?'تم الحفظ':'Saved','success');
    View.adminDepts();
  },

  // ─────── ADMIN — STATION EDIT ───────
  editStation(id) {
    if (!Perm.isManager()) return;
    const ar = State.lang === 'ar';
    const s = Q.station(id);
    if (!s) return;
    const prodUsers = Q.usersOf('PROD').concat(Q.usersOf('QC'));
    const opOpts = `<option value="">${ar?'— لا يوجد —':'— none —'}</option>` + prodUsers.map(u=>`<option value="${u.id}" ${u.id===s.operatorId?'selected':''}>${escapeHTML(ar?u.name:u.nameEn)} (${escapeHTML(ar?u.role:u.roleEn)})</option>`).join('');
    const body = `
      <div class="form-grid">
        <div class="form-row">
          <div class="field"><label>${ar?'الكود':'Code'}</label><input value="${s.code}" readonly class="mono"></div>
          <div class="field"><label>${ar?'المعرّف':'ID'}</label><input value="${s.id}" readonly class="mono"></div>
        </div>
        <div class="form-row">
          <div class="field"><label>${ar?'الاسم بالعربي':'Name (AR)'}</label><input id="stName" value="${escapeHTML(s.name)}"></div>
          <div class="field"><label>${ar?'الاسم بالإنجليزي':'Name (EN)'}</label><input id="stNameEn" value="${escapeHTML(s.nameEn)}"></div>
        </div>
        <div class="field"><label>${ar?'المشغّل المعيّن':'Assigned Operator'}</label><select id="stOp">${opOpts}</select></div>
      </div>
    `;
    App.openModal(`${ar?'تعديل المحطة':'Edit Station'} ${s.code}`, body,
      `<button class="btn btn-secondary" onclick="App.closeModal()">${t('cancel')}</button>
       <button class="btn btn-primary" onclick="Action.saveStation('${id}')">${t('save')}</button>`);
  },
  saveStation(id) {
    if (!Perm.isManager()) return;
    const s = Q.station(id);
    if (!s) return;
    const get = (x) => document.getElementById(x).value.trim();
    s.name = get('stName') || s.name;
    s.nameEn = get('stNameEn') || s.nameEn;
    s.operatorId = get('stOp') || null;
    Audit.log('edit_station', 'Station', id, { name: s.name, operator: s.operatorId });
    State.save();
    App.closeModal();
    toast(State.lang==='ar'?'تم الحفظ':'Saved','success');
    View.adminStations();
  },

  // ─────── ADMIN — STAGE NAME EDIT ───────
  editStage(id) {
    if (!Perm.isManager()) return;
    const ar = State.lang === 'ar';
    const s = stageById(id);
    const body = `
      <div class="form-grid">
        <div class="field"><label>${ar?'المعرّف':'ID'}</label><input value="${id}" readonly class="mono"></div>
        <div class="form-row">
          <div class="field"><label>${ar?'الاسم بالعربي':'Name (AR)'}</label><input id="sgName" value="${escapeHTML(s.name)}"></div>
          <div class="field"><label>${ar?'الاسم بالإنجليزي':'Name (EN)'}</label><input id="sgNameEn" value="${escapeHTML(s.nameEn)}"></div>
        </div>
        <p style="font-size:11px;color:var(--text-3)">${ar?'الاسم فقط قابل للتعديل. التسلسل والقسم المسؤول ثابتان لحماية سير العمل.':'Only the name is editable. Order and owner department are fixed to protect workflow integrity.'}</p>
      </div>
    `;
    App.openModal(ar?'تعديل اسم المرحلة':'Edit Stage Name', body,
      `<button class="btn btn-secondary" onclick="App.closeModal()">${t('cancel')}</button>
       ${State.data.stageOverrides[id]?`<button class="btn btn-danger btn-sm" onclick="Action.resetStage('${id}')">${ar?'استعادة الأصلي':'Reset to default'}</button>`:''}
       <button class="btn btn-primary" onclick="Action.saveStage('${id}')">${t('save')}</button>`);
  },
  saveStage(id) {
    if (!Perm.isManager()) return;
    const get = (x) => document.getElementById(x).value.trim();
    const base = STAGES.find(s => s.id === id);
    if (!base) return;
    const name = get('sgName'), nameEn = get('sgNameEn');
    if (name === base.name && nameEn === base.nameEn) {
      delete State.data.stageOverrides[id];
    } else {
      State.data.stageOverrides[id] = { name, nameEn };
    }
    Audit.log('edit_stage', 'Stage', id, { name, nameEn });
    State.save();
    App.closeModal();
    toast(State.lang==='ar'?'تم الحفظ':'Saved','success');
    View.adminWorkflow();
  },
  resetStage(id) {
    if (!Perm.isManager()) return;
    delete State.data.stageOverrides[id];
    Audit.log('reset_stage', 'Stage', id, {});
    State.save();
    App.closeModal();
    toast(State.lang==='ar'?'تم الاستعادة':'Reset','success');
    View.adminWorkflow();
  },

  // ─────── BACKUP ───────
  exportData() {
    const payload = {
      _meta: { exportedAt: now(), exportedBy: State.user.id, version: '1.0', source: 'ProdLine OS' },
      data: State.data,
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const stamp = new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');
    a.href = url; a.download = `prodline-backup-${stamp}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    Audit.log('export_data', 'System', 'backup', { size: JSON.stringify(payload).length });
    toast(State.lang==='ar'?'تم تنزيل النسخة الاحتياطية':'Backup downloaded','success');
  },
  importData(file) {
    if (!file) return;
    if (!Perm.isManager()) { toast(t('no_perm'),'error'); return; }
    const ar = State.lang === 'ar';
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const parsed = JSON.parse(e.target.result);
        const incoming = parsed.data || parsed; // accept both shapes
        if (!incoming.users || !incoming.workOrders || !incoming.stations) {
          toast(ar?'الملف غير صالح':'Invalid file','error'); return;
        }
        App.openModal(ar?'تأكيد الاستيراد':'Confirm Import',
          `<p>${ar?'سيتم استبدال كل البيانات الحالية بمحتوى الملف:':'All current data will be replaced with file contents:'}</p>
           <div class="mono" style="background:var(--glass-2);padding:10px;border-radius:8px;font-size:11.5px;margin-top:10px">
            ${incoming.users.length} ${ar?'مستخدم':'users'} ·
            ${incoming.workOrders.length} WO ·
            ${incoming.audit?incoming.audit.length:0} ${ar?'سجل تدقيق':'audit'}<br>
            ${parsed._meta?(ar?'تاريخ التصدير: ':'Exported: ')+fmt.date(parsed._meta.exportedAt):''}
           </div>
           <p style="font-size:11px;color:var(--rose);margin-top:10px">${ar?'⚠️ لا يمكن التراجع عن هذا الإجراء':'⚠️ This cannot be undone'}</p>`,
          `<button class="btn btn-secondary" onclick="App.closeModal()">${t('cancel')}</button>
           <button class="btn btn-danger" onclick="Action.confirmImport()">${ar?'استيراد':'Import'}</button>`);
        Action._pendingImport = incoming;
      } catch (err) {
        toast(ar?'خطأ في قراءة الملف':'File read error','error');
      }
    };
    reader.readAsText(file);
  },
  confirmImport() {
    if (!Action._pendingImport) return;
    const importedAuditId = uid('AUD');
    State.data = Action._pendingImport;
    State.migrate?.() || (function(){
      // fallback migrate
      if (!State.data.departments) State.data.departments = JSON.parse(JSON.stringify(DEPTS));
      if (!State.data.stageOverrides) State.data.stageOverrides = {};
    })();
    if (!State.data.audit) State.data.audit = [];
    State.data.audit.unshift({ id: importedAuditId, ts: now(), user: State.user.id, userName: State.user.name, action: 'import_data', entity: 'System', entityId: 'backup', details: {} });
    State.save();
    Action._pendingImport = null;
    App.closeModal();
    toast(State.lang==='ar'?'تم الاستيراد':'Imported','success');
    // Re-login if current user not in imported data
    if (!Q.user(State.user.id)) { App.logout(); }
    else { App.renderSidebar(); App.goto('admin'); }
  },
};

// Initialize
App.init();
</script>
</body>
</html>
