  // ═══════════════════════════════════════════════════════════════════
  // BOOTSTRAP — load all cloud data into State.data on login
  // Called from the auth flow after successful login.
  // ═══════════════════════════════════════════════════════════════════
  async bootstrap() {
    if (!sb) {
      console.warn('[Repo] No Supabase client — skipping cloud bootstrap');
      return false;
    }
    console.log('[Repo] Bootstrapping from cloud...');
    const t0 = Date.now();

    try {
      const [suppliers, maintenance, ccfg, cmembers, creviews, returns, stkMvs, bomMap, stConsume, seqs, scrapLog, whs] = await Promise.all([
        this.suppliers.list(),
        this.maintenance.list(),
        this.committee.getConfig(),
        this.committee.listMembers(),
        this.committee.listReviews(),
        this.returns.list(),
        this.stockMovements.list(500),
        this.bom.list(),
        this.stationConsumption.list(1000),
        this.sequences.list(),
        this.scrapLog.list(1000),
        this.warehouses.list(),
      ]);

      if (suppliers !== null) State.data.suppliers = suppliers;
      if (maintenance !== null) State.data.maintenanceRequests = maintenance;
      if (ccfg !== null) {
        if (!State.data.committee) State.data.committee = {};
        State.data.committee.enabled = ccfg.enabled;
        State.data.committee.requiredApprovals = ccfg.requiredApprovals;
      }
      if (cmembers !== null) {
        if (!State.data.committee) State.data.committee = { members: [], requiredApprovals: 3, enabled: false };
        State.data.committee.members = cmembers;
      }
      if (creviews !== null) State.data.committeeReviews = creviews;
      if (returns !== null) State.data.returns = returns;
      if (stkMvs !== null) State.data.stockMovements = stkMvs;
      if (bomMap !== null && Object.keys(bomMap).length > 0) State.data.bom = bomMap;
      if (stConsume !== null) State.data.stationConsumption = stConsume;
      if (seqs !== null) State.data.sequences = seqs;
      if (scrapLog !== null) State.data.scrapLog = scrapLog;
      // Merge warehouse items from cloud (preserve seed structure, just update items array)
      if (whs !== null) {
        whs.forEach(cloudWh => {
          const localWh = State.data.warehouses.find(w => w.id === cloudWh.id);
          if (localWh) {
            localWh.items = cloudWh.items || [];
          }
        });
      }

      State.save();
      console.log(`[Repo] Bootstrap complete in ${Date.now() - t0}ms — `, {
        suppliers: suppliers?.length, maintenance: maintenance?.length,
        committeeMembers: cmembers?.length, committeeReviews: creviews?.length,
        returns: returns?.length, stockMovements: stkMvs?.length,
        bomStations: bomMap ? Object.keys(bomMap).length : 0,
        stationConsumption: stConsume?.length,
        sequences: seqs?.length,
        scrapLog: scrapLog?.length,
        warehouses: whs?.length,
      });
      return true;
    } catch (e) {
      console.error('[Repo] Bootstrap failed:', e);
      return false;
    }
  },

  // ═══════════════════════════════════════════════════════════════════
  // REALTIME — subscribe to changes from other users
  // ═══════════════════════════════════════════════════════════════════
  _channels: [],
  subscribeAll() {
    if (!sb) return;
    this.unsubscribeAll();

    const channel = sb.channel('prodline_realtime')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'suppliers' }, async () => {
        const list = await this.suppliers.list();
        if (list !== null) { State.data.suppliers = list; State.save(); this._refreshIfShowing('suppliers'); }
      })
      .on('postgres_changes', { event: '*', schema: 'public', table: 'maintenance_requests' }, async () => {
        const list = await this.maintenance.list();
        if (list !== null) { State.data.maintenanceRequests = list; State.save(); this._refreshIfShowing('maintenance'); }
      })
      .on('postgres_changes', { event: '*', schema: 'public', table: 'committee_reviews' }, async () => {
        const list = await this.committee.listReviews();
        if (list !== null) { State.data.committeeReviews = list; State.save(); this._refreshIfShowing('committee'); }
      })
      .on('postgres_changes', { event: '*', schema: 'public', table: 'committee_members' }, async () => {
        const list = await this.committee.listMembers();
        if (list !== null && State.data.committee) { State.data.committee.members = list; State.save(); this._refreshIfShowing('committee'); }
      })
      .on('postgres_changes', { event: '*', schema: 'public', table: 'committee_config' }, async () => {
        const cfg = await this.committee.getConfig();
        if (cfg !== null && State.data.committee) {
          State.data.committee.enabled = cfg.enabled;
          State.data.committee.requiredApprovals = cfg.requiredApprovals;
          State.save();
          this._refreshIfShowing('committee');
        }
      })
      .on('postgres_changes', { event: '*', schema: 'public', table: 'returns' }, async () => {
        const list = await this.returns.list();
        if (list !== null) { State.data.returns = list; State.save(); this._refreshIfShowing('returns'); }
      })
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'stock_movements' }, async () => {
        const list = await this.stockMovements.list(500);
        if (list !== null) { State.data.stockMovements = list; State.save(); this._refreshIfShowing('warehouses'); }
      })
      .on('postgres_changes', { event: '*', schema: 'public', table: 'sequences' }, async () => {
        const list = await this.sequences.list();
        if (list !== null) { State.data.sequences = list; State.save(); this._refreshIfShowing('quality'); }
      })
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'warehouses' }, async () => {
        const whs = await this.warehouses.list();
        if (whs !== null) {
          whs.forEach(cloudWh => {
            const localWh = State.data.warehouses.find(w => w.id === cloudWh.id);
            if (localWh) localWh.items = cloudWh.items || [];
          });
          State.save();
          this._refreshIfShowing('warehouses');
        }
      })
      .subscribe((status) => {
        console.log('[Repo] Realtime status:', status);
      });

    this._channels.push(channel);
  },
  unsubscribeAll() {
    if (!sb) return;
    this._channels.forEach(c => sb.removeChannel(c));
    this._channels = [];
  },
  _refreshIfShowing(view) {
    if (State.currentView === view && typeof View[view] === 'function') {
      try { View[view](); } catch (e) { console.warn('[Repo] view refresh failed:', e); }
    }
  },
};

/* ============ BOM ENGINE — Bill of Materials per Station ============ */
// Handles per-station material consumption from warehouse stock.
// Lifecycle: WO arrives at K(n) → consume(woId, stationId) → if all materials available
// → deduct from warehouse + log to stationConsumption + record stock_movement
//
// Math:
//   qty_required[material] = BOM[station][material].qtyPerUnit × wo.remainingQty
//   wo.remainingQty = wo.qty − Σ scrap_at_previous_stages
//
// On scrap: see Scrap module (Phase 3) — material is "consumed-as-scrap", not refunded
// (except recoverable=true materials like gold, where 95% is logged for recovery).

const BOM = {
  // Get the BOM for a station (returns array of materials, or [])
  forStation(stationId) {
    return (State.data.bom && State.data.bom[stationId]) || [];
  },

  // Calculate required quantities for a WO at a given station
  // Returns: [{ sku, name, whId, qtyRequired, qtyAvailable, sufficient, unit }]
  calculateRequired(woId, stationId) {
    const wo = Q.wo(woId);
    if (!wo) return [];
    const recipe = this.forStation(stationId);
    if (recipe.length === 0) return [];

    // remainingQty = original qty minus all prior scrap
    const remaining = (wo.qty || 0) - (wo.scrap || 0);
    if (remaining <= 0) return [];

    return recipe.map(mat => {
      const wh = Q.wh(mat.whId);
      const item = wh ? wh.items.find(i => i.sku === mat.sku) : null;
      const qtyRequired = +(mat.qtyPerUnit * remaining).toFixed(4);
      const qtyAvailable = item ? +item.qty.toFixed(4) : 0;
      return {
        sku: mat.sku,
        name: mat.name,
        nameEn: mat.nameEn,
        whId: mat.whId,
        whCode: wh ? wh.code : '?',
        unit: mat.unit,
        recoverable: !!mat.recoverable,
        recoveryRate: mat.recoveryRate || 0,
        qtyPerUnit: mat.qtyPerUnit,
        remainingProductQty: remaining,
        qtyRequired,
        qtyAvailable,
        shortage: Math.max(0, +(qtyRequired - qtyAvailable).toFixed(4)),
        sufficient: qtyAvailable >= qtyRequired,
        itemExists: !!item,
      };
    });
  },

  // Check if all materials are available before allowing station start
  // Returns: { ok: boolean, errors: [{ sku, msg }] }
  validate(woId, stationId) {
    const required = this.calculateRequired(woId, stationId);
    if (required.length === 0) return { ok: true, errors: [], required: [] };

    const errors = [];
    for (const r of required) {
      if (!r.itemExists) {
        errors.push({ sku: r.sku, msg: `${State.lang === 'ar' ? 'المادة غير معرّفة في المخزن' : 'Material not registered in warehouse'}: ${r.sku}` });
      } else if (!r.sufficient) {
        errors.push({ sku: r.sku, msg: `${State.lang === 'ar' ? 'كمية غير كافية' : 'Insufficient stock'}: ${r.sku} (${State.lang === 'ar' ? 'مطلوب' : 'need'} ${fmt.num(r.qtyRequired)} ${r.unit}, ${State.lang === 'ar' ? 'متوفر' : 'have'} ${fmt.num(r.qtyAvailable)})` });
      }
    }
    return { ok: errors.length === 0, errors, required };
  },

  // Consume materials: deduct from warehouse + log stock_movement + log stationConsumption
  // Idempotent: checks if already consumed for this WO+station, skips if yes.
  // Returns: { ok: boolean, consumed: [{ sku, qty, unit }], error?: string }
  consume(woId, stationId) {
    const ar = State.lang === 'ar';
    const wo = Q.wo(woId);
    if (!wo) return { ok: false, error: 'WO not found' };

    // Idempotency check — already consumed?
    const existing = (State.data.stationConsumption || []).filter(
      c => c.woId === woId && c.stationId === stationId
    );
    if (existing.length > 0) {
      return { ok: true, consumed: existing, alreadyConsumed: true };
    }

    const v = this.validate(woId, stationId);
    if (!v.ok) return { ok: false, error: v.errors.map(e => e.msg).join(' | '), errors: v.errors };

    const consumed = [];
    if (!State.data.stationConsumption) State.data.stationConsumption = [];

    for (const r of v.required) {
      const wh = Q.wh(r.whId);
      if (!wh) continue;
      const item = wh.items.find(i => i.sku === r.sku);
      if (!item) continue;

      // Deduct from warehouse
      const before = item.qty;
      item.qty = +(item.qty - r.qtyRequired).toFixed(4);

      // Log stock movement (immutable audit)
      Movements.addStock({
        whId: r.whId,
        sku: r.sku,
        type: 'issue',
        qty: r.qtyRequired,
        ref: `${woId}/${stationId}`,
        notes: ar ? `صرف لـ ${stationId} (${woId})` : `Issued to ${stationId} (${woId})`,
      });

      // Log per-station consumption (for scrap calc later)
      State.data.stationConsumption.push({
        id: 'SC-' + Date.now() + '-' + Math.random().toString(36).slice(2, 7),
        woId, stationId, sku: r.sku,
        whId: r.whId,
        qtyConsumed: r.qtyRequired,
        qtyPerUnit: r.qtyPerUnit,
        unitsAtConsumption: r.remainingProductQty,
        unit: r.unit,
        recoverable: r.recoverable,
        recoveryRate: r.recoveryRate,
        ts: now(),
        by: State.user?.id,
      });

      consumed.push({ sku: r.sku, name: r.name, qty: r.qtyRequired, unit: r.unit, before, after: item.qty });
    }

    // Audit + ticker
    Audit.log('station_consume', 'WorkOrder', woId, { stationId, materials: consumed.length });
    Movements.add('info', `${ar ? '⚙ صرف مواد لمحطة' : '⚙ Materials consumed for'} ${stationId}: ${woId} (${consumed.length} ${ar ? 'مواد' : 'items'})`, { woId, stationId });

    // Cloud sync — push consumption records (fire and forget)
    if (typeof Repo !== 'undefined' && Repo.stationConsumption) {
      const newRecords = (State.data.stationConsumption || []).filter(c => c.woId === woId && c.stationId === stationId);
      newRecords.forEach(c => Repo.stationConsumption.insert(c).catch(e => console.error('[BOM consume sync]', e)));
    }

    State.save();
    return { ok: true, consumed };
  },

  // Get all consumption records for a WO (across all stations)
  forWO(woId) {
    return (State.data.stationConsumption || []).filter(c => c.woId === woId);
  },
};

/* ============ SEQUENCE ENGINE — MOC Buffer Sequencing ============ */
// Handles the K4 → Buffer → MOC → Packaging flow with batched sequences.
//
// Concept: After K4 finishes, the WO sits in AT_BUFFER with a "bufferedQty".
// MOC supervisor creates sequences (e.g. 1001-2000, 2001-3000) which flow
// through MOC inspection then Packaging in order. Once ALL sequences are
// either packaged or failed, the WO advances to AT_PMF.
//
// Math:
//   Total sequence qty <= wo.bufferedQty
//   wo.bufferedQty = wo.produced - wo.scrap_K1_to_K4
//   wo.totalPackaged = Σ(seq.packagedQty) for all passed sequences
//   wo.totalMOCScrap = Σ(seq.mocFailed) for all sequences

const SEQ = {
  // Get all sequences for a WO
  forWO(woId) {
    return (State.data.sequences || []).filter(s => s.woId === woId).sort((a,b) => a.startSerial - b.startSerial);
  },

  // Get total qty already allocated to sequences for this WO
  allocatedQty(woId) {
    return this.forWO(woId).reduce((sum, s) => sum + (s.qty || 0), 0);
  },

  // Get the highest endSerial for this WO (or 0 if none)
  lastEndSerial(woId) {
    const seqs = this.forWO(woId);
    if (seqs.length === 0) return null;
    return seqs.reduce((max, s) => Math.max(max, s.endSerial), 0);
  },

  // Get next start serial (lastEnd + 1, or baseSerial for first sequence)
  nextStartSerial(woId) {
    const last = this.lastEndSerial(woId);
    if (last !== null) return last + 1;
    return State.data.seqDefaults?.baseSerial || 1001;
  },

  // Buffered qty available to allocate to new sequences
  remainingBufferQty(woId) {
    const wo = Q.wo(woId);
    if (!wo) return 0;
    const buffered = wo.bufferedQty || (wo.produced - wo.scrap) || 0;
    return Math.max(0, buffered - this.allocatedQty(woId));
  },

  // Create a new sequence (validates qty doesn't exceed buffer)
  // Returns: { ok, seq?, error? }
  create(woId, qty) {
    const ar = State.lang === 'ar';
    const wo = Q.wo(woId);
    if (!wo) return { ok: false, error: 'WO not found' };
    if (wo.currentStage !== 'AT_BUFFER' && wo.currentStage !== 'AT_MOC' && wo.currentStage !== 'AT_PACKAGING') {
      return { ok: false, error: ar?'الـ WO ليس في IFA WH':'WO not in IFA WH' };
    }
    qty = parseInt(qty);
    if (!qty || qty <= 0) return { ok: false, error: ar?'الكمية يجب أن تكون موجبة':'Qty must be positive' };

    const remaining = this.remainingBufferQty(woId);
    if (qty > remaining) {
      return { ok: false, error: ar?`الكمية تتجاوز المتبقي (${remaining})`:`Qty exceeds remaining (${remaining})` };
    }

    if (!State.data.sequences) State.data.sequences = [];
    const startSerial = this.nextStartSerial(woId);
    const endSerial   = startSerial + qty - 1;
    const seqNum      = this.forWO(woId).length + 1;
    const seq = {
      id: `${woId}-SEQ-${String(seqNum).padStart(3, '0')}`,
      woId, qty,
      startSerial, endSerial,
      status: 'pending',           // pending → inspecting → passed | failed
      mocPassed: 0,
      mocFailed: 0,
      mocBy: null, mocAt: null, mocNotes: null,
      packagingStatus: 'waiting',  // waiting → received → packaged
      packagedQty: 0,
      packagedBy: null, packagedAt: null,
      createdBy: State.user?.id,
      createdAt: now(),
    };
    State.data.sequences.push(seq);

    Audit.log('seq_create', 'Sequence', seq.id, { qty, startSerial, endSerial });
    Movements.add('info', `📦 ${ar?'تم إنشاء سيكوينس':'Sequence created'}: ${seq.id} (${startSerial}-${endSerial}, ${qty} ${ar?'وحدة':'units'})`, { woId, seqId: seq.id });
    State.save();

    if (typeof Repo !== 'undefined' && Repo.sequences) {
      Repo.sequences.upsert(seq).catch(e => console.error('[SEQ create sync]', e));
    }
    return { ok: true, seq };
  },

  // MOC starts inspecting a sequence
  startMOC(seqId) {
    const ar = State.lang === 'ar';
    const seq = (State.data.sequences || []).find(s => s.id === seqId);
    if (!seq) return { ok: false, error: 'Sequence not found' };
    if (seq.status !== 'pending') return { ok: false, error: ar?'السيكوينس ليس في حالة pending':'Sequence not pending' };
    seq.status = 'inspecting';
    seq.mocStartedAt = now();
    seq.mocBy = State.user?.id;
    Audit.log('seq_moc_start', 'Sequence', seqId, {});
    Movements.add('info', `🔍 ${ar?'بدء فحص MOC':'MOC started'}: ${seqId}`, { seqId, woId: seq.woId });
    State.save();
    if (typeof Repo !== 'undefined' && Repo.sequences) Repo.sequences.upsert(seq).catch(e=>console.error(e));
    return { ok: true, seq };
  },

  // MOC completes inspection — passes/fails counts (failed = scrap inside the seq)
  completeMOC(seqId, passed, failed, notes) {
    const ar = State.lang === 'ar';
    const seq = (State.data.sequences || []).find(s => s.id === seqId);
    if (!seq) return { ok: false, error: 'Sequence not found' };
    if (seq.status !== 'inspecting') return { ok: false, error: ar?'يجب بدء الفحص أولاً':'Must start inspection first' };
    passed = parseInt(passed) || 0;
    failed = parseInt(failed) || 0;
    if (passed + failed > seq.qty) {
      return { ok: false, error: ar?`المجموع (${passed+failed}) أكبر من حجم السيكوينس (${seq.qty})`:`Sum exceeds seq qty (${seq.qty})` };
    }
    if (passed + failed < seq.qty) {
      return { ok: false, error: ar?`المجموع يجب أن يساوي حجم السيكوينس (${seq.qty})`:`Sum must equal seq qty (${seq.qty})` };
    }

    seq.mocPassed = passed;
    seq.mocFailed = failed;
    seq.mocNotes = notes || '';
    seq.mocAt = now();
    seq.status = passed > 0 ? 'passed' : 'failed';

    // Apply MOC scrap with full material accounting (across K1-K4 BOMs)
    if (failed > 0) {
      Scrap.applyMOCScrap(seq.woId, failed, {
        reason: notes || `MOC failure on ${seqId}`,
        sequenceId: seqId,
      });
      // Track on WO for quick access (Scrap.applyMOCScrap already added to wo.scrap)
      const wo = Q.wo(seq.woId);
      if (wo) wo.totalMOCScrap = (wo.totalMOCScrap || 0) + failed;
    }

    Audit.log('seq_moc_complete', 'Sequence', seqId, { passed, failed, status: seq.status });
    Movements.add(seq.status==='passed'?'ok':'warn',
      `🔍 ${ar?'انتهاء فحص MOC':'MOC done'}: ${seqId} — ${passed}/${seq.qty} ${ar?'مقبول':'pass'}, ${failed} ${ar?'مرفوض':'fail'}`,
      { seqId, woId: seq.woId });
    State.save();
    if (typeof Repo !== 'undefined' && Repo.sequences) Repo.sequences.upsert(seq).catch(e=>console.error(e));

    // If sequence fully failed, may complete the WO (no packaging needed for it)
    if (seq.status === 'failed') this._checkWOComplete(seq.woId);
    return { ok: true, seq };
  },

  // Packaging picks up a passed sequence
  startPackaging(seqId) {
    const ar = State.lang === 'ar';
    const seq = (State.data.sequences || []).find(s => s.id === seqId);
    if (!seq) return { ok: false, error: 'Sequence not found' };
    if (seq.status !== 'passed') return { ok: false, error: ar?'السيكوينس لم يجتز MOC':'Sequence not passed' };
    if (seq.packagingStatus !== 'waiting') return { ok: false, error: ar?'السيكوينس بدأ تغليفه مسبقاً':'Already started' };
    seq.packagingStatus = 'received';
    seq.packagingStartedAt = now();
    seq.packagedBy = State.user?.id;
    Audit.log('seq_pkg_start', 'Sequence', seqId, {});
    Movements.add('info', `📦 ${ar?'بدء تغليف':'Packaging started'}: ${seqId}`, { seqId, woId: seq.woId });
    State.save();
    if (typeof Repo !== 'undefined' && Repo.sequences) Repo.sequences.upsert(seq).catch(e=>console.error(e));
    return { ok: true, seq };
  },

  // Packaging completes — packagedQty must equal mocPassed
  completePackaging(seqId, packagedQty) {
    const ar = State.lang === 'ar';
    const seq = (State.data.sequences || []).find(s => s.id === seqId);
    if (!seq) return { ok: false, error: 'Sequence not found' };
    if (seq.packagingStatus !== 'received') return { ok: false, error: ar?'يجب بدء التغليف أولاً':'Must start packaging first' };
    packagedQty = parseInt(packagedQty);
    if (packagedQty !== seq.mocPassed) {
      return { ok: false, error: ar?`الكمية المغلَّفة (${packagedQty}) يجب أن تساوي ما اجتاز MOC (${seq.mocPassed})`:`Packaged (${packagedQty}) must equal MOC pass (${seq.mocPassed})` };
    }
    seq.packagedQty = packagedQty;
    seq.packagingStatus = 'packaged';
    seq.packagedAt = now();
    Audit.log('seq_pkg_complete', 'Sequence', seqId, { packagedQty });
    Movements.add('ok', `✓ ${ar?'تم تغليف':'Packaged'}: ${seqId} — ${packagedQty} ${ar?'وحدة':'units'}`, { seqId, woId: seq.woId });
    State.save();
    if (typeof Repo !== 'undefined' && Repo.sequences) Repo.sequences.upsert(seq).catch(e=>console.error(e));

    // Auto-advance check: if all sequences done AND remaining buffer = 0 → move WO to AT_PMF
    this._checkWOComplete(seq.woId);
    return { ok: true, seq };
  },

  // Check if all sequences for a WO are finalized → advance to PMF
  _checkWOComplete(woId) {
    const wo = Q.wo(woId);
    if (!wo) return;
    if (wo.currentStage !== 'AT_BUFFER' && wo.currentStage !== 'AT_MOC' && wo.currentStage !== 'AT_PACKAGING') return;
    const seqs = this.forWO(woId);
    if (seqs.length === 0) return;
    const allDone = seqs.every(s => s.packagingStatus === 'packaged' || s.status === 'failed');
    const remaining = this.remainingBufferQty(woId);
    if (allDone && remaining === 0) {
      // Calculate totals
      wo.totalPackaged = seqs.reduce((sum, s) => sum + (s.packagedQty || 0), 0);
      wo.produced = wo.totalPackaged; // final produced count = total packaged
      // Advance directly to AT_PMF (skip buffer/moc/packaging stages)
      const ar = State.lang === 'ar';
      wo.history.push({
        stage: 'AT_PMF',
        action: 'auto_advance_after_sequences',
        fromUser: State.user?.id, toUser: Q.ownerOfStage('AT_PMF'),
        qty: wo.totalPackaged, scrap: wo.totalMOCScrap || 0,
        ts: now(),
        notes: ar?`اكتمل تغليف جميع الـ sequences (${seqs.length})`:`All sequences packaged (${seqs.length})`
      });
      wo.currentStage = 'AT_PMF';
      wo.currentOwner = Q.ownerOfStage('AT_PMF');
      Audit.log('wo_seq_complete', 'WorkOrder', woId, { sequences: seqs.length, totalPackaged: wo.totalPackaged });
      Movements.add('ok', `🎉 ${ar?'اكتملت كل sequences':'All sequences done'}: ${woId} → PMF (${wo.totalPackaged} ${ar?'وحدة':'units'})`, { woId });
      State.save();
    }
  },

  // Mark WO as entering buffer (called from K4 advance)
  enterBuffer(woId) {
    const wo = Q.wo(woId);
    if (!wo) return;
    // bufferedQty = produced minus all prior scrap
    wo.bufferedQty = (wo.produced || wo.qty || 0) - (wo.scrap || 0);
    Audit.log('seq_buffer_entered', 'WorkOrder', woId, { bufferedQty: wo.bufferedQty });
  },
};

/* ============ SCRAP ENGINE — Re-Cancellation with Material Recovery ============ */
// Handles scrap recording at any station with proper material accounting:
// - Calculates what materials were consumed for the scrapped units
// - Recoverable materials (e.g. gold) get returned to stock at recoveryRate
// - Non-recoverable materials are logged as scrap_loss
// - Maintains scrap_log audit trail per WO/station
//
// Math:
//   For each material in BOM[stationId]:
//     consumedForScrap = qtyPerUnit × scrapQty
//     if recoverable:
//       recovered = consumedForScrap × recoveryRate
//       lost      = consumedForScrap − recovered
//     else:
//       recovered = 0
//       lost      = consumedForScrap

const Scrap = {
  // Calculate the impact of scrapping `scrapQty` units at `stationId` for `woId`
  // Returns: { ok, materials: [{ sku, name, consumed, recovered, lost, recoverable, whId, unit }], totals: { recovered, lost } }
  // Does NOT mutate anything — pure calculation for preview/UI
  calculate(woId, stationId, scrapQty) {
    const wo = Q.wo(woId);
    if (!wo) return { ok: false, error: 'WO not found' };
    scrapQty = +scrapQty;
    if (!scrapQty || scrapQty <= 0) return { ok: false, error: 'Scrap qty must be positive' };

    const recipe = BOM.forStation(stationId);
    if (recipe.length === 0) {
      // No BOM → no material accounting (scrap is just qty tracking)
      return { ok: true, materials: [], totals: { recovered: 0, lost: 0 }, noBom: true };
    }

    const materials = recipe.map(m => {
      const consumed = +(m.qtyPerUnit * scrapQty).toFixed(4);
      let recovered = 0;
      let lost = consumed;
      if (m.recoverable) {
        const rate = +(m.recoveryRate || 0);
        recovered = +(consumed * rate).toFixed(4);
        lost = +(consumed - recovered).toFixed(4);
      }
      return {
        sku: m.sku,
        name: m.name,
        nameEn: m.nameEn,
        whId: m.whId,
        unit: m.unit,
        recoverable: !!m.recoverable,
        recoveryRate: m.recoveryRate || 0,
        qtyPerUnit: m.qtyPerUnit,
        consumed, recovered, lost,
      };
    });

    return {
      ok: true,
      materials,
      totals: {
        recovered: materials.reduce((s, m) => s + m.recovered, 0),
        lost: materials.reduce((s, m) => s + m.lost, 0),
      }
    };
  },

  // Apply scrap with material accounting:
  //   1. Add scrapQty to wo.scrap
  //   2. For each BOM material: log recovery + loss to stock_movements
  //   3. Return recoverable materials to warehouse stock
  //   4. Log to scrap_log for audit
  // opts: { reason, sequenceId? (for MOC scrap) }
  // Returns: { ok, log, materials, totals }
  apply(woId, stationId, scrapQty, opts = {}) {
    const ar = State.lang === 'ar';
    const wo = Q.wo(woId);
    if (!wo) return { ok: false, error: 'WO not found' };

    const calc = this.calculate(woId, stationId, scrapQty);
    if (!calc.ok) return calc;

    // Update WO counters
    // Re-cancellation: scrap reduces both the scrap tally AND the produced count
    // wo.produced represents the current "good unit" count flowing through stations
    wo.scrap = (wo.scrap || 0) + scrapQty;
    const currentProduced = (wo.produced != null && wo.produced > 0) ? wo.produced : (wo.qty || 0);
    wo.produced = Math.max(0, currentProduced - scrapQty);
    wo.totalRecovered = +((wo.totalRecovered || 0) + calc.totals.recovered).toFixed(4);
    wo.totalScrapLoss = +((wo.totalScrapLoss || 0) + calc.totals.lost).toFixed(4);

    // Process each material — return recoverable to warehouse + log movements
    for (const m of calc.materials) {
      const wh = Q.wh(m.whId);
      if (!wh) continue;
      const item = wh.items.find(i => i.sku === m.sku);

      // Recovery: return to warehouse
      if (m.recovered > 0 && item) {
        const before = item.qty;
        item.qty = +(item.qty + m.recovered).toFixed(4);
        Movements.addStock({
          whId: m.whId, sku: m.sku, type: 'recovery', qty: m.recovered,
          ref: `${woId}/${stationId}/scrap`,
          notes: ar
            ? `استرداد ${fmt.num(m.recovered)} ${m.unit} من scrap في ${stationId} (${fmt.num((m.recoveryRate||0)*100)}%)`
            : `Recovered ${fmt.num(m.recovered)} ${m.unit} from scrap at ${stationId} (${fmt.num((m.recoveryRate||0)*100)}%)`,
        });
      }

      // Loss: log as scrap_loss (no warehouse change — already deducted at consume time)
      if (m.lost > 0) {
        Movements.addStock({
          whId: m.whId, sku: m.sku, type: 'scrap_loss', qty: m.lost,
          ref: `${woId}/${stationId}/scrap`,
          notes: ar
            ? `فقد بسبب scrap في ${stationId}: ${scrapQty} ${ar?'وحدة':'unit'}`
            : `Lost due to scrap at ${stationId}: ${scrapQty} units`,
        });
      }
    }

    // Log scrap entry
    if (!State.data.scrapLog) State.data.scrapLog = [];
    const log = {
      id: 'SCR-' + Date.now() + '-' + Math.random().toString(36).slice(2, 7),
      woId, stationId, scrapQty,
      sequenceId: opts.sequenceId || null,
      reason: opts.reason || '',
      materials: calc.materials.map(m => ({
        sku: m.sku, consumed: m.consumed, recovered: m.recovered, lost: m.lost,
        recoverable: m.recoverable, recoveryRate: m.recoveryRate, unit: m.unit,
      })),
      totalRecovered: calc.totals.recovered,
      totalLost: calc.totals.lost,
      ts: now(),
      by: State.user?.id,
    };
    State.data.scrapLog.push(log);

    Audit.log('scrap_apply', 'WorkOrder', woId, {
      stationId, scrapQty,
      recovered: calc.totals.recovered, lost: calc.totals.lost
    });

    Movements.add(
      calc.totals.recovered > 0 ? 'warn' : 'error',
      `🔻 ${ar?'Scrap في':'Scrap at'} ${stationId}: ${woId} — ${fmt.num(scrapQty)} ${ar?'وحدة':'units'}` +
      (calc.totals.recovered > 0 ? ` · ${ar?'مُسترد:':'recovered:'} ${fmt.num(calc.totals.recovered)}` : ''),
      { woId, stationId, scrapQty }
    );

    State.save();

    // Cloud sync
    if (typeof Repo !== 'undefined' && Repo.scrapLog) {
      Repo.scrapLog.insert(log).catch(e => console.error('[Scrap apply sync]', e));
    }

    return { ok: true, log, materials: calc.materials, totals: calc.totals };
  },

  // Get scrap log entries for a WO
  forWO(woId) {
    return (State.data.scrapLog || []).filter(s => s.woId === woId).sort((a,b) => a.ts - b.ts);
  },

  // Total scrapped qty for WO (sum across all stations)
  totalScrap(woId) {
    return this.forWO(woId).reduce((sum, s) => sum + (s.scrapQty || 0), 0);
  },

  // Scrap breakdown by station
  byStation(woId) {
    const result = {};
    for (const log of this.forWO(woId)) {
      if (!result[log.stationId]) result[log.stationId] = { qty: 0, recovered: 0, lost: 0 };
      result[log.stationId].qty += log.scrapQty;
      result[log.stationId].recovered += log.totalRecovered;
      result[log.stationId].lost += log.totalLost;
    }
    return result;
  },

  // Apply scrap discovered at MOC — these units passed through ALL stations (K1-K4),
  // so materials from every station with a BOM are accounted for.
  // This is different from per-station scrap (which only counts that station's BOM).
  // opts: { reason, sequenceId }
  // Returns: { ok, log, materials, totals }
  applyMOCScrap(woId, scrapQty, opts = {}) {
    const ar = State.lang === 'ar';
    const wo = Q.wo(woId);
    if (!wo) return { ok: false, error: 'WO not found' };
    scrapQty = +scrapQty;
    if (!scrapQty || scrapQty <= 0) return { ok: false, error: 'Scrap qty must be positive' };

    // Aggregate materials across all production stations (K1, K2, K3, K4)
    // For each station, calculate per-material consumed/recovered/lost
    const stations = ['K1', 'K2', 'K3', 'K4'];
    const allMaterials = [];
    for (const stId of stations) {
      const calc = this.calculate(woId, stId, scrapQty);
      if (!calc.ok || calc.noBom) continue;
      for (const m of calc.materials) {
        allMaterials.push({ ...m, fromStation: stId });
      }
    }

    if (allMaterials.length === 0) {
      // No BOMs at all — fall back to plain scrap counting
      wo.scrap = (wo.scrap || 0) + scrapQty;
      State.save();
      return { ok: true, log: null, materials: [], totals: { recovered: 0, lost: 0 }, noBom: true };
    }

    // Apply each material the same way Scrap.apply does
    let totalRecovered = 0;
    let totalLost = 0;
    for (const m of allMaterials) {
      const wh = Q.wh(m.whId);
      if (!wh) continue;
      const item = wh.items.find(i => i.sku === m.sku);

      if (m.recovered > 0 && item) {
        item.qty = +(item.qty + m.recovered).toFixed(4);
        Movements.addStock({
          whId: m.whId, sku: m.sku, type: 'recovery', qty: m.recovered,
          ref: `${woId}/MOC/${m.fromStation}/scrap`,
          notes: ar
            ? `استرداد من scrap MOC (مستهلك في ${m.fromStation}, ${fmt.num((m.recoveryRate||0)*100)}%)`
            : `Recovered from MOC scrap (consumed at ${m.fromStation}, ${fmt.num((m.recoveryRate||0)*100)}%)`,
        });
        totalRecovered += m.recovered;
      }
      if (m.lost > 0) {
        Movements.addStock({
          whId: m.whId, sku: m.sku, type: 'scrap_loss', qty: m.lost,
          ref: `${woId}/MOC/${m.fromStation}/scrap`,
          notes: ar
            ? `فقد بسبب scrap في MOC (مستهلك في ${m.fromStation})`
            : `Lost due to MOC scrap (consumed at ${m.fromStation})`,
        });
        totalLost += m.lost;
      }
    }

    totalRecovered = +totalRecovered.toFixed(4);
    totalLost = +totalLost.toFixed(4);

    // Update WO with re-cancellation (decrement produced)
    wo.scrap = (wo.scrap || 0) + scrapQty;
    const currentProduced = (wo.produced != null && wo.produced > 0) ? wo.produced : (wo.qty || 0);
    wo.produced = Math.max(0, currentProduced - scrapQty);
    wo.totalRecovered = +((wo.totalRecovered || 0) + totalRecovered).toFixed(4);
    wo.totalScrapLoss = +((wo.totalScrapLoss || 0) + totalLost).toFixed(4);

    // Log
    if (!State.data.scrapLog) State.data.scrapLog = [];
    const log = {
      id: 'SCR-' + Date.now() + '-' + Math.random().toString(36).slice(2, 7),
      woId, stationId: 'MOC', scrapQty,
      sequenceId: opts.sequenceId || null,
      reason: opts.reason || '',
      // Group materials by station for clarity in the audit
      materials: allMaterials.map(m => ({
        sku: m.sku, fromStation: m.fromStation,
        consumed: m.consumed, recovered: m.recovered, lost: m.lost,
        recoverable: m.recoverable, recoveryRate: m.recoveryRate, unit: m.unit,
      })),
      totalRecovered, totalLost,
      ts: now(), by: State.user?.id,
    };
    State.data.scrapLog.push(log);

    Audit.log('scrap_moc', 'WorkOrder', woId, { scrapQty, recovered: totalRecovered, lost: totalLost });
    Movements.add('warn',
      `🔻 ${ar?'Scrap من MOC':'MOC scrap'}: ${woId} — ${fmt.num(scrapQty)} ${ar?'وحدة':'units'}` +
      (totalRecovered > 0 ? ` · ${ar?'مُسترد:':'recovered:'} ${fmt.num(totalRecovered)}` : ''),
      { woId, stationId: 'MOC', scrapQty }
    );

    State.save();
    if (typeof Repo !== 'undefined' && Repo.scrapLog) {
      Repo.scrapLog.insert(log).catch(e => console.error('[Scrap MOC sync]', e));
    }
    return { ok: true, log, materials: allMaterials, totals: { recovered: totalRecovered, lost: totalLost } };
  },
};

/* ============ WORKFLOW ENGINE ============ */
const WF = {
  // Move WO to next stage with full audit
  advance(woId, opts = {}) {
    const wo = Q.wo(woId);
    if (!wo) return false;
    let next = nextStage(wo.currentStage);
    if (!next) { toast(State.lang === 'ar' ? 'لا توجد مرحلة تالية' : 'No next stage', 'warn'); return false; }
    if (!Perm.canActOnWO(wo)) { toast(t('no_perm'), 'error'); return false; }

    const ar = State.lang === 'ar';

    // Block manual advance through sequence-driven stages (AT_BUFFER, AT_MOC, AT_PACKAGING)
    // These advance automatically when SEQ._checkWOComplete fires.
    if (!opts.bypassSeq && (wo.currentStage === 'AT_BUFFER' || wo.currentStage === 'AT_MOC' || wo.currentStage === 'AT_PACKAGING')) {
      const seqs = SEQ.forWO(woId);
      const allDone = seqs.length > 0 && seqs.every(s => s.packagingStatus === 'packaged' || s.status === 'failed');
      if (!allDone) {
        toast(ar?'لا يمكن الانتقال يدوياً — أنشئ sequences وأكمل MOC والتغليف أولاً':'Cannot advance manually — finish all sequences via MOC and packaging first', 'error');
        return false;
      }
    }

    // If next is AT_COMMITTEE but committee is disabled, skip it
    if (next === 'AT_COMMITTEE' && !State.data.committee?.enabled) {
      next = nextStage('AT_COMMITTEE'); // = DELIVERED
    }

    // CRITICAL FIX: Apply scrap BEFORE BOM consume so next station consumes for the
    // correct remaining qty (qty - scrap), not the original qty.
    // This is the re-cancellation logic — scrapped units don't carry materials forward.
    if (opts.scrap && opts.scrap > 0) {
      const prevStage = wo.currentStage; // current = the station the scrap happened at
      const stationFromStage = prevStage && prevStage.startsWith('AT_K') ? prevStage.replace('AT_', '') : null;
      if (stationFromStage && BOM.forStation(stationFromStage).length > 0) {
        Scrap.apply(woId, stationFromStage, opts.scrap, { reason: opts.notes || 'advance with scrap' });
      } else {
        // No BOM for this station — just count scrap qty without material accounting
        wo.scrap = (wo.scrap || 0) + opts.scrap;
        const currentProduced = (wo.produced != null && wo.produced > 0) ? wo.produced : (wo.qty || 0);
        wo.produced = Math.max(0, currentProduced - opts.scrap);
      }
    }
    // Mark that scrap was already applied to avoid double-counting later
    const scrapAlreadyApplied = !!(opts.scrap && opts.scrap > 0);

    // BOM consumption check — when entering a station that has a recipe, validate + consume
    // Triggered for AT_K1, AT_K2, AT_K3, AT_K4 — uses opts.skipBOM to bypass (e.g. on rework)
    const stationIdForStage = next.startsWith('AT_K') ? next.replace('AT_', '') : null;
    if (stationIdForStage && !opts.skipBOM) {
      const recipe = BOM.forStation(stationIdForStage);
      if (recipe.length > 0) {
        const validation = BOM.validate(woId, stationIdForStage);
        if (!validation.ok) {
          const msg = ar
            ? `لا يمكن البدء — مواد ناقصة:\n${validation.errors.map(e => '• ' + e.msg).join('\n')}`
            : `Cannot start — missing materials:\n${validation.errors.map(e => '• ' + e.msg).join('\n')}`;
          toast(msg, 'error');
          return false;
        }
        // Consume materials (idempotent)
        const result = BOM.consume(woId, stationIdForStage);
        if (!result.ok) {
          toast(result.error || (ar ? 'فشل صرف المواد' : 'Material consumption failed'), 'error');
          return false;
        }
      }
    }

    // When advancing INTO AT_BUFFER (i.e. K4 finishing) — calculate bufferedQty
    if (next === 'AT_BUFFER') {
      // Use current wo.produced (already adjusted for scrap above)
      wo.bufferedQty = (wo.produced != null && wo.produced > 0) ? wo.produced : ((wo.qty || 0) - (wo.scrap || 0));
    }

    const fromUser = State.user.id;
    const toUser = Q.ownerOfStage(next);
    const qty = opts.qty != null ? opts.qty : wo.produced || wo.qty;
    const scrap = opts.scrap || 0;

    wo.history.push({
      stage: next,
      action: opts.action || 'handover',
      fromUser, toUser,
      qty, scrap,
      ts: now(),
      notes: opts.notes || ''
    });
    wo.currentStage = next;
    wo.currentOwner = toUser;
    // Scrap was already applied above (before BOM consume).
    // Only set produced if explicitly passed AND scrap wasn't already handled
    // (scrap path already updates produced via Scrap.apply)
    if (opts.qty != null && !scrapAlreadyApplied) wo.produced = opts.qty;

    Audit.log('advance_wo', 'WorkOrder', woId, { from: stageById(wo.history[wo.history.length-2]?.stage)?.id, to: next, qty, scrap });
    Movements.add('ok', `${woId} → ${stageById(next).name} (${fmt.num(qty)} قطعة)`, { woId, stage: next });
    State.save();
    return true;
  },

  reject(woId, qtyAccepted, qtyRejected, notes) {
    const wo = Q.wo(woId);
    if (!wo) return false;
    if (wo.currentStage !== 'AT_MOC') { toast(State.lang==='ar'?'لا يمكن الرفض من هذه المرحلة':'Cannot reject from this stage', 'error'); return false; }
    if (!Perm.canActOnWO(wo)) { toast(t('no_perm'), 'error'); return false; }

    wo.history.push({
      stage: 'REJECTED', action: 'reject',
      fromUser: State.user.id, toUser: null,
      qty: qtyRejected, scrap: qtyRejected,
      ts: now(),
      notes: notes || `قبول ${qtyAccepted} ورفض ${qtyRejected}`,
    });
    wo.currentStage = 'REJECTED';
    wo.currentOwner = null;
    wo.scrap = (wo.scrap || 0) + qtyRejected;
    Audit.log('reject_wo', 'WorkOrder', woId, { accepted: qtyAccepted, rejected: qtyRejected, notes });
    Movements.add('err', `${woId} مرفوض من MOC — ${qtyRejected} قطعة scrap`, { woId });
    State.save();
    return true;
  },

  acceptMOC(woId, qty, scrap, notes) {
    const wo = Q.wo(woId);
    if (!wo || wo.currentStage !== 'AT_MOC') return false;
    if (!Perm.canActOnWO(wo)) { toast(t('no_perm'), 'error'); return false; }
    const toUser = Q.ownerOfStage('AT_PMF');
    wo.history.push({
      stage: 'AT_PMF', action: 'accept',
      fromUser: State.user.id, toUser,
      qty, scrap: scrap || 0, ts: now(),
      notes: notes || 'قبول MOC، نقل PMF',
    });
    wo.currentStage = 'AT_PMF';
    wo.currentOwner = toUser;
    if (scrap) wo.scrap = (wo.scrap || 0) + scrap;
    wo.produced = qty;
    Audit.log('moc_accept', 'WorkOrder', woId, { qty, scrap });
    Movements.add('ok', `${woId} قبول MOC ✓ — ${fmt.num(qty)} قطعة → PMF`, { woId });
    State.save();
    return true;
  }
};

/* ============ DYNAMIC VISUALIZATION HELPERS (Phase 1.4a-viz) ============ */

// Counter animation: smoothly tween a numeric DOM element from old to new value
const Animate = {
  counter(el, fromVal, toVal, opts = {}) {
    if (!el || fromVal === toVal) return;
    const duration = opts.duration || 700;
    const formatter = opts.formatter || (v => fmt.num(v));
    const start = performance.now();
    const diff = toVal - fromVal;
    const ease = (t) => 1 - Math.pow(1 - t, 3); // ease-out cubic
    function step(now) {
      const t = Math.min(1, (now - start) / duration);
      const v = fromVal + diff * ease(t);
      el.textContent = formatter(v);
      if (t < 1) requestAnimationFrame(step);
      else {
        el.textContent = formatter(toVal);
        el.classList.add('counter-pulse');
        setTimeout(() => el.classList.remove('counter-pulse'), 700);
      }
    }
    requestAnimationFrame(step);
  },
  pct(el, fromVal, toVal, opts = {}) {
    this.counter(el, fromVal, toVal, { ...opts, formatter: v => v.toFixed(opts.decimals||1) + '%' });
  }
};

// Track historical snapshots for time-series charts
const History = {
  push() {
    if (!State.data.history) State.data.history = { hourly: [], daily: [] };
    const wos = State.data.workOrders;
    const now = Date.now();
    const totalProduced = wos.reduce((s,w) => s + (w.produced||0), 0);
    const totalScrap = wos.reduce((s,w) => s + (w.scrap||0), 0);
    const snap = {
      ts: now,
      produced: totalProduced,
      scrap: totalScrap,
      activeWO: wos.filter(w => !['DELIVERED','REJECTED'].includes(w.currentStage)).length,
      stationsRunning: State.data.stations.filter(s => s.status === 'running').length,
    };
    // Keep last 24 hourly snapshots (one per hour)
    const lastHour = State.data.history.hourly.slice(-1)[0];
    if (!lastHour || (now - lastHour.ts) > 3600000) {
      State.data.history.hourly.push(snap);
      if (State.data.history.hourly.length > 24) State.data.history.hourly.shift();
    } else {
      // Update last entry if within same hour
      State.data.history.hourly[State.data.history.hourly.length - 1] = snap;
    }
  },
  // Synthesize 24h of hourly data on first run so charts have something to show
  seed() {
    if (!State.data.history) State.data.history = { hourly: [], daily: [] };
    if (State.data.history.hourly.length >= 6) return;
    const now = Date.now();
    const baseProduced = 11200;
    for (let i = 23; i >= 0; i--) {
      const ts = now - i * 3600000;
      // Realistic production curve with night dip
      const hour = new Date(ts).getHours();
      const intensity = (hour >= 22 || hour < 6) ? 0.2 + Math.random()*0.1
                      : (hour >= 8 && hour < 17) ? 0.85 + Math.random()*0.15
                      : 0.5 + Math.random()*0.2;
      State.data.history.hourly.push({
        ts,
        produced: Math.round(baseProduced + (24-i) * 180 * intensity + Math.random()*60),
        scrap: Math.round(40 + i * 0.8 + Math.random()*8),
        activeWO: 2 + Math.floor(Math.random() * 3),
        stationsRunning: hour >= 8 && hour < 17 ? 4 : 2,
      });
    }
  }
};

/* ============ CHART BUILDERS (vanilla SVG) ============ */
const Chart = {

  // Line chart with area fill — for throughput/scrap trend
  line(data, opts = {}) {
    if (!data || data.length === 0) return '<div class="empty-state" style="padding:30px">لا توجد بيانات</div>';
    const w = opts.width || 400, h = opts.height || 130;
    const pad = { top: 10, right: 10, bottom: 22, left: 32 };
    const innerW = w - pad.left - pad.right;
    const innerH = h - pad.top - pad.bottom;
    const xs = data.map((_,i) => i);
    const ys = data.map(d => d.value);
    const minY = 0;
    const maxY = Math.max(...ys, 1) * 1.1;
    const xScale = (i) => pad.left + (i / Math.max(1, data.length-1)) * innerW;
    const yScale = (v) => pad.top + innerH - ((v - minY) / (maxY - minY)) * innerH;

    const points = data.map((d,i) => `${xScale(i)},${yScale(d.value)}`).join(' ');
    const areaPath = `M ${xScale(0)},${yScale(0)} L ${data.map((d,i) => `${xScale(i)},${yScale(d.value)}`).join(' L ')} L ${xScale(data.length-1)},${yScale(0)} Z`;
    const linePath = `M ${data.map((d,i) => `${xScale(i)},${yScale(d.value)}`).join(' L ')}`;

    // Gridlines (3 horizontal)
    const gridLines = [0.25, 0.5, 0.75].map(p => {
      const y = pad.top + innerH * p;
      return `<line class="chart-grid-line" x1="${pad.left}" x2="${pad.left+innerW}" y1="${y}" y2="${y}"/>`;
    }).join('');

    // Y axis labels
    const yLabels = [0, 0.5, 1].map(p => {
      const v = minY + (maxY - minY) * (1 - p);
      const y = pad.top + innerH * p;
      return `<text class="chart-label" x="${pad.left-5}" y="${y+3}" text-anchor="end">${fmt.num(v)}</text>`;
    }).join('');

    // X axis labels (first, mid, last)
    const xLabelsIdx = [0, Math.floor(data.length/2), data.length-1];
    const xLabels = xLabelsIdx.map(i => {
      if (!data[i]) return '';
      return `<text class="chart-label" x="${xScale(i)}" y="${h-5}" text-anchor="middle">${escapeHTML(data[i].label||'')}</text>`;
    }).join('');

    // Last value marker
    const lastIdx = data.length-1;
    const marker = `<circle cx="${xScale(lastIdx)}" cy="${yScale(data[lastIdx].value)}" r="4" fill="var(--gold)" stroke="var(--bg-1)" stroke-width="2"/>`;

    return `<svg class="chart-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
      <defs>
        <linearGradient id="goldArea" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="var(--gold)" stop-opacity="0.4"/>
          <stop offset="100%" stop-color="var(--gold)" stop-opacity="0"/>
        </linearGradient>
      </defs>
      ${gridLines}
      ${yLabels}
      <path class="chart-area" d="${areaPath}"/>
      <path class="chart-line" d="${linePath}"/>
      ${marker}
      ${xLabels}
    </svg>`;
  },

  // Donut chart for stage distribution
  donut(segments, opts = {}) {
    const total = segments.reduce((s,seg) => s + seg.value, 0);
    if (total === 0) {
      return `<svg class="chart-svg" viewBox="0 0 200 130">
        <circle cx="100" cy="65" r="42" fill="none" stroke="var(--border)" stroke-width="12"/>
        <text class="donut-center-value" x="100" y="68" text-anchor="middle">0</text>
        <text class="donut-center-label" x="100" y="84" text-anchor="middle">${opts.centerLabel||'لا توجد'}</text>
      </svg><div class="donut-legend"></div>`;
    }
    const cx = 100, cy = 65, r = 42, strokeW = 12;
    const circumference = 2 * Math.PI * r;
    let cumPct = 0;
    const arcs = segments.map((seg, i) => {
      const pct = seg.value / total;
      const dasharray = `${pct * circumference} ${circumference}`;
      const offset = -cumPct * circumference;
      cumPct += pct;
      return `<circle class="donut-segment" cx="${cx}" cy="${cy}" r="${r}" fill="none"
        stroke="${seg.color||'var(--gold)'}" stroke-width="${strokeW}"
        stroke-dasharray="${dasharray}" stroke-dashoffset="${offset}"
        transform="rotate(-90 ${cx} ${cy})"/>`;
    }).join('');

    const centerVal = opts.centerValue != null ? opts.centerValue : total;
    const legend = segments.filter(s => s.value > 0).map(s => `<span class="donut-legend-item" style="--legend-color:${s.color}">${escapeHTML(s.label)} <b style="color:var(--text)">${s.value}</b></span>`).join('');

    return `<svg class="chart-svg" viewBox="0 0 200 130">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="${strokeW}"/>
      ${arcs}
      <text class="donut-center-value" x="${cx}" y="${cy+5}" text-anchor="middle">${fmt.num(centerVal)}</text>
      <text class="donut-center-label" x="${cx}" y="${cy+22}" text-anchor="middle">${escapeHTML(opts.centerLabel||'')}</text>
    </svg>
    <div class="donut-legend">${legend}</div>`;
  },

  // Gauge chart for OEE / health score
  gauge(value, opts = {}) {
    const max = opts.max || 100;
    const v = Math.max(0, Math.min(max, value));
    const pct = v / max;
    const cx = 100, cy = 80, r = 50;
    // Half circle from 180° to 360°
    const arcLen = Math.PI * r; // semicircle circumference
    const dashArray = `${arcLen * pct} ${arcLen}`;
    const cls = pct >= 0.85 ? 'good' : pct >= 0.6 ? '' : pct >= 0.4 ? 'warn' : 'bad';
    return `<svg class="chart-svg" viewBox="0 0 200 110" style="height:110px">
      <path class="gauge-arc-bg" d="M ${cx-r},${cy} A ${r},${r} 0 0 1 ${cx+r},${cy}"/>
      <path class="gauge-arc ${cls}" d="M ${cx-r},${cy} A ${r},${r} 0 0 1 ${cx+r},${cy}" stroke-dasharray="${dashArray}"/>
      <text x="${cx}" y="${cy-8}" text-anchor="middle" style="font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;fill:var(--text)">${v.toFixed(0)}<tspan style="font-size:14px;fill:var(--text-3)">${opts.unit||'%'}</tspan></text>
      <text x="${cx}" y="${cy+8}" text-anchor="middle" style="font-size:10px;fill:var(--text-3)">${escapeHTML(opts.label||'')}</text>
    </svg>`;
  },

  // Radial bars for station performance comparison
  radialBars(rows, opts = {}) {
    return rows.map(row => {
      const pct = Math.min(100, row.pct);
      const cls = row.status === 'maintenance' ? 'warn' : row.status === 'idle' ? 'idle' : pct >= 95 ? 'full' : '';
      return `<div class="radial-row">
        <div class="radial-code">${escapeHTML(row.code)}</div>
        <div class="radial-track"><div class="radial-fill ${cls}" style="width:${pct}%"></div></div>
        <div class="radial-stat">${row.stat}</div>
      </div>`;
    }).join('');
  },

  // Sparkline (mini line chart for KPI cards)
  sparkline(values, opts = {}) {
    if (!values || values.length === 0) return '';
    const w = 80, h = 24;
    const min = Math.min(...values), max = Math.max(...values);
    const range = max - min || 1;
    const xs = (i) => (i / (values.length-1)) * w;
    const ys = (v) => h - ((v - min) / range) * h;
    const path = values.map((v,i) => `${xs(i)},${ys(v)}`).join(' ');
    const color = opts.color || 'var(--gold)';
    return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><polyline points="${path}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  }
};

/* ============ APP / ROUTER ============ */
const App = {
  async init() {
    State.load();
    // If Supabase isn't configured, fall back to legacy demo mode
    if (!sb) {
      this.showLoginError('⚠️ لم يتم ضبط Supabase. حرّر القيم في الكود (SUPABASE_CONFIG) لتفعيل الدخول.');
      return;
    }
    // Try to restore existing session
    try {
      const { data: { session } } = await sb.auth.getSession();
      if (session?.user) {
        await this.afterAuth(session.user);
        return;
      }
    } catch (e) { console.warn('Session check failed:', e); }
    // Otherwise show login form
    this.focusLogin();
    // Listen for auth state changes (in case of token refresh, logout in another tab)
    sb.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_OUT' && State.user) {
        State.user = null;
        this.stopLive();
        document.getElementById('app').classList.add('hidden');
        document.getElementById('splash').classList.remove('hidden');
        this.focusLogin();
      }
    });
  },

  focusLogin() {
    setTimeout(() => {
      const el = document.getElementById('loginEmail');
      if (el) el.focus();
    }, 50);
  },

  showLoginError(msg) {
    const el = document.getElementById('loginError');
    if (!el) return;
    el.textContent = msg;
    el.style.display = 'block';
  },
  clearLoginError() {
    const el = document.getElementById('loginError');
    if (el) el.style.display = 'none';
  },

  async doLogin() {
    if (!sb) { this.showLoginError('Supabase غير مهيّأ'); return; }
    this.clearLoginError();
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.textContent = '...جاري الدخول';
    try {
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if (error) {
        this.showLoginError(error.message === 'Invalid login credentials' ? 'إيميل أو كلمة سر خاطئة' : error.message);
        return;
      }
      await this.afterAuth(data.user);
    } catch (e) {
      this.showLoginError('خطأ في الاتصال بـ Supabase: ' + e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = 'دخول النظام';
    }
  },

  // After successful auth, fetch user profile from public.users and bootstrap UI
  async afterAuth(authUser) {
    try {
      const { data: profile, error } = await sb.from('users')
        .select('*')
        .eq('auth_user_id', authUser.id)
        .single();
      if (error || !profile) {
        this.showLoginError('الإيميل صحيح لكن لا يوجد ملف مستخدم مرتبط في public.users. تواصل مع المدير.');
        await sb.auth.signOut();
        return;
      }
      // Map Supabase profile shape (snake_case) to internal user object
      const u = this._mapProfile(profile);
      // Inject into State.data.users (so all existing code that uses Q.user(id) works)
      const existing = State.data.users.findIndex(x => x.id === u.id);
      if (existing >= 0) State.data.users[existing] = u; else State.data.users.unshift(u);
      State.user = u;
      State.save();

      document.getElementById('splash').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      document.getElementById('userAvatar').textContent = u.avatar;
      document.getElementById('userAvatar').style.background = u.color;
      document.getElementById('userName').textContent = State.lang==='ar' ? u.name : u.nameEn;
      document.getElementById('userRole').textContent = State.lang==='ar' ? u.role : u.roleEn;
      Audit.log('login', 'User', u.id, { method: 'supabase' });
      this.renderSidebar();
      this.startLive();
      this.goto('dashboard');

      // Cloud bootstrap — fetch all data from Supabase
      Repo.bootstrap().then(ok => {
        if (ok) {
          // Subscribe to realtime updates from other users
          Repo.subscribeAll();
          // Refresh current view with fresh data
          if (State.currentView) {
            try { App.goto(State.currentView); } catch(e) {}
          }
        } else {
          console.warn('[App] Cloud bootstrap failed — running on local cache');
        }
      });
    } catch (e) {
      this.showLoginError('خطأ في تحميل ملف المستخدم: ' + e.message);
    }
  },

  // Convert Supabase row (snake_case) to internal shape (camelCase)
  _mapProfile(row) {
    return {
      id: row.id,
      auth_user_id: row.auth_user_id,
      name: row.name_ar,
      nameEn: row.name_en,
      dept: row.dept_id,
      role: row.role_ar,
      roleEn: row.role_en,
      color: row.color || '#888',
      avatar: row.avatar || (row.name_ar ? row.name_ar.charAt(0) : '?'),
      active: row.active !== false,

    });

    // Reset warehouse allocations to zero (keep stock quantities)
    State.data.warehouses.forEach(wh => {
      wh.items.forEach(it => { it.allocated = 0; });
    });

    // Log this admin action as the FIRST entry in the new audit log
    Audit.log('clean_demo_data', 'System', 'all', counts);
    Movements.add('warn', ar?'تم تنظيف البيانات التشغيلية — النظام جاهز للإنتاج':'Operational data cleaned — system ready for production', counts);

    State.save();
    this.closeModal();
    toast(ar?`تم الحذف: ${counts.wo} WO، ${counts.mv} حركة، ${counts.ad} سجل`:`Deleted ${counts.wo} WOs, ${counts.mv} movements, ${counts.ad} logs`, 'success');
    this.renderSidebar();
    this.goto('dashboard');
  },

  // ============ LIVE SIMULATION ============
  startLive() {
    this.stopLive();
    this.liveTimer = setInterval(() => {
      // Simulate slight production progress on running stations
      const k1 = Q.station('K1');
      const k2 = Q.station('K2');
      if (k1.status === 'running' && k1.produced < k1.target) {
        const inc = Math.floor(Math.random() * 12) + 4;
        k1.produced = Math.min(k1.target, k1.produced + inc);
      }
      if (k2.status === 'running' && k2.produced < k1.produced - 50) {
        const inc = Math.floor(Math.random() * 10) + 3;
        k2.produced = Math.min(k1.produced - 50, k2.produced + inc);
      }
      // Advance dashboard if it's the active page
      if (State.route === 'dashboard') View.refreshDashboard();
      if (State.route === 'floor') View.refreshFloor();
    }, 3000);
  },
  stopLive() { if (this.liveTimer) clearInterval(this.liveTimer); this.liveTimer = null; },
};

    const active = wos.filter(w => w.currentStage !== 'DELIVERED' && w.currentStage !== 'REJECTED');

  // Dynamic pipeline track: WOs ride the line as tokens that move when stages change
  pipelineHTML() {
    const ar = State.lang === 'ar';
    const stages = STAGE_ORDER.map(id => stageById(id));
    const total = stages.length;

    // Build stage markers with their position
    const markers = stages.map((s, i) => {
      const x = ((i + 0.5) / total) * 100;
      const ownerId = Q.ownerOfStage(s.id);
      const owner = ownerId ? Q.user(ownerId) : null;
      const counts = Q.woCountByStage();
      const c = counts[s.id] || 0;
      const ownerLabel = owner ? `${owner.avatar}` : '';
      return `<div class="stage-marker ${c>0?'has-wo':''}" style="${ar?'right':'left'}:${x}%" onclick="View.filterByStage('${s.id}')">
        <div class="stage-marker-label">${s.code}${ownerLabel?` · ${ownerLabel}`:''}</div>
      </div>`;
    }).join('');

    // Compute WO positions on the track based on currentStage
    // Group WOs by stage so they don't overlap perfectly
    const activeWOs = State.data.workOrders.filter(w => !['DELIVERED','REJECTED'].includes(w.currentStage));
    const woByStage = {};
    activeWOs.forEach(w => {
      if (!woByStage[w.currentStage]) woByStage[w.currentStage] = [];
      woByStage[w.currentStage].push(w);
    });

    let tokens = '';
    Object.keys(woByStage).forEach(stage => {
      const stageIdx = STAGE_ORDER.indexOf(stage);
      if (stageIdx < 0) return;
      const baseX = ((stageIdx + 0.5) / total) * 100;
      woByStage[stage].forEach((w, idx) => {
        // slight horizontal offset for multiple WOs at same stage
        const offsetPct = (idx - (woByStage[stage].length-1)/2) * 1.2;
        const x = baseX + offsetPct;
        const justMoved = w._justMoved ? 'just-moved' : '';
        const priority = w.priority === 'high' ? 'priority-high' : '';
        const dirAttr = ar ? `right:${x}%` : `left:${x}%`;
        tokens += `<div class="wo-token ${priority} ${justMoved}" style="${dirAttr}" data-wo="${w.id}" onclick="Action.openWO('${w.id}')">
          <div class="wo-token-id">${w.id.split('-').pop()}</div>
          <div class="wo-token-qty">${fmt.num(w.produced||w.qty)}</div>
        </div>`;
      });
    });

    if (activeWOs.length === 0) {
      tokens = `<div class="wo-token-empty">${ar?'لا توجد WOs في الخط حالياً':'No WOs on the line right now'}</div>`;
    }

    return `
      <div class="pipeline-head">
        <div class="pipeline-title">${ar?'مسار الإنتاج المباشر':'Live Production Pipeline'}</div>
        <div class="text-mute" style="font-size:11px">${activeWOs.length} ${ar?'WO على الخط · حركة لايف':'WOs on the line · live tracking'}</div>
      </div>
      <div class="pipeline-track" id="pipelineTrack">
        ${markers}
        ${tokens}
      </div>
    `;
  },

  // ─── CHART HTML BUILDERS ───
  chartThroughputHTML() {
    const hist = State.data.history?.hourly || [];
    if (hist.length < 2) return '<div class="empty-state" style="padding:24px">جاري جمع البيانات...</div>';
    // Convert cumulative produced into hourly diffs
    const data = [];
    for (let i = 1; i < hist.length; i++) {
      const diff = Math.max(0, hist[i].produced - hist[i-1].produced);
      const d = new Date(hist[i].ts);
      data.push({ value: diff, label: d.getHours().toString().padStart(2,'0')+':00' });
    }
    return Chart.line(data, { width: 400, height: 130 });
  },

  chartStationsHTML() {
    const ar = State.lang === 'ar';
    const rows = State.data.stations.map(s => {
      const pct = s.target > 0 ? Math.min(100, (s.produced / s.target) * 100) : 0;
      return {
        code: s.code,
        pct,
        status: s.status,
        stat: s.target > 0 ? `${pct.toFixed(0)}%` : '—',

  chartDistHTML() {

      'prod': { value: 0, label: ar?'في الإنتاج':'Production', color: '#38bdf8' },

      'post': { value: 0, label: ar?'بعد الإنتاج':'Post-prod', color: '#10b981' },
    };
    Object.entries(counts).forEach(([stage, c]) => {
      if (['CREATED','MAT_REQUEST','MAT_ISSUED'].includes(stage)) buckets.pre.value += c;
      else if (['AT_K1','AT_K2','AT_K3','AT_K4'].includes(stage)) buckets.prod.value += c;
      else if (stage === 'AT_MOC') buckets.qc.value += c;
      else if (['AT_PMF','AT_GDN'].includes(stage)) buckets.post.value += c;
    });
    return Chart.donut(Object.values(buckets), { centerLabel: ar?'WOs نشطة':'Active WOs' });

  chartScrapHTML() {
    const hist = State.data.history?.hourly || [];
    if (hist.length < 2) return '<div class="empty-state" style="padding:24px">جاري جمع البيانات...</div>';
    const data = hist.map((h, i) => {
      const total = (h.produced + h.scrap) || 1;
      return { value: (h.scrap / total) * 100, label: i % 6 === 0 ? new Date(h.ts).getHours().toString().padStart(2,'0')+':00' : '' };

    return Chart.line(data, { width: 400, height: 130 });

  chartOEEHTML(m) {
    // Simplified OEE: Availability × Performance × Quality
    const availability = State.data.stations.filter(s => s.status !== 'maintenance').length / State.data.stations.length * 100;
    const performance = State.data.stations.reduce((sum, s) => {
      if (s.target > 0) return sum + Math.min(100, (s.produced/s.target)*100);
      return sum;
    }, 0) / Math.max(1, State.data.stations.filter(s => s.target > 0).length);
    const quality = 100 - m.scrapRate;
    const oee = (availability * performance * quality) / 10000;
    return Chart.gauge(oee, { label: State.lang==='ar'?'الفعالية العامة':'Effectiveness' });

  // Smart refresh — animate counters, slide tokens, update charts only when data changed
  refreshDashboard() {
    History.push();
    const m = this._metrics();
    const old = this._lastMetrics || m;

    // Animate KPI counters
    const animateEl = (id, oldVal, newVal, format) => {
      const el = document.getElementById(id);
      if (!el || oldVal === newVal) return;
      Animate.counter(el, oldVal, newVal, { formatter: format });
    };
    animateEl('kpiActive', old.active.length, m.active.length, v => fmt.num(v));
    animateEl('kpiProduced', old.totalProduced, m.totalProduced, v => fmt.num(v));
    animateEl('kpiMOC', old.inMOC, m.inMOC, v => fmt.num(v));
    animateEl('kpiDelivered', old.delivered, m.delivered, v => fmt.num(v));
    if (Math.abs(old.scrapRate - m.scrapRate) > 0.005) {
      const el = document.getElementById('kpiScrap');
      if (el) Animate.counter(el, old.scrapRate, m.scrapRate, { formatter: v => v.toFixed(2)+'%' });
    }
    if (old.stationsRunning !== m.stationsRunning) {
      const el = document.getElementById('kpiRunning');
      if (el) { el.textContent = m.stationsRunning + '/5'; el.classList.add('counter-pulse'); setTimeout(()=>el.classList.remove('counter-pulse'),700); }
    }

    // Update chart meta labels
    const tm = document.getElementById('throughputMeta');
    if (tm) tm.textContent = `+${fmt.num(m.last1h)} ${State.lang==='ar'?'/ساعة':'/h'}`;
    const sm = document.getElementById('scrapMeta');
    if (sm) { sm.textContent = m.scrapRate.toFixed(2) + '%'; sm.style.color = m.scrapRate > 2 ? 'var(--rose)' : 'var(--emerald)'; }

    // Update station produced counters with animation
    State.data.stations.forEach(s => {
      const oldS = old._stationSnapshots?.[s.id];
      if (oldS && oldS.produced !== s.produced) {
        const el = document.getElementById('stProduced-' + s.id);
        if (el) Animate.counter(el, oldS.produced, s.produced, { formatter: v => fmt.num(v) });
        const fill = document.getElementById('stFill-' + s.id);
        if (fill && s.target > 0) fill.style.width = Math.min(100, (s.produced/s.target)*100) + '%';
      }
    });
    m._stationSnapshots = {};
    State.data.stations.forEach(s => { m._stationSnapshots[s.id] = { produced: s.produced }; });

    // Update charts (regenerate inner HTML — SVG transitions handle smoothness)
    const updateChart = (id, html) => { const el = document.getElementById(id); if (el) el.innerHTML = html; };
    updateChart('chartThroughput', this.chartThroughputHTML());
    updateChart('chartStations', this.chartStationsHTML());
    updateChart('chartDist', this.chartDistHTML());
    updateChart('chartScrap', this.chartScrapHTML());
    updateChart('chartOEE', this.chartOEEHTML(m));

    // Update pipeline track — tokens slide via CSS transition
    const pl = document.getElementById('pipeline');
    if (pl) pl.innerHTML = this.pipelineHTML();

    // Refresh ticker if new movements arrived
    const tl = document.getElementById('tickerList');
    if (tl) {
      const currentFirst = tl.querySelector('.ticker-item')?.dataset?.mid;
      const newFirst = State.data.movements[0]?.id;
      if (currentFirst !== newFirst) tl.innerHTML = this.tickerHTML();
    }

    this._lastMetrics = m;
  },

  filterByStage(stageId) {
    State.route = 'workorders';
    this.workorders(stageId);
  },
};

View.actionForStage = function(stageId, wo) {
  const ar = State.lang === 'ar';
  const map = {
    CREATED:     { label: ar?'طلب المواد':'Request Materials',   handler: `Action.requestMaterials('${wo.id}')` },
    MAT_REQUEST: { label: ar?'صرف المواد':'Issue Materials',     handler: `Action.issueMaterials('${wo.id}')` },
    MAT_ISSUED:  { label: ar?'بدء K1':'Start K1',                handler: `Action.startStation('${wo.id}','K1')` },
    AT_K1:       { label: ar?'تسليم دفعة K2':'Deliver to K2',    handler: `Action.deliverStation('${wo.id}')` },
    AT_K2:       { label: ar?'تسليم دفعة K3':'Deliver to K3',    handler: `Action.deliverStation('${wo.id}')` },
    AT_K3:       { label: ar?'تسليم دفعة K4':'Deliver to K4',    handler: `Action.deliverStation('${wo.id}')` },
    AT_K4:       { label: ar?'تسليم لـ IFA WH':'Deliver to IFA', handler: `Action.deliverStation('${wo.id}')` },
    AT_MOC:      { label: ar?'فحص MOC':'MOC Check',              handler: `Action.mocCheck('${wo.id}')` },
    AT_PMF:      { label: ar?'نقل GDN':'Move to GDN',            handler: `Action.handover('${wo.id}','AT_GDN')` },
    AT_GDN:      { label: ar?'تسليم نهائي':'Deliver',            handler: `Action.handover('${wo.id}','DELIVERED','deliver')` },
  };
  return map[stageId];
};

View.woTableHTML = function(wos) {

    </tr></thead>
    <tbody>${wos.map(w => {
      const st = stageById(w.currentStage);
      const owner = w.currentOwner ? Q.user(w.currentOwner) : null;

      const isRej = w.currentStage === 'REJECTED';
      const cls = isDone ? 'b-done' : isRej ? 'b-rejected' : 'b-progress';

        <td class="mono"><b>${w.id}</b></td>

        <td><span class="badge-status b-${w.priority==='high'?'rejected':w.priority==='medium'?'pending':'closed'}">${w.priority}</span></td>

        <td><button class="btn btn-sm btn-secondary" onclick="event.stopPropagation();Action.openWO('${w.id}')">${ar?'فتح':'Open'}</button></td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;
};

View.filterWOs = function() {
  const q = (document.getElementById('woSearch').value || '').toLowerCase().trim();
  const stage = document.getElementById('woStageFilter').value;
  let wos = State.data.workOrders.slice();
  if (stage) wos = wos.filter(w => w.currentStage === stage);
  if (q) wos = wos.filter(w => w.id.toLowerCase().includes(q) || w.sku.toLowerCase().includes(q) || w.desc.toLowerCase().includes(q));
  document.getElementById('woTableContainer').innerHTML = View.woTableHTML(wos);
};

              <span class="text-mute mono" style="font-size:10px">${fmt.ago(m.ts)}</span>
            </div>`;
          }).join('')}
        </div>

      </div>`;
    }).join('')}

};

// View movement history of a single warehouse
View.whMovements = function(whId) {
  const wh = Q.wh(whId);

  const ar = State.lang === 'ar';
  const movements = (State.data.stockMovements || []).filter(m => m.whId === whId);
  const typeLabels = { opening:ar?'رصيد افتتاحي':'Opening', receive:ar?'استلام':'Receive', issue:ar?'صرف':'Issue', adjust:ar?'تعديل':'Adjust', return:ar?'مرتجع':'Return' };

  const body = movements.length === 0 ? `<div class="empty-state">${ar?'لا توجد حركات':'No movements yet'}</div>` : `
    <div style="overflow-x:auto;max-height:60vh"><table class="data">
      <thead><tr>
        <th>${ar?'التاريخ':'Date'}</th>
        <th>${ar?'النوع':'Type'}</th>
        <th>${ar?'الكود':'SKU'}</th>
        <th>${ar?'الكمية':'Qty'}</th>
        <th>${ar?'المرجع':'Reference'}</th>
        <th>${ar?'المنفّذ':'By'}</th>
        <th>${ar?'ملاحظات':'Notes'}</th>
      </tr></thead>
      <tbody>${movements.map(m => {
        const u = Q.user(m.user);
        const sign = ['receive','opening','return'].includes(m.type) ? '+' : (m.type === 'adjust' ? '±' : '−');
        const color = sign === '+' ? 'var(--emerald)' : sign === '−' ? 'var(--rose)' : 'var(--amber)';
        return `<tr>
          <td class="mono" style="font-size:10.5px">${fmt.date(m.ts)}</td>
          <td><span class="badge-status">${escapeHTML(typeLabels[m.type]||m.type)}</span></td>

  App.openModal(`${ar?'سجل حركة المستودع':'Warehouse Movement Log'} — ${escapeHTML(wh.code)}`, body,

};

      <div class="kpi" style="--accent:var(--violet);--accent-bg:rgba(167,139,250,0.1)">
        <div class="kpi-label">${ar?'بانتظار المراجعة':'Pending Review'}</div>

      <div class="kpi" style="--accent:var(--sky);--accent-bg:rgba(56,189,248,0.1)">

        <div class="kpi-value">${reviews.length}</div>
      </div>
    </div>

    ${members.length === 0 && isMgr ? `
      <div class="card mt-2">
        <div class="card-title">⚙ ${ar?'لم يتم تعيين أعضاء بعد':'No members assigned yet'}</div>
        <div style="font-size:12px;color:var(--text-2);margin-bottom:12px">${ar?'لتفعيل اللجنة، يجب تعيين 3 أعضاء على الأقل من أقسام مختلفة.':'To activate the committee, at least 3 members from different departments must be assigned.'}</div>

        </table></div>
      `}
    </div>

    ${reviews.length > 0 ? `
      <div class="card mt-2">
        <div class="card-title">${ar?'سجل المراجعات':'Review History'} (${ar?'آخر 20':'last 20'})</div>
        <div style="overflow-x:auto"><table class="data">
          <thead><tr>
            <th>${ar?'التاريخ':'Date'}</th>

            <th>${ar?'العضو':'Member'}</th>
            <th>${ar?'القرار':'Decision'}</th>
            <th>${ar?'ملاحظات':'Notes'}</th>
          </tr></thead>
          <tbody>${reviews.slice(0,20).map(r => {
            const u = Q.user(r.userId);
            return `<tr>

            </tr>`;

        </table></div>
      </div>

View._maintSection = function(title, list, status) {
  if (list.length === 0) return '';
  const ar = State.lang === 'ar';
  const priorityColors = {
    critical: 'var(--rose)',
    high: 'var(--amber)',
    normal: 'var(--sky)',
    low: 'var(--text-3)'
  };
  const priorityLabels = {
    critical: ar?'حرج — يوقف فوراً':'Critical — stops now',
    high: ar?'عالي':'High',
    normal: ar?'عادي':'Normal',
    low: ar?'منخفض':'Low'
  };

  return `<div class="card mb-2">
    <div class="card-title">${escapeHTML(title)} (${list.length})</div>
    <div style="overflow-x:auto"><table class="data">
      <thead><tr>
        <th>${ar?'الرقم':'#'}</th>
        <th>${ar?'المحطة':'Station'}</th>
        <th>${ar?'العطل':'Fault'}</th>
        <th>${ar?'الأولوية':'Priority'}</th>
        <th>${ar?'الطالب':'Requested by'}</th>
        ${status !== 'requested' ? `<th>${ar?'الفني':'Tech'}</th>` : ''}
        <th>${ar?'منذ':'Since'}</th>
        <th>${ar?'الإجراء':'Action'}</th>
      </tr></thead>
      <tbody>${list.map(m => {
        const reqr = Q.user(m.requestedBy);
        const tech = m.assignedTo ? Q.user(m.assignedTo) : null;
        const station = Q.station(m.stationId);
        return `<tr>
          <td class="mono"><b>${m.id}</b></td>
          <td><span class="tag">${m.stationId}</span><div class="text-mute" style="font-size:10.5px">${escapeHTML(station ? (ar?station.name:station.nameEn) : '—')}</div></td>
          <td>${escapeHTML(m.faultTitle||m.title||'—')}<div class="text-mute" style="font-size:11px">${escapeHTML((m.description||m.desc||'').substring(0,80))}${(m.description||m.desc||'').length>80?'...':''}</div></td>
          <td><span class="badge-status" style="color:${priorityColors[m.priority]||'var(--text-3)'};border-color:${priorityColors[m.priority]||'var(--text-3)'}">${priorityLabels[m.priority]||m.priority}</span></td>
          <td>${reqr?escapeHTML(ar?reqr.name:reqr.nameEn):'—'}</td>
          ${status !== 'requested' ? `<td>${tech?escapeHTML(ar?tech.name:tech.nameEn):'<span class="text-mute">—</span>'}</td>` : ''}
          <td class="mono text-mute" style="font-size:11px">${fmt.ago(m.requestedAt)}</td>
          <td>${View._maintActions(m)}</td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>
  </div>`;
};

View._maintActions = function(m) {
  const ar = State.lang === 'ar';
  const isMaintSup = State.user.dept === 'MAINT' && /مشرف|Supervisor/i.test(State.user.role||'');
  const isMaint = State.user.dept === 'MAINT';
  const isMgr = Perm.isManager();
  const buttons = [];

  if (m.status === 'requested') {
    if (isMaintSup || isMgr) {
      buttons.push(`<button class="btn btn-sm btn-primary" onclick="Action.evaluateMaint('${m.id}')">${ar?'تقييم':'Evaluate'}</button>`);
      buttons.push(`<button class="btn btn-sm btn-secondary" onclick="Action.rejectMaint('${m.id}')" style="color:var(--rose)">${ar?'رفض':'Reject'}</button>`);
    } else {
      buttons.push(`<button class="btn btn-sm btn-secondary" onclick="Action.viewMaintDetails('${m.id}')">${ar?'تفاصيل':'View'}</button>`);
    }
  } else if (m.status === 'evaluated') {
    if (isMaint || isMgr) {
      buttons.push(`<button class="btn btn-sm btn-success" onclick="Action.startMaint('${m.id}')">${ar?'بدء التنفيذ':'Start Work'}</button>`);
    }
    buttons.push(`<button class="btn btn-sm btn-secondary" onclick="Action.viewMaintDetails('${m.id}')">${ar?'تفاصيل':'View'}</button>`);
  } else if (m.status === 'in_progress') {
    if (isMaint && (m.assignedTo === State.user.id || isMaintSup) || isMgr) {
      buttons.push(`<button class="btn btn-sm btn-success" onclick="Action.finishMaint('${m.id}')">${ar?'إنهاء':'Complete'}</button>`);
    }
    buttons.push(`<button class="btn btn-sm btn-secondary" onclick="Action.viewMaintDetails('${m.id}')">${ar?'تفاصيل':'View'}</button>`);
  } else if (m.status === 'completed') {
    if (isMaintSup || isMgr) {
      buttons.push(`<button class="btn btn-sm btn-primary" onclick="Action.verifyMaint('${m.id}')">${ar?'تحقق وإغلاق':'Verify & Close'}</button>`);
    }
    buttons.push(`<button class="btn btn-sm btn-secondary" onclick="Action.viewMaintDetails('${m.id}')">${ar?'تفاصيل':'View'}</button>`);
  } else {
    buttons.push(`<button class="btn btn-sm btn-secondary" onclick="Action.viewMaintDetails('${m.id}')">${ar?'تفاصيل':'View'}</button>`);
  }
  return buttons.join(' ');
};
